schema: decision-knowledge-record/v1

metadata:
  id: "s3-access-denied"
  name: "S3 403 Access Denied"
  description: "S3 к°қмІҙ/лІ„нӮ· м ‘к·ј мӢң 403 AccessDenied м—җлҹ¬ л°ңмғқ"
  category: "storage"
  service: "s3"
  severity: "medium"
  tags: ["s3", "access-denied", "iam", "bucket-policy", "kms"]
  source_refs:
    - title: "S3 Troubleshoot 403 (re:Post)"
      url: "https://repost.aws/knowledge-center/s3-troubleshoot-403"
      type: "repost_kc"
    - title: "S3 Access Control"
      url: "https://docs.aws.amazon.com/AmazonS3/latest/userguide/s3-access-control.html"
      type: "official_doc"

triggers:
  - type: "log_pattern"
    description: "CloudTrail S3 AccessDenied мқҙлІӨнҠё"
    condition: "eventSource=s3.amazonaws.com AND errorCode=AccessDenied"

symptoms:
  - id: "s1"
    description: "s3:GetObject/PutObject 403 м—җлҹ¬"
    detection_method: "CloudTrail мқҙлІӨнҠё"
    log_query: |
      fields @timestamp, eventName, errorCode, userIdentity.arn, requestParameters.bucketName
      | filter eventSource = "s3.amazonaws.com" and errorCode = "AccessDenied"
  - id: "s2"
    description: "м• н”ҢлҰ¬мјҖмқҙм…ҳ S3 м—…лЎңл“ң/лӢӨмҡҙлЎңл“ң мӢӨнҢЁ"
    detection_method: "м• н”ҢлҰ¬мјҖмқҙм…ҳ лЎңк·ё"

diagnosis:
  decision_tree:
    - step: 1
      question: "IAM Policyм—җ н•„мҡ”н•ң s3:GetObject/PutObject к¶Ңн•ңмқҙ мһҲлҠ”к°Җ?"
      check:
        cli: |
          aws iam simulate-principal-policy --policy-source-arn <ROLE_ARN> \
            --action-names s3:GetObject --resource-arns arn:aws:s3:::<BUCKET>/<KEY>
      branches:
        - condition: "implicitDeny (к¶Ңн•ң м—ҶмқҢ)"
          result: "S3-IAM"
          next_step: 0
        - condition: "allowed"
          result: "IAM_OK"
          next_step: 2
    - step: 2
      question: "Bucket Policyм—җ лӘ…мӢңм Ғ Denyк°Җ мһҲлҠ”к°Җ?"
      check:
        cli: "aws s3api get-bucket-policy --bucket <BUCKET>"
      branches:
        - condition: "лӘ…мӢңм Ғ Deny мЎҙмһ¬"
          result: "S3-BUCKET-POLICY"
          next_step: 0
        - condition: "Bucket Policy м •мғҒ"
          result: "POLICY_OK"
          next_step: 3
    - step: 3
      question: "к°қмІҙк°Җ KMS м•”нҳёнҷ”лҗҳм–ҙ мһҲлҠ”к°Җ?"
      check:
        cli: "aws s3api head-object --bucket <BUCKET> --key <KEY> --query 'ServerSideEncryption'"
      branches:
        - condition: "KMS м•”нҳёнҷ”"
          result: "S3-KMS"
          next_step: 0
        - condition: "S3-S3 лҳҗлҠ” лҜём•”нҳёнҷ”"
          result: "S3-CROSS-ACCOUNT"
          next_step: 0

root_causes:
  - code: "S3-IAM"
    name: "IAM к¶Ңн•ң лҲ„лқҪ"
    description: "IAM Policyм—җ н•„мҡ”н•ң S3 Actionмқҙ м—ҶмқҢ"
    probability: "high"
  - code: "S3-BUCKET-POLICY"
    name: "Bucket Policy лӘ…мӢңм Ғ Deny"
    description: "Bucket Policyм—җм„ң мЎ°кұҙл¶Җ DenyлЎң м°ЁлӢЁ"
    probability: "medium"
  - code: "S3-KMS"
    name: "KMS Key Policy ліөнҳёнҷ” к¶Ңн•ң л¶Җмһ¬"
    description: "к°қмІҙ м•”нҳёнҷ”м—җ мӮ¬мҡ©лҗң KMS Keyм—җ kms:Decrypt к¶Ңн•ң м—ҶмқҢ"
    probability: "medium"
  - code: "S3-CROSS-ACCOUNT"
    name: "Cross-account м–‘мӘҪ н—Ҳмҡ© лҲ„лқҪ"
    description: "Cross-account м ‘к·ј мӢң Bucket Policy + IAM Policy м–‘мӘҪ лӘЁл‘җ н—Ҳмҡ© н•„мҡ”"
    probability: "medium"

remediation:
  - root_cause_code: "S3-IAM"
    actions:
      - order: 1
        name: "IAM Policyм—җ S3 к¶Ңн•ң м¶”к°Җ"
        type: "aws_cli"
        command: |
          aws iam put-role-policy --role-name <ROLE> --policy-name S3Access \
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["s3:GetObject","s3:PutObject"],"Resource":"arn:aws:s3:::<BUCKET>/*"}]}'
        rollback_command: |
          aws iam delete-role-policy --role-name <ROLE> --policy-name S3Access
        risk: "medium"
        requires_approval: true
        estimated_impact:
          cost: "м—ҶмқҢ"
          duration: "мҰүмӢң (IAM м „нҢҢ мҲҳмҙҲ мқҙлӮҙ)"
          blast_radius: "н•ҙлӢ№ Roleмқ„ мӮ¬мҡ©н•ҳлҠ” лӘЁл“  м„ңл№„мҠӨм—җ S3 м ‘к·ј к¶Ңн•ң л¶Җм—¬ вҖ” мөңмҶҢ к¶Ңн•ң мӣҗм№ҷ мӨҖмҲҳ нҷ•мқё"

  - root_cause_code: "S3-BUCKET-POLICY"
    actions:
      - order: 1
        name: "Bucket Policy мҲҳм •"
        type: "aws_cli"
        command: "aws s3api put-bucket-policy --bucket <BUCKET> --policy file://policy.json"
        rollback_command: "aws s3api delete-bucket-policy --bucket <BUCKET>"
        risk: "medium"
        requires_approval: true
        estimated_impact:
          cost: "м—ҶмқҢ"
          duration: "мҰүмӢң"
          blast_radius: "лІ„нӮ· м „мІҙ м ‘к·ј м •мұ… ліҖкІҪ вҖ” лӢӨлҘё Principalмқҳ м ‘к·јм—җлҸ„ мҳҒн–Ҙ к°ҖлҠҘ"

  - root_cause_code: "S3-KMS"
    actions:
      - order: 1
        name: "KMS Key Policyм—җ kms:Decrypt к¶Ңн•ң м¶”к°Җ"
        type: "aws_cli"
        command: "aws kms put-key-policy --key-id <KEY_ID> --policy-name default --policy file://key-policy.json"
        rollback_command: "aws kms put-key-policy --key-id <KEY_ID> --policy-name default --policy file://original-key-policy.json"
        risk: "high"
        requires_approval: true
        estimated_impact:
          cost: "м—ҶмқҢ"
          duration: "мҰүмӢң"
          blast_radius: "н•ҙлӢ№ KMS KeyлҘј мӮ¬мҡ©н•ҳлҠ” лӘЁл“  лҰ¬мҶҢмҠӨм—җ мҳҒн–Ҙ вҖ” Key PolicyлҠ” кі„м • м „мІҙ лІ”мң„"

  - root_cause_code: "S3-CROSS-ACCOUNT"
    actions:
      - order: 1
        name: "м–‘мӘҪ кі„м • лӘЁл‘җм—җ к¶Ңн•ң м¶”к°Җ"
        type: "manual"
        command: "лҢҖмғҒ кі„м • Bucket Policy + нҳём¶ң кі„м • IAM Policy м–‘мӘҪ мҲҳм •"
        rollback_command: |
          # лҢҖмғҒ кі„м •: aws s3api delete-bucket-policy --bucket <BUCKET>
          # нҳём¶ң кі„м •: aws iam delete-role-policy --role-name <ROLE> --policy-name CrossAccountS3
        risk: "medium"
        requires_approval: true
        estimated_impact:
          cost: "м—ҶмқҢ"
          duration: "мҰүмӢң (м–‘мӘҪ кі„м • ліҖкІҪ нӣ„ мҲҳмҙҲ)"
          blast_radius: "Cross-account м ‘к·ј н—Ҳмҡ© вҖ” мқҳлҸ„лҗң Principalл§Ң н—Ҳмҡ©лҗҳлҸ„лЎқ Condition нӮӨ м Ғмҡ© н•„мҡ”"

guardrails:
  pre_conditions:
    - description: "CloudTrailм—җм„ң AccessDenied мқҙлІӨнҠёмқҳ IAM Principal ARN нҷ•мқё мҷ„лЈҢ"
      check: "userIdentity.arn мӢқлі„ мҷ„лЈҢ вҖ” мһҳлӘ»лҗң Principalм—җ к¶Ңн•ң л¶Җм—¬ л°©м§Җ"
      block: true
    - description: "KMS Key Policy ліҖкІҪ м „ нҳ„мһ¬ м •мұ… л°ұм—…"
      check: "aws kms get-key-policy --key-id <KEY_ID> --policy-name default > original-key-policy.json мӢӨн–ү мҷ„лЈҢ"
      block: false
  post_conditions:
    - description: "s3:GetObject/PutObject м„ұкіө нҷ•мқё"
      check: "aws s3 cp s3://<BUCKET>/<KEY> /dev/null"
      auto_rollback: false

verification:
  checks:
    - name: "S3 м ‘к·ј м„ұкіө"
      method: "aws_cli"
      command: "aws s3 cp s3://<BUCKET>/<KEY> /dev/null && aws s3 cp /dev/null s3://<BUCKET>/test-write-probe"
      expected: "403 м—җлҹ¬ мҶҢл©ё, к°қмІҙ м—…лЎңл“ң/лӢӨмҡҙлЎңл“ң м •мғҒ"
    - name: "CloudTrail AccessDenied мқҙлІӨнҠё мҶҢл©ё"
      method: "CloudWatch Logs Insights"
      command: |
        fields @timestamp, errorCode, userIdentity.arn
        | filter eventSource = "s3.amazonaws.com" and errorCode = "AccessDenied"
        | stats count() as cnt by bin(5m)
      expected: "cnt = 0 for 5 consecutive periods"
    - name: "IAM Policy мӢңл®¬л Ҳмқҙм…ҳ нҶөкіј"
      method: "aws_cli"
      command: |
        aws iam simulate-principal-policy --policy-source-arn <ROLE_ARN> \
          --action-names s3:GetObject --resource-arns arn:aws:s3:::<BUCKET>/<KEY> \
          --query 'EvaluationResults[0].EvalDecision'
      expected: "allowed"
  stability_window: 300
  success_criteria: "S3 403 м—җлҹ¬ мҶҢл©ё"

escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 300
  notify: ["oncall"]
