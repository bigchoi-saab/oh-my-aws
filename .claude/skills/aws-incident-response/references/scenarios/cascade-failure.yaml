schema: decision-knowledge-record/v1

metadata:
  id: "cascade-failure"
  name: "서비스 간 연쇄 장애"
  description: "한 서비스 장애가 재시도 폭풍을 유발하여 전체 시스템으로 전파"
  category: "platform"
  service: "multi"
  severity: "critical"
  tags: ["cascade", "retry-storm", "circuit-breaker", "back-pressure"]
  source_refs:
    - title: "AWS Prescriptive Guidance - Retry Patterns"
      url: "https://docs.aws.amazon.com/prescriptive-guidance/latest/patterns/retry-backoff-strategies.html"
      type: "prescriptive_guidance"
    - title: "Well-Architected Reliability Pillar"
      url: "https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/rel_foundation_design_principles.html"
      type: "well_architected"

triggers:
  - type: "metric_threshold"
    description: "다수 서비스 동시 에러율 급증"
    condition: "3+ 서비스의 Error 메트릭 동시 임계 초과"

symptoms:
  - id: "s1"
    description: "여러 서비스 동시 5xx 에러"
    detection_method: "CloudWatch 대시보드 다수 서비스 에러"
  - id: "s2"
    description: "하위 서비스 Latency 급증 후 상위 서비스 타임아웃"
    detection_method: "X-Ray Service Map 에지 색상 변화"
  - id: "s3"
    description: "Lambda/DynamoDB/ECS 재시도 수 급증"
    detection_method: "CloudWatch Metrics"

diagnosis:
  decision_tree:
    - step: 1
      question: "최초 장애 발생 서비스는?"
      check:
        method: "X-Ray Service Map 또는 CW Metrics 타임라인 분석"
      branches:
        - condition: "하위 DB/API가 최초 장애"
          result: "CASCADE-UPSTREAM"
          next_step: 2
        - condition: "API Gateway/ALB가 최초 장애"
          result: "CASCADE-DOWNSTREAM"
          next_step: 0
    - step: 2
      question: "재시도 패턴이 에러를 악화시키고 있는가?"
      check:
        metric: "Lambda Invocations 급증 + Errors 동시 급증"
      branches:
        - condition: "재시도 수가 에러 수보다 기하급수적 증가"
          result: "CASCADE-RETRY-STORM"
          next_step: 0
        - condition: "재시도 정상"
          result: "CASCADE-SHARED-RESOURCE"
          next_step: 0

root_causes:
  - code: "CASCADE-RETRY-STORM"
    name: "재시도 폭풍"
    description: "지수 백오프 없는 재시도가 하위 서비스에 과부하"
    probability: "high"
  - code: "CASCADE-SHARED-RESOURCE"
    name: "공유 리소스 경합"
    description: "공유 DB/Queue/Cache 병목이 모든 서비스에 전파"
    probability: "medium"
  - code: "CASCADE-NO-CIRCUIT-BREAKER"
    name: "서킷 브레이커 미설정"
    description: "장애 서비스로 계속 요청 전송"
    probability: "high"

remediation:
  - root_cause_code: "CASCADE-RETRY-STORM"
    actions:
      - order: 1
        name: "비중요 트래픽 차단 (Back-pressure)"
        type: "aws_cli"
        command: |
          # WAF 규칙으로 비중요 트래픽 차단
          aws wafv2 update-web-acl --scope REGIONAL --web-acl-arn <ACL_ARN> \
            --default-action Block {}
        rollback_command: |
          # WAF default action을 Allow로 복원
          aws wafv2 update-web-acl --scope REGIONAL --web-acl-arn <ACL_ARN> \
            --default-action Allow {}
        risk: "high"
        requires_approval: true
        estimated_impact:
          cost: "없음 (WAF 요청 건수 과금 영향 미미)"
          duration: "즉시 적용 (수초 이내 전파)"
          blast_radius: "WAF 보호 대상 ALB/API Gateway 전체 — 합법적 트래픽도 일부 차단될 수 있음"
      - order: 2
        name: "재시도 설정 백오프 조정"
        type: "manual"
        command: "최대 재시도 3회, 지수 백오프 + 지터 적용"
        rollback_command: |
          # 코드 변경 롤백: 이전 재시도 설정으로 재배포
          # ECS: aws ecs update-service --cluster <CLUSTER> --service <SERVICE> --task-definition <PREVIOUS_TD_ARN>
        risk: "low"
        requires_approval: false
        estimated_impact:
          cost: "없음"
          duration: "코드 변경 후 재배포 시간 (5-15분)"
          blast_radius: "해당 서비스 단독 — 재배포 중 롤링 업데이트"

  - root_cause_code: "CASCADE-NO-CIRCUIT-BREAKER"
    actions:
      - order: 1
        name: "서킷 브레이커 패턴 도입"
        type: "code_change"
        command: "AWS SDK 내장 retry + 애플리케이션 레벨 서킷 브레이커"
        rollback_command: |
          # 서킷 브레이커 코드 제거 후 이전 버전으로 재배포
          # ECS: aws ecs update-service --cluster <CLUSTER> --service <SERVICE> --task-definition <PREVIOUS_TD_ARN>
          # Lambda: aws lambda update-alias --function-name <FN> --name LIVE --function-version <PREV_VERSION>
        risk: "medium"
        requires_approval: true
        estimated_impact:
          cost: "없음"
          duration: "코드 변경 및 재배포 5-20분"
          blast_radius: "해당 서비스 단독 — 서킷 오픈 시 하위 서비스 요청 즉시 차단하여 빠른 실패 처리"

  - root_cause_code: "CASCADE-SHARED-RESOURCE"
    actions:
      - order: 1
        name: "공유 리소스 병목 완화 (DynamoDB/RDS 용량 증설)"
        type: "aws_cli"
        command: |
          # DynamoDB On-Demand 전환
          aws dynamodb update-table --table-name <TABLE> --billing-mode PAY_PER_REQUEST
          # RDS: 읽기 복제본으로 부하 분산
          aws rds create-db-instance-read-replica \
            --db-instance-identifier <REPLICA_ID> \
            --source-db-instance-identifier <SOURCE_ID>
        rollback_command: |
          # DynamoDB: Provisioned 모드 복원
          aws dynamodb update-table --table-name <TABLE> \
            --billing-mode PROVISIONED \
            --provisioned-throughput ReadCapacityUnits=<RCU>,WriteCapacityUnits=<WCU>
          # RDS 읽기 복제본 삭제
          aws rds delete-db-instance --db-instance-identifier <REPLICA_ID> --skip-final-snapshot
        risk: "medium"
        requires_approval: true
        estimated_impact:
          cost: "DynamoDB On-Demand 전환 시 트래픽 기반 과금, RDS 읽기 복제본 추가 인스턴스 요금"
          duration: "DynamoDB 전환 수분, RDS 읽기 복제본 생성 10-20분"
          blast_radius: "공유 리소스를 사용하는 모든 서비스 혜택 — 단기 완화 후 아키텍처 개선 필요"

guardrails:
  pre_conditions:
    - description: "최초 장애 발생 서비스(root cause) 식별 완료 — X-Ray 또는 CW 타임라인 분석"
      check: "CASCADE-UPSTREAM 또는 CASCADE-DOWNSTREAM 원인 서비스 특정 완료"
      block: true
    - description: "WAF 트래픽 차단 전 영향받는 합법적 사용자 범위 확인"
      check: "차단 대상 트래픽이 비중요 트래픽임을 확인 (IP 대역, User-Agent 등 범위 검토)"
      block: true
  post_conditions:
    - description: "에러율 기준선 복귀"
      check: "모든 서비스 Error < baseline"
      auto_rollback: false

verification:
  checks:
    - name: "서비스 안정화"
      expected: "모든 서비스 5xx < 1%"
    - name: "X-Ray Service Map 정상"
      expected: "모든 에지 녹색"
  stability_window: 600
  success_criteria: "모든 서비스 에러율 기준선 내"

escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 300
  notify: ["oncall", "management", "dev-team"]
