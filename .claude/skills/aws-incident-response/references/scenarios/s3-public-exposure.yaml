schema: decision-knowledge-record/v1

metadata:
  id: "s3-public-exposure"
  name: "S3 버킷 공개 노출"
  description: "S3 버킷이 실수 또는 공격으로 인해 공개 접근 가능한 상태"
  category: "security"
  service: "s3"
  severity: "high"
  tags: ["s3", "security", "public-access", "data-leak"]
  source_refs:
    - title: "S3 Block Public Access"
      url: "https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-control-block-public-access.html"
      type: "official_doc"
    - title: "S3 Security Best Practices"
      url: "https://docs.aws.amazon.com/AmazonS3/latest/userguide/security-best-practices.html"
      type: "official_doc"

triggers:
  - type: "event_bridge"
    description: "AWS Config S3 버킷 공개 접근 규칙 위반"
    condition: "AWS Config rule: s3-bucket-public-read-prohibited OR s3-bucket-public-write-prohibited"

symptoms:
  - id: "s1"
    description: "버킷이 퍼블릭 접근 허용"
    detection_method: "AWS Config 규칙"
  - id: "s2"
    description: "익명 접근 가능 (버킷 정책에 Principal: *)"
    detection_method: "Bucket Policy 검사"

diagnosis:
  decision_tree:
    - step: 1
      question: "Block Public Access가 활성화되어 있는가?"
      check:
        cli: "aws s3api get-public-access-block --bucket <BUCKET>"
      branches:
        - condition: "Block Public Access 비활성"
          result: "S3-BPA-ON"
          next_step: 0
        - condition: "Block Public Access 비활성화 안됨"
          result: "S3-BPA-OFF"
          next_step: 0

root_causes:
  - code: "S3-BPA-OFF"
    name: "Block Public Access 비활성화 안됨"
    description: "S3 버킷에 Block Public Access 설정이 해제됨"
    probability: "high"
  - code: "S3-POLICY-OPEN"
    name: "Bucket Policy 공개 허용"
    description: "Bucket Policy에 Principal: * 허용"
    probability: "medium"

remediation:
  - root_cause_code: "S3-BPA-OFF"
    actions:
      - order: 1
        name: "Block Public Access 즉시 활성화"
        type: "aws_cli"
        command: |
          aws s3api put-public-access-block --bucket <BUCKET> \
            --public-access-block-configuration BlockPublicAcls,BlockPublicPolicy,IgnorePublicAcls
        rollback_command: |
          aws s3api delete-public-access-block --bucket <BUCKET>
        risk: "low"
        requires_approval: false
        estimated_impact:
          cost: "없음"
          duration: "즉시 (전파 수초)"
          blast_radius: "해당 버킷의 모든 퍼블릭 접근 즉시 차단 — 정적 웹 호스팅/CDN 직접 접근 의존 시 서비스 중단 가능"

  - root_cause_code: "S3-POLICY-OPEN"
    actions:
      - order: 1
        name: "Bucket Policy에서 공개 접근 제거"
        type: "aws_cli"
        command: "aws s3api delete-bucket-policy --bucket <BUCKET>"
        rollback_command: "aws s3api put-bucket-policy --bucket <BUCKET> --policy file://original-policy.json"
        risk: "medium"
        requires_approval: true
        estimated_impact:
          cost: "없음"
          duration: "즉시 (전파 1-2분)"
          blast_radius: "버킷 정책에 의존하는 모든 접근 차단 — 서비스 계정 포함 여부 사전 확인 필요"

guardrails:
  pre_conditions:
    - description: "현재 버킷 정책 백업 — 롤백 시 필요"
      check: "aws s3api get-bucket-policy --bucket <BUCKET> > original-policy.json 실행 완료"
      block: true
    - description: "퍼블릭 차단 적용 시 CDN/정적 웹 호스팅 의존성 없는지 확인"
      check: "버킷이 CloudFront OAC/OAI를 통해서만 접근되는지 또는 정적 웹사이트 호스팅 비활성화 확인"
      block: false
  post_conditions:
    - description: "공개 접근 차단 확인"
      check: "aws s3api get-public-access-block --bucket <BUCKET>"
      auto_rollback: false

verification:
  checks:
    - name: "공개 접근 차단"
      expected: "Block Public Access 활성화, 익명 접근 불가"
  stability_window: 300
  success_criteria: "공개 접근 차단, 버킷 정상"

escalation:
  auto_remediate: true
  approval_required: false
  escalation_timeout: 60
  notify: ["oncall", "security"]
