schema: decision-knowledge-record/v1

metadata:
  id: "cert-expiry"
  name: "ACM/TLS мқёмҰқм„ң л§ҢлЈҢ"
  description: "ACM мқёмҰқм„ңк°Җ л§ҢлЈҢлҗҳм–ҙ HTTPS м„ңл№„мҠӨ м ‘мҶҚ л¶Ҳк°Җ"
  category: "security"
  service: "acm"
  severity: "high"
  tags: ["acm", "certificate", "tls", "https", "expired"]
  source_refs:
    - title: "ACM Certificate Renewal"
      url: "https://docs.aws.amazon.com/acm/latest/userguide/dns-validation.html"
      type: "official_doc"
    - title: "CloudFront TLS (re:Post)"
      url: "https://repost.aws/knowledge-center/cloudfront-troubleshoot-403-errors"
      type: "repost_kc"

triggers:
  - type: "metric_threshold"
    description: "HTTPS м—°кІ° мӢӨнҢЁ мҰқк°Җ"
    condition: "ALB/CWFront 5xx лҳҗ лёҢлқјмҡ°м Җ мқёмҰқм„ң мҳӨлҘҳ"

symptoms:
  - id: "s1"
    description: "NET::ERR_CERT_DATE_INVALID лёҢлқјмҡ°м Җ мҳӨлҘҳ"
    detection_method: "лёҢлқјмҡ°м Җ мҪҳмҶ”"
  - id: "s2"
    description: "ACM мқёмҰқм„ң мғҒнғң EXPIRED"
    detection_method: "ACM API"
    cli: "aws acm describe-certificate --certificate-arn <CERT_ARN> --query 'Certificate.Status'"

diagnosis:
  decision_tree:
    - step: 1
      question: "мқёмҰқм„ңк°Җ л§ҢлЈҢлҗҳм—ҲлҠ”к°Җ?"
      check:
        cli: "aws acm describe-certificate --certificate-arn <CERT_ARN>"
      branches:
        - condition: "Status = EXPIRED"
          result: "CERT-EXPIRED"
          next_step: 0
        - condition: "Status = FAILED"
          result: "CERT-VALIDATION-FAILED"
          next_step: 0
        - condition: "Status = ISSUED"
          result: "CERT-NOT-EXPIRED"
          next_step: 0

root_causes:
  - code: "CERT-EXPIRED"
    name: "мқёмҰқм„ң л§ҢлЈҢ"
    description: "ACM мқёмҰқм„ңк°Җ к°ұмӢ лҗҳм§Җ м•Ҡм•„ л§ҢлЈҢлҗЁ"
    probability: "high"
  - code: "CERT-VALIDATION-FAILED"
    name: "DNS кІҖмҰқ мӢӨнҢЁ"
    description: "DNS кІҖмҰқ л ҲмҪ”л“ңк°Җ лҲ„лқҪлҗҳм–ҙ мқёмҰқм„ң к°ұмӢ  л¶Ҳк°Җ"
    probability: "medium"

remediation:
  - root_cause_code: "CERT-EXPIRED"
    actions:
      - order: 1
        name: "мқёмҰқм„ң к°ұмӢ  мҡ”мІӯ"
        type: "aws_cli"
        command: |
          aws acm request-certificate --domain-name <DOMAIN> \
            --validation-method DNS \
            --subject-alternative-names <SAN_NAMES>
        rollback_command: |
          aws acm delete-certificate --certificate-arn <NEW_CERT_ARN>
        risk: "low"
        requires_approval: false
        estimated_impact:
          cost: "ACM мқёмҰқм„ң мһҗмІҙлҠ” л¬ҙлЈҢ (лӢЁ, CloudFront/ALBм—җм„ң мӮ¬мҡ© мӢң м„ңл№„мҠӨ мҡ”кёҲ мң м§Җ)"
          duration: "DNS м „нҢҢ нӣ„ мөңлҢҖ 30л¶„ (мһҗлҸҷ DNS кІҖмҰқ мӢң)"
          blast_radius: "мғҲ ARNмңјлЎң CloudFront/ALB м—…лҚ°мқҙнҠё м „к№Ңм§Җ кё°мЎҙ л§ҢлЈҢ мқёмҰқм„ң мң м§Җ"
      - order: 2
        name: "CloudFrontм—җ мғҲ мқёмҰқм„ң л°°нҸ¬"
        type: "aws_cli"
        command: |
          aws cloudfront get-distribution-config --id <DIST_ID> --query 'DistributionConfig' > /tmp/dist-config.json
          # dist-config.jsonм—җм„ң ViewerCertificate.ACMCertificateArnмқ„ мғҲ ARNмңјлЎң мҲҳм • нӣ„:
          aws cloudfront update-distribution --id <DIST_ID> \
            --distribution-config file:///tmp/dist-config.json \
            --if-match <ETAG>
        rollback_command: |
          aws cloudfront update-distribution --id <DIST_ID> \
            --distribution-config file:///tmp/dist-config-backup.json \
            --if-match <CURRENT_ETAG>
        risk: "medium"
        requires_approval: true
        estimated_impact:
          cost: "ліҖкІҪ м—ҶмқҢ (CloudFront л°°нҸ¬ мһҗмІҙ л№„мҡ© кө¬мЎ° мң м§Җ)"
          duration: "CloudFront л°°нҸ¬ м „нҢҢ мөңлҢҖ 15л¶„"
          blast_radius: "л°°нҸ¬ м „нҢҢ мӨ‘ мқјл¶Җ м—Јм§Җ лЎңмјҖмқҙм…ҳм—җм„ң мқјмӢңм Ғ мқёмҰқм„ң л¶Ҳмқјм№ҳ к°ҖлҠҘ"

  - root_cause_code: "CERT-VALIDATION-FAILED"
    actions:
      - order: 1
        name: "DNS кІҖмҰқ л ҲмҪ”л“ң м¶”к°Җ"
        type: "aws_cli"
        command: |
          # ACMм—җм„ң мҡ”кө¬н•ҳлҠ” CNAME л ҲмҪ”л“ң нҷ•мқё
          aws acm describe-certificate --certificate-arn <CERT_ARN> \
            --query 'Certificate.DomainValidationOptions[*].ResourceRecord'
          # Route 53м—җ CNAME л ҲмҪ”л“ң мһҗлҸҷ м¶”к°Җ
          aws route53 change-resource-record-sets --hosted-zone-id <ZONE_ID> \
            --change-batch '{
              "Changes": [{
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "<CNAME_NAME>",
                  "Type": "CNAME",
                  "TTL": 300,
                  "ResourceRecords": [{"Value": "<CNAME_VALUE>"}]
                }
              }]
            }'
        rollback_command: |
          aws route53 change-resource-record-sets --hosted-zone-id <ZONE_ID> \
            --change-batch '{"Changes":[{"Action":"DELETE","ResourceRecordSet":{"Name":"<CNAME_NAME>","Type":"CNAME","TTL":300,"ResourceRecords":[{"Value":"<CNAME_VALUE>"}]}}]}'
        risk: "low"
        requires_approval: false
        estimated_impact:
          cost: "Route 53 л ҲмҪ”л“ң ліҖкІҪ л№„мҡ© лҜёлҜё ($0.0015/л ҲмҪ”л“ң)"
          duration: "DNS TTL кё°мӨҖ м „нҢҢ мӢңк°„ + ACM кІҖмҰқ мөңлҢҖ 30л¶„"
          blast_radius: "DNS л ҲмҪ”л“ң ліҖкІҪл§ҢмқҙлҜҖлЎң м„ңл№„мҠӨ мҳҒн–Ҙ м—ҶмқҢ"

guardrails:
  pre_conditions:
    - description: "нҳ„мһ¬ мқёмҰқм„ң мғҒнғң л°Ҹ л§ҢлЈҢмқј нҷ•мқё"
      check: "aws acm describe-certificate --certificate-arn <CERT_ARN> --query 'Certificate.[Status,NotAfter]'"
      block: false
    - description: "DNS л ҲмҪ”л“ң нҺём§‘ к¶Ңн•ң л°Ҹ Route 53 нҳёмҠӨнҢ… мҳҒм—ӯ м ‘к·ј нҷ•мқё"
      check: "aws route53 list-hosted-zones --query 'HostedZones[?Name==`<DOMAIN>.`].Id'"
      block: true
  post_conditions:
    - description: "мқёмҰқм„ң мғҒнғң ISSUED нҷ•мқё"
      check: "aws acm describe-certificate --certificate-arn <CERT_ARN> --query 'Certificate.Status'"
      auto_rollback: false

verification:
  checks:
    - name: "HTTPS м •мғҒ"
      method: "CloudWatch Metrics"
      expected: "мқёмҰқм„ң мҳӨлҘҳ мҶҢл©ё, HTTPS м •мғҒ м—°кІ°"
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "ClientTLSNegotiationErrorCount"
        statistic: "Sum"
        threshold: "= 0"
    - name: "мқёмҰқм„ң мғҒнғң ISSUED"
      method: "AWS CLI"
      expected: "Certificate.Status = ISSUED"
      cli: "aws acm describe-certificate --certificate-arn <CERT_ARN> --query 'Certificate.Status'"
    - name: "CloudFront 5xx м—җлҹ¬мңЁ м •мғҒ"
      method: "CloudWatch Metrics"
      expected: "5xxErrorRate < 0.1%"
      metric:
        namespace: "AWS/CloudFront"
        metric_name: "5xxErrorRate"
        statistic: "Average"
        threshold: "< 0.001"
  stability_window: 300
  success_criteria: "HTTPS м •мғҒ м—°кІ°, мқёмҰқм„ң ISSUED"

escalation:
  auto_remediate: false
  approval_required: false
  escalation_timeout: 300
  notify: ["oncall"]
