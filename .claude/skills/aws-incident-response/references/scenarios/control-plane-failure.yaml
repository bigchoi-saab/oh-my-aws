schema: decision-knowledge-record/v1

metadata:
  id: "control-plane-failure"
  name: "AWS 제어 평면 장애"
  description: "AWS API (제어 평면) 호출 불가로 리소스 생성/수정/삭제 불가. 실행 중 워크로드는 영향 없음"
  category: "platform"
  service: "multi"
  severity: "high"
  tags: ["control-plane", "api", "create", "update", "delete"]
  source_refs:
    - title: "AWS Service Health Dashboard"
      url: "https://health.aws.amazon.com/health/home"
      type: "official_doc"

triggers:
  - type: "log_pattern"
    description: "AWS API 호출 실패 (ServiceUnavailable, InternalError, Throttling)"
    condition: "CloudTrail에서 다수 서비스 API 호출 실패 패턴"

symptoms:
  - id: "s1"
    description: "리소스 생성/수정/삭제 API 호출 실패"
    detection_method: "CloudTrail 이벤트"
  - id: "s2"
    description: "실행 중 워크로드는 정상 동작 (데이터 평면 생존)"
    detection_method: "메트릭 정상"

diagnosis:
  decision_tree:
    - step: 1
      question: "어느 서비스의 API가 영향받는가?"
      check:
        cli: "CloudTrail에서 실패한 eventSource별 집계"
      branches:
        - condition: "다수 서비스 동시 실패"
          result: "CP-WIDE"
          next_step: 0
        - condition: "특정 서비스만"
          result: "CP-ISOLATED"
          next_step: 0

root_causes:
  - code: "CP-WIDE"
    name: "광범위 제어 평면 장애"
    description: "다수 AWS 서비스의 API 인프라 문제"
    probability: "low"
  - code: "CP-ISOLATED"
    name: "특정 서비스 제어 평면 장애"
    description: "특정 서비스의 API 처리 불가"
    probability: "medium"

remediation:
  - root_cause_code: "CP-WIDE"
    actions:
      - order: 1
        name: "AWS Health 이벤트 및 Service Health Dashboard 확인"
        type: "aws_cli"
        command: |
          aws health describe-events \
            --filter eventStatusCodes=open,eventTypeCategories=issue \
            --query 'events[*].[service,region,statusCode,startTime]'
        rollback_command: |
          echo "조회 전용 작업 — 롤백 불필요"
        risk: "low"
        requires_approval: false
        estimated_impact:
          cost: "없음 (읽기 전용 조회)"
          duration: "1분 미만"
          blast_radius: "없음"
      - order: 2
        name: "AWS Support 케이스 생성"
        type: "aws_cli"
        command: |
          aws support create-case \
            --subject 'Control plane failure impacting multiple services' \
            --service-code amazon-ec2 \
            --severity-code urgent \
            --category-code general-guidance \
            --communication-body 'Multiple AWS API calls failing with InternalError/ServiceUnavailable. Health event: <EVENT_ID>'
        rollback_command: |
          echo "Support 케이스는 닫기 가능: aws support resolve-case --case-id <CASE_ID>"
        risk: "low"
        requires_approval: true
        estimated_impact:
          cost: "없음 (Business/Enterprise Support 플랜 포함)"
          duration: "케이스 생성 1분, AWS 응답 SLA: Urgent = 1시간"
          blast_radius: "없음"
      - order: 3
        name: "실행 중 워크로드 데이터 평면 상태 확인"
        type: "aws_cli"
        command: |
          # EC2 인스턴스 상태 확인
          aws ec2 describe-instance-status --include-all-instances \
            --query 'InstanceStatuses[?InstanceState.Name!=`running`].[InstanceId,InstanceState.Name]'
          # ECS 서비스 상태 확인
          aws ecs list-clusters --query 'clusterArns' | xargs -I{} aws ecs describe-clusters --clusters {} --query 'clusters[*].[clusterName,status,runningTasksCount]'
        rollback_command: |
          echo "상태 확인 전용 — 롤백 불필요"
        risk: "low"
        requires_approval: false
        estimated_impact:
          cost: "없음 (읽기 전용)"
          duration: "2~5분"
          blast_radius: "없음 — 제어 평면 장애 중에도 데이터 평면은 독립 동작"

  - root_cause_code: "CP-ISOLATED"
    actions:
      - order: 1
        name: "영향받는 서비스 API 호출 격리 및 지수 백오프 재시도"
        type: "aws_cli"
        command: |
          # 특정 서비스 API 상태 테스트 (예: EC2)
          aws ec2 describe-regions --query 'Regions[0].RegionName'
          # CloudTrail에서 실패한 API 집계
          aws cloudtrail lookup-events \
            --lookup-attributes AttributeKey=EventName,AttributeValue=RunInstances \
            --start-time $(date -u -d '1 hour ago' +%Y-%m-%dT%H:%M:%SZ) \
            --query 'Events[?contains(CloudTrailEvent,`errorCode`)].{Time:EventTime,Error:CloudTrailEvent}'
        rollback_command: |
          echo "재시도 조회 — 롤백 불필요"
        risk: "low"
        requires_approval: false
        estimated_impact:
          cost: "없음"
          duration: "재시도 간격: 1s, 2s, 4s, 8s, 16s (최대 5회)"
          blast_radius: "해당 서비스 프로비저닝 작업 지연, 실행 중 워크로드 영향 없음"
      - order: 2
        name: "대체 리전으로 임시 리소스 프로비저닝 (CP-ISOLATED 장기화 시)"
        type: "aws_cli"
        command: |
          # 대체 리전에서 동일 리소스 타입 테스트
          aws ec2 describe-availability-zones --region <BACKUP_REGION>
          # 필요 시 대체 리전 리소스 생성 (예: EC2)
          aws ec2 run-instances --region <BACKUP_REGION> \
            --image-id <AMI_ID> --instance-type <TYPE> \
            --key-name <KEY> --subnet-id <SUBNET_ID> \
            --count 1
        rollback_command: |
          aws ec2 terminate-instances --region <BACKUP_REGION> --instance-ids <INSTANCE_ID>
        risk: "medium"
        requires_approval: true
        estimated_impact:
          cost: "대체 리전 리소스 비용 발생 (EC2 기준 시간당 과금)"
          duration: "프로비저닝 5~10분"
          blast_radius: "대체 리전 리소스 추가 비용, 데이터 동기화 고려 필요"

guardrails:
  pre_conditions:
    - description: "AWS Service Health Dashboard에서 공식 장애 이벤트 존재 여부 확인"
      check: "aws health describe-events --filter eventStatusCodes=open --query 'events[*].[service,statusCode]'"
      block: false
    - description: "데이터 평면(실행 중 워크로드)이 정상 동작 중인지 확인 후 제어 평면 우회 조치 진행"
      check: "실행 중 EC2/ECS/RDS 서비스 메트릭 정상 여부 (CPUUtilization, NetworkIn 등)"
      block: false
  post_conditions:
    - description: "API 호출 복구 확인"
      check: "aws ec2 describe-regions 정상 응답 반환"
      auto_rollback: false

verification:
  checks:
    - name: "API 호출 복구"
      method: "AWS CLI"
      expected: "API 성공률 > 99%"
      cli: "aws ec2 describe-regions --query 'Regions[0].RegionName'"
    - name: "CloudTrail API 오류율 감소"
      method: "CloudWatch Metrics"
      expected: "API 오류 이벤트 소멸"
      metric:
        namespace: "CloudTrailMetrics"
        metric_name: "ErrorCount"
        statistic: "Sum"
        threshold: "= 0"
    - name: "AWS Health 이벤트 해결"
      method: "AWS CLI"
      expected: "open 상태 이벤트 없음"
      cli: "aws health describe-events --filter eventStatusCodes=open --query 'events[*].eventArn'"
  stability_window: 600
  success_criteria: "API 호출 복구, 서비스 정상"

escalation:
  auto_remediate: false
  approval_required: false
  escalation_timeout: 300
  notify: ["oncall"]
