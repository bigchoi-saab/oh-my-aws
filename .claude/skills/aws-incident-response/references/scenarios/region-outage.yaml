schema: decision-knowledge-record/v1

metadata:
  id: "region-outage"
  name: "리전 장애"
  description: "AWS 리전 전체 서비스 장애로 인해 해당 리전 내 모든 서비스 영향"
  category: "platform"
  service: "multi"
  severity: "critical"
  tags: ["region", "outage", "disaster-recovery", "dr"]
  source_refs:
    - title: "AWS Disaster Recovery"
      url: "https://docs.aws.amazon.com/disaster-recovery/"
      type: "official_doc"
    - title: "Multi-Region DR Architecture"
      url: "https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/disaster-recovery.html"
      type: "well_architected"

triggers:
  - type: "event_bridge"
    description: "AWS Health 리전 이벤트"
    condition: "source=aws.health AND detail.eventTypeCategory=issue AND detail.eventScopeCode=PUBLIC"

symptoms:
  - id: "s1"
    description: "해당 리전 모든 서비스 에러"
    detection_method: "AWS Health Dashboard + CW Metrics"
  - id: "s2"
    description: "다수 서비스 동시 장애"

diagnosis:
  decision_tree:
    - step: 1
      question: "AWS Health 리전 이벤트가 공식적인가?"
      check:
        cli: "aws health describe-events --filter eventStatusCodes=open --region us-east-1"
      branches:
        - condition: "PUBLIC 이벤트 존재"
          result: "REGION-AWS-OUTAGE"
          next_step: 0
        - condition: "이벤트 없음"
          result: "REGION-APP-LEVEL"
          next_step: 0

root_causes:
  - code: "REGION-AWS-OUTAGE"
    name: "AWS 리전 전체 장애"
    description: "AWS 인프라 문제으로 리전 내 모든 서비스 영향"
    probability: "low"
  - code: "REGION-APP-LEVEL"
    name: "리전 수준 애플리케이션 문제"
    description: "DR 리전으로 페일오버,한 애플리케이션에 영향"
    probability: "medium"

remediation:
  - root_cause_code: "REGION-AWS-OUTAGE"
    actions:
      - order: 1
        name: "AWS Support 케이스 생성"
        type: "aws_cli"
        command: |
          aws support create-case \
            --subject 'REGION OUTAGE: <REGION> all services impacted' \
            --service-code general-info \
            --severity-code critical \
            --category-code general-guidance \
            --communication-body 'Full region outage detected. Health event: <EVENT_ARN>. All services in <REGION> are impacted.'
        rollback_command: |
          aws support resolve-case --case-id <CASE_ID>
        risk: "low"
        requires_approval: true
        estimated_impact:
          cost: "없음 (Business/Enterprise Support 플랜 포함)"
          duration: "케이스 생성 1분, AWS 응답 SLA: Critical = 15분"
          blast_radius: "없음"
      - order: 2
        name: "DR 리전으로 트래픽 라우팅"
        type: "aws_cli"
        command: |
          # Route 53 Failover 레코드 활성화
          aws route53 change-resource-record-sets \
            --hosted-zone-id <ZONE_ID> \
            --change-batch '{
              "Changes": [{
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "<DOMAIN>",
                  "Type": "A",
                  "SetIdentifier": "DR",
                  "Failover": "PRIMARY",
                  "AliasTarget": {
                    "HostedZoneId": "<DR_ALB_ZONE_ID>",
                    "DNSName": "<DR_ALB_DNS>",
                    "EvaluateTargetHealth": true
                  }
                }
              }]
            }'
        rollback_command: |
          aws route53 change-resource-record-sets \
            --hosted-zone-id <ZONE_ID> \
            --change-batch '{
              "Changes": [{
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "<DOMAIN>",
                  "Type": "A",
                  "SetIdentifier": "PRIMARY",
                  "Failover": "PRIMARY",
                  "AliasTarget": {
                    "HostedZoneId": "<PRIMARY_ALB_ZONE_ID>",
                    "DNSName": "<PRIMARY_ALB_DNS>",
                    "EvaluateTargetHealth": true
                  }
                }
              }]
            }'
        risk: "high"
        requires_approval: true
        estimated_impact:
          cost: "DR 리전 리소스 운영 비용 발생 (EC2, RDS, ECS 등)"
          duration: "Route 53 전파 60초, 서비스 복구까지 5~10분"
          blast_radius: "전체 서비스 트래픽이 DR 리전으로 전환 — DR 리전 용량 사전 확인 필요"
      - order: 3
        name: "비중요 서비스 축소 (Graceful degradation)"
        type: "aws_cli"
        command: |
          # ECS 비중요 서비스 중단
          aws ecs update-service \
            --cluster <DR_CLUSTER> \
            --service <NON_CRITICAL_SERVICE> \
            --desired-count 0
          # Auto Scaling 비중요 그룹 최소화
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name <NON_CRITICAL_ASG> \
            --min-size 0 --desired-capacity 0
        rollback_command: |
          aws ecs update-service \
            --cluster <DR_CLUSTER> \
            --service <NON_CRITICAL_SERVICE> \
            --desired-count <ORIGINAL_COUNT>
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name <NON_CRITICAL_ASG> \
            --min-size <ORIGINAL_MIN> --desired-capacity <ORIGINAL_DESIRED>
        risk: "medium"
        requires_approval: true
        estimated_impact:
          cost: "비중요 서비스 중단으로 해당 리소스 비용 절감"
          duration: "서비스 축소 1~3분"
          blast_radius: "비중요 서비스 사용 불가 — 핵심 비즈니스 기능에는 영향 없음"

guardrails:
  pre_conditions:
    - description: "DR 리전 페일오버 전 데이터 일관성 확인"
      check: "aws s3api get-bucket-replication --bucket <PRIMARY_BUCKET> --query 'ReplicationConfiguration.Rules[*].Status'"
      block: true
    - description: "DR 리전 리소스 준비 상태 및 용량 확인 (ECS 서비스, RDS, ALB 정상 여부)"
      check: "aws ecs describe-services --cluster <DR_CLUSTER> --services <CRITICAL_SERVICES> --region <DR_REGION> --query 'services[*].[serviceName,status,runningCount]'"
      block: true
  post_conditions:
    - description: "DR 리전 후 서비스 정상 확인"
      check: "모든 DR 리전 서비스 헬스체크 정상"
      auto_rollback: false

verification:
  checks:
    - name: "DR 리전 서비스 정상"
      method: "AWS CLI"
      expected: "DR 리전 ECS 서비스 runningCount > 0"
      cli: "aws ecs describe-services --cluster <DR_CLUSTER> --services <CRITICAL_SERVICES> --region <DR_REGION> --query 'services[*].[serviceName,runningCount,desiredCount]'"
    - name: "Route 53 DNS 전파 확인"
      method: "AWS CLI"
      expected: "DNS 레코드가 DR 리전 엔드포인트를 가리킴"
      cli: "aws route53 test-dns-answer --hosted-zone-id <ZONE_ID> --record-name <DOMAIN> --record-type A --query 'RecordData'"
    - name: "AWS Health 이벤트 상태"
      method: "AWS CLI"
      expected: "리전 장애 이벤트 open 상태 유지 중 또는 resolved"
      cli: "aws health describe-events --filter eventStatusCodes=open,regions=<AFFECTED_REGION> --query 'events[*].[service,statusCode,startTime]'"
    - name: "프라이머리 리전 복구 확인"
      method: "CloudWatch Metrics"
      expected: "프라이머리 리전 ALB HealthyHostCount > 0"
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "HealthyHostCount"
        statistic: "Average"
        threshold: "> 0"
  stability_window: 600
  success_criteria: "DR 리전 서비스 정상, 프라이머리 리전 복구"

escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 300
  notify: ["oncall", "management"]
