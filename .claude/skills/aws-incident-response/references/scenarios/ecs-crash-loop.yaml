schema: decision-knowledge-record/v1

metadata:
  id: "ecs-crash-loop"
  name: "ECS 태스크 크래시 루프"
  description: "ECS 태스크가 반복적으로 시작/중지되며 서비스 불능 상태"
  category: "compute"
  service: "ecs"
  severity: "critical"
  tags: ["ecs", "fargate", "crash-loop", "oom", "container"]
  source_refs:
    - title: "ECS Troubleshooting"
      url: "https://docs.aws.amazon.com/AmazonECS/latest/developerguide/troubleshooting.html"
      type: "official_doc"
    - title: "ECS Task Stopped (re:Post)"
      url: "https://repost.aws/knowledge-center/ecs-task-stopped"
      type: "repost_kc"
    - title: "ECS Deployment Failures (re:Post)"
      url: "https://repost.aws/knowledge-center/ecs-troubleshoot-deployment-failures"
      type: "repost_kc"

triggers:
  - type: "metric_threshold"
    description: "RunningTaskCount 급감 또는 RestartCount 증가"
    condition: "ECS/ContainerInsights.RestartCount.Sum > 0 OR AWS/ECS.RunningTaskCount < desired × 0.5"
    metrics:
      - namespace: "ECS/ContainerInsights"
        metric_name: "RestartCount"
        statistic: "Sum"
        period: 60
        threshold: 0
        comparison_operator: "GreaterThanThreshold"

symptoms:
  - id: "s1"
    description: "태스크가 반복 중지/시작"
    detection_method: "ECS 서비스 이벤트 또는 RunningTaskCount 급감"
    cli: "aws ecs describe-services --cluster <CLUSTER> --services <SERVICE> --query 'services[0].events[:5]'"
  - id: "s2"
    description: "배포 서킷 브레이커 활성화"
    detection_method: "서비스 이벤트에 'circuit breaker' 메시지"
  - id: "s3"
    description: "헬스 체크 반복 실패"
    detection_method: "ALB Target Group UnHealthyHostCount > 0"

diagnosis:
  decision_tree:
    - step: 1
      question: "태스크 중지 사유와 exitCode는?"
      check:
        cli: |
          aws ecs describe-tasks --cluster <CLUSTER> --tasks <TASK_ARN> \
            --query 'tasks[0].{StoppedReason:stoppedReason, ExitCode:containers[0].exitCode}'
      branches:
        - condition: "exitCode = 137"
          result: "ECS-OOM"
          next_step: 0
        - condition: "exitCode = 1"
          result: "ECS-APP-ERROR"
          next_step: 0
        - condition: "stoppedReason contains 'CannotPullContainerError'"
          result: "ECS-IMAGE-PULL"
          next_step: 0
        - condition: "stoppedReason contains 'ResourceInitializationError'"
          result: "ECS-SECRET-INIT"
          next_step: 0
        - condition: "exitCode = 0 but health check failing"
          result: "ECS-HEALTH-FAIL"
          next_step: 0
        - condition: "exitCode = 143 (SIGTERM)"
          result: "ECS-NORMAL-SHUTDOWN"
          next_step: 0

root_causes:
  - code: "ECS-OOM"
    name: "OOM Kill (메모리 부족)"
    description: "컨테이너 메모리 한계 초과로 SIGKILL 수신"
    probability: "high"
    related_symptoms: ["s1"]
  - code: "ECS-APP-ERROR"
    name: "애플리케이션 런타임 에러"
    description: "애플리케이션 코드 예외로 인한 비정상 종료"
    probability: "high"
    related_symptoms: ["s1", "s2"]
  - code: "ECS-IMAGE-PULL"
    name: "컨테이너 이미지 Pull 실패"
    description: "ECR 이미지 접근 권한 또는 네트워크 문제"
    probability: "medium"
    related_symptoms: ["s1"]
  - code: "ECS-SECRET-INIT"
    name: "Secrets Manager/SSM Parameter 접근 실패"
    description: "태스크 실행 역할의 IAM 권한 부족"
    probability: "medium"
    related_symptoms: ["s1"]
  - code: "ECS-HEALTH-FAIL"
    name: "헬스 체크 반복 실패"
    description: "컨테이너 시작 완료 후 헬스 체크 엔드포인트 응답 불가"
    probability: "medium"
    related_symptoms: ["s1", "s3"]

remediation:
  - root_cause_code: "ECS-OOM"
    actions:
      - order: 1
        name: "태스크 메모리 한계 증설"
        type: "aws_cli"
        command: |
          aws ecs register-task-definition --family <TD_FAMILY> \
            --memory <NEW_MEMORY> --container-definitions '...'
        rollback_command: |
          aws ecs update-service --cluster <CLUSTER> --service <SERVICE> \
            --task-definition <PREVIOUS_TD_ARN>
        risk: "medium"
        requires_approval: true
        estimated_impact: "메모리 비용 증가, 서비스 재배포"

  - root_cause_code: "ECS-APP-ERROR"
    actions:
      - order: 1
        name: "이전 태스크 정의로 롤백"
        type: "aws_cli"
        command: |
          aws ecs update-service --cluster <CLUSTER> --service <SERVICE> \
            --task-definition <PREVIOUS_TD_ARN> --force-new-deployment
        rollback_command: |
          aws ecs update-service --cluster <CLUSTER> --service <SERVICE> \
            --task-definition <CURRENT_TD_ARN>
        risk: "medium"
        requires_approval: true
        estimated_impact: "이전 버전으로 복원, 최근 변경사항 롤백"

  - root_cause_code: "ECS-IMAGE-PULL"
    actions:
      - order: 1
        name: "ECR 이미지 권한 및 존재 확인"
        type: "aws_cli"
        command: |
          aws ecr describe-images --repository-name <REPO> --image-ids imageTag=<TAG>
          aws ecs describe-task-definition --task-definition <TD> \
            --query 'taskDefinition.taskRoleArn'
        risk: "low"
        requires_approval: false
        estimated_impact: "읽기 전용 조사"

  - root_cause_code: "ECS-SECRET-INIT"
    actions:
      - order: 1
        name: "태스크 실행 역할 권한 확인 및 수정"
        type: "aws_cli"
        command: |
          aws iam list-attached-role-policies --role-name <EXECUTION_ROLE>
          aws secretsmanager describe-secret --secret-id <SECRET_ARN>
        risk: "low"
        requires_approval: false
        estimated_impact: "읽기 전용 조사"

  - root_cause_code: "ECS-HEALTH-FAIL"
    actions:
      - order: 1
        name: "헬스 체크 설정 조정"
        type: "aws_cli"
        command: |
          # ALB Target Group 헬스체크 설정 조정
          aws elbv2 modify-target-group --target-group-arn <TG_ARN> \
            --health-check-interval-seconds 30 \
            --health-check-timeout-seconds 10 \
            --healthy-threshold-count 3 \
            --unhealthy-threshold-count 3
        rollback_command: |
          aws elbv2 modify-target-group --target-group-arn <TG_ARN> \
            --health-check-interval-seconds <ORIGINAL>
        risk: "low"
        requires_approval: false
        estimated_impact: "헬스체크 감도 변경"

guardrails:
  pre_conditions:
    - description: "롤백 대상 태스크 정의가 존재하는지 확인"
      check: "aws ecs describe-task-definition --task-definition <PREVIOUS_TD_ARN>"
      block: true
  post_conditions:
    - description: "RunningTaskCount가 desired count와 일치"
      check: "ECS/ContainerInsights.RunningTaskCount = desired count for 5 minutes"
      auto_rollback: true

verification:
  checks:
    - name: "태스크 안정 실행"
      method: "CloudWatch Metrics"
      expected: "RunningTaskCount = desired count, RestartCount = 0 for 5 minutes"
    - name: "ALB 헬스체크 정상"
      method: "CloudWatch Metrics"
      expected: "UnHealthyHostCount = 0"
  stability_window: 300
  success_criteria: "RunningTaskCount = desired, UnHealthyHostCount = 0, RestartCount = 0"

escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 600
  notify: ["oncall"]
