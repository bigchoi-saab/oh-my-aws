schema: "decision-knowledge-record/v1"

metadata:
  id: "cloudfront-issue"
  name: "CloudFront Cache and 5xx Error"
  description: >
    CloudFront distributions return elevated 5xx error rates or serve stale content.
    Covers four root causes: origin server errors causing 502/504 (CF-ORIGIN),
    stale or incorrect cached content (CF-CACHE-STALE), TLS certificate issues
    on the origin causing SSL handshake failures (CF-CERT), and WAF rules
    blocking legitimate requests with 403 (CF-WAF). Diagnosis distinguishes
    edge-layer problems from origin-layer problems using OriginLatency metrics
    and x_edge_result_type from access logs.
  category: "network"
  service: "cloudfront"
  severity: "medium"
  tags:
    - cloudfront
    - 5xx
    - cache
    - origin
    - waf
    - tls
    - cdn
    - latency
  source_refs:
    - title: "CloudFront Troubleshooting"
      url: "https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/troubleshooting-distributions.html"
      type: "troubleshooting_guide"
    - title: "CloudFront Error Codes"
      url: "https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/http-errors.html"
      type: "official_doc"
    - title: "CloudFront Cache Invalidation"
      url: "https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/Invalidation.html"
      type: "official_doc"
    - title: "CloudFront and WAF Integration"
      url: "https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/distribution-web-awswaf.html"
      type: "official_doc"
    - title: "Troubleshoot CloudFront 5xx Errors (re:Post)"
      url: "https://repost.aws/knowledge-center/cloudfront-troubleshoot-5xx-errors"
      type: "repost_kc"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  type: "metric_threshold"
  description: "CloudFront 5xxErrorRate exceeds threshold or content staleness reported"
  condition: "5xxErrorRate > 1% OR 4xxErrorRate spike (WAF blocks)"
  log_query: |
    fields @timestamp, sc_status, x_edge_result_type, cs_uri_stem, time_taken
    | filter sc_status >= 500 OR sc_status = 403
    | stats count() as errorCount by sc_status, x_edge_result_type
    | sort errorCount desc

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "CloudFront 5xxErrorRate rising above 1% in CloudWatch"
    detection_method: "CloudWatch Metrics – AWS/CloudFront 5xxErrorRate"
    metric: "AWS/CloudFront | 5xxErrorRate | Average > 1"

  - id: "SYM-02"
    description: "Customers report stale or incorrect content not reflecting recent updates"
    detection_method: "User reports or automated content freshness check"

  - id: "SYM-03"
    description: "CloudFront returns 502 Bad Gateway – origin unreachable"
    detection_method: "CloudFront access logs x_edge_result_type = Error"

  - id: "SYM-04"
    description: "CloudFront returns 504 Gateway Timeout – origin response time exceeds timeout"
    detection_method: "CloudFront access logs sc_status = 504 and time_taken high"

  - id: "SYM-05"
    description: "CloudFront returns 403 Forbidden for requests that should succeed"
    detection_method: "CloudFront access logs sc_status = 403 and x_edge_result_type = Error"

  - id: "SYM-06"
    description: "SSL handshake failure between CloudFront and origin"
    detection_method: "CloudFront access logs x_edge_result_type = Error with SSL error"

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  decision_tree:
    - step: 1
      question: "Is OriginLatency elevated, or is the error rate present even at the edge without hitting origin?"
      check:
        cli: >
          aws cloudwatch get-metric-statistics
          --namespace AWS/CloudFront
          --metric-name OriginLatency
          --dimensions Name=DistributionId,Value=<DISTRIBUTION_ID> Name=Region,Value=Global
          --statistics Average p99
          --period 300
          --start-time $(date -u -d '30 minutes ago' +%FT%TZ)
          --end-time $(date -u +%FT%TZ)
      branches:
        - condition: "OriginLatency is high AND 5xx errors correlate"
          result: "CF-ORIGIN – origin server is slow or returning errors"
          next_step: 2
        - condition: "OriginLatency is normal but 5xx or 4xx errors present"
          result: "CF-WAF or CF-CERT or CF-CACHE-STALE – edge or policy issue"
          next_step: 3

    - step: 2
      question: "What HTTP status is the origin returning? Check CloudFront access logs for sc_status and x_edge_result_type."
      check:
        description: >
          Query CloudFront access logs in Athena or CloudWatch Logs Insights.
          x_edge_result_type values: Hit (cache), Miss (origin fetched), Error (origin error),
          LimitExceeded, CapacityExceeded.
        log_query: |
          fields @timestamp, sc_status, x_edge_result_type, x_edge_response_result_type, time_taken, cs_uri_stem
          | filter x_edge_result_type = "Error" OR sc_status >= 500
          | stats count() as cnt by sc_status, x_edge_result_type, x_edge_response_result_type
          | sort cnt desc
      branches:
        - condition: "sc_status = 502 or 503"
          result: "CF-ORIGIN – origin refusing connections or returning server errors"
          next_step: 0
        - condition: "sc_status = 504 or time_taken > origin_response_timeout"
          result: "CF-ORIGIN – origin response timeout, increase Origin Response Timeout"
          next_step: 0
        - condition: "x_edge_result_type = Error with SSL pattern"
          result: "CF-CERT – TLS handshake failure between CloudFront and origin"
          next_step: 5

    - step: 3
      question: "Are the 403 errors WAF-generated? Check WAF logs for matching rules."
      check:
        cli: >
          aws wafv2 get-web-acl-for-resource
          --resource-arn arn:aws:cloudfront::<ACCOUNT_ID>:distribution/<DISTRIBUTION_ID>
      branches:
        - condition: "WAF ACL associated and WAF logs show rule matches for the blocked requests"
          result: "CF-WAF – WAF rule blocking legitimate traffic"
          next_step: 4
        - condition: "No WAF or WAF not matching for these requests"
          result: "Check CF-CACHE-STALE or CF-CERT"
          next_step: 5

    - step: 4
      question: "Which WAF rule is triggering? Is it a managed rule group or custom rule?"
      check:
        cli: >
          aws wafv2 get-sampled-requests
          --web-acl-arn <WAF_ACL_ARN>
          --rule-metric-name <RULE_METRIC>
          --scope CLOUDFRONT
          --time-window StartTime=$(date -u -d '30 minutes ago' +%s),EndTime=$(date -u +%s)
          --max-items 100
      branches:
        - condition: "Managed rule group false positive (e.g., AWSManagedRulesCommonRuleSet)"
          result: "CF-WAF – add rule exception or switch rule to Count mode temporarily"
          next_step: 0
        - condition: "Custom rule overly broad match condition"
          result: "CF-WAF – narrow the custom rule condition"
          next_step: 0

    - step: 5
      question: "Is content stale? Does a hard refresh or cache-busted URL return fresh content?"
      check:
        description: >
          Request the same resource with a unique query parameter to bypass cache.
          Compare response body and Last-Modified / ETag headers.
      branches:
        - condition: "Cache-busted URL returns fresh content but normal URL is stale"
          result: "CF-CACHE-STALE – cached version not invalidated after content update"
          next_step: 0
        - condition: "Both cache-busted and normal URL are wrong"
          result: "CF-ORIGIN – origin is serving incorrect content"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "CF-ORIGIN"
    name: "Origin server errors or timeouts causing CloudFront 502/503/504"
    description: >
      The origin server (ALB, EC2, Lambda, S3) is returning 5xx errors or responding
      too slowly, causing CloudFront to return 502 or 504 to end users. CloudFront
      will retry on certain errors and can serve cached content if a custom error
      page is configured, but fresh requests to failed origins fail.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-03"
      - "SYM-04"

  - code: "CF-CACHE-STALE"
    name: "Stale cached content not reflecting origin updates"
    description: >
      CloudFront is serving a cached version of content that was updated at the origin.
      The cache TTL has not expired and no invalidation was issued. Users see outdated
      content despite origin being updated.
    probability: "medium"
    related_symptoms:
      - "SYM-02"

  - code: "CF-CERT"
    name: "TLS certificate issue on origin causing SSL handshake failure"
    description: >
      CloudFront cannot establish a TLS connection to the origin due to an expired
      certificate, hostname mismatch, self-signed certificate without custom origin
      SSL configuration, or ACM certificate not renewed. CloudFront requires a valid
      certificate on the origin when HTTPS is configured.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-03"
      - "SYM-06"

  - code: "CF-WAF"
    name: "WAF rule blocking legitimate requests with 403 Forbidden"
    description: >
      A WAF rule attached to the CloudFront distribution is matching legitimate
      traffic, returning 403 to end users. This may be a managed rule group
      false positive, an overly broad custom rule, or a legitimate security block
      that is catching more traffic than intended.
    probability: "medium"
    related_symptoms:
      - "SYM-05"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "CF-ORIGIN"
    actions:
      - order: 1
        name: "Increase CloudFront Origin Response Timeout"
        description: >
          If the origin is healthy but slow, increase the Origin Response Timeout
          to allow more time before CloudFront declares a gateway timeout.
          Maximum value is 60 seconds. Increasing this extends end-user latency
          for slow responses but prevents 504 errors for temporarily slow origins.
        type: "aws_cli"
        command: >
          aws cloudfront get-distribution-config
          --id <DISTRIBUTION_ID>
          --query 'DistributionConfig' > /tmp/cf-config.json
          # Edit /tmp/cf-config.json: set Origins.Items[].CustomOriginConfig.OriginResponseTimeout = 60
          aws cloudfront update-distribution
          --id <DISTRIBUTION_ID>
          --distribution-config file:///tmp/cf-config.json
          --if-match <ETAG>
        rollback_command: >
          aws cloudfront update-distribution
          --id <DISTRIBUTION_ID>
          --distribution-config file:///tmp/cf-config-backup.json
          --if-match <CURRENT_ETAG>
        risk: "low"
        requires_approval: false
        estimated_impact: >
          Distribution update propagates to all edge locations in 5-15 minutes.
          No user-facing disruption during propagation.

      - order: 2
        name: "Configure custom error page to serve cached fallback on 5xx"
        description: >
          Configure CloudFront to return a cached custom error page when the origin
          returns 502/503/504. This provides graceful degradation rather than
          exposing raw 5xx errors to users during origin recovery.
        type: "aws_cli"
        command: >
          aws cloudfront get-distribution-config
          --id <DISTRIBUTION_ID>
          --query 'DistributionConfig' > /tmp/cf-config.json
          # Edit: add CustomErrorResponses for 502, 503, 504 pointing to /error.html
          aws cloudfront update-distribution
          --id <DISTRIBUTION_ID>
          --distribution-config file:///tmp/cf-config.json
          --if-match <ETAG>
        rollback_command: >
          aws cloudfront update-distribution
          --id <DISTRIBUTION_ID>
          --distribution-config file:///tmp/cf-config-backup.json
          --if-match <CURRENT_ETAG>
        risk: "low"
        requires_approval: false
        estimated_impact: "Users see custom error page instead of browser-level 5xx during outage."

  - root_cause_code: "CF-CACHE-STALE"
    actions:
      - order: 1
        name: "Create CloudFront cache invalidation for stale paths"
        description: >
          Issue a cache invalidation for specific paths or wildcard patterns to force
          CloudFront to fetch fresh content from the origin. First 1,000 invalidation
          paths per month are free; additional paths are $0.005 each.
        type: "aws_cli"
        command: >
          aws cloudfront create-invalidation
          --distribution-id <DISTRIBUTION_ID>
          --paths '{"Quantity":1,"Items":["/<PATH_OR_WILDCARD>"]}'
        rollback_command: >
          echo "Invalidation cannot be undone. Origin must serve the previous version
          or re-issue invalidation after restoring original content at origin."
        risk: "low"
        requires_approval: false
        estimated_impact: >
          Cache invalidation propagates to all edge locations within 5-10 minutes.
          Origin traffic increases temporarily as edge caches are repopulated.
          Cost: $0.005 per path beyond 1,000 free paths/month.

  - root_cause_code: "CF-CERT"
    actions:
      - order: 1
        name: "Renew or replace the origin TLS certificate"
        description: >
          If the origin certificate is expired or invalid, renew it via ACM (for
          ALB/ELB origins) or update the certificate on the origin server.
          ACM certificates attached to ALB auto-renew if DNS validation is configured.
        type: "aws_cli"
        command: >
          aws acm describe-certificate
          --certificate-arn <CERT_ARN>
          --query 'Certificate.{Status:Status,NotAfter:NotAfter,DomainName:DomainName}'
        rollback_command: >
          echo "Certificate renewal is additive. Previous certificate remains valid until
          new one is successfully attached and verified."
        risk: "low"
        requires_approval: false
        estimated_impact: >
          Certificate renewal is transparent to end users.
          ACM certificates attached to ALB propagate automatically.

      - order: 2
        name: "Temporarily disable HTTPS to origin (HTTP only) to restore service"
        description: >
          As an emergency measure while certificate is being renewed, switch the
          CloudFront origin protocol policy to HTTP only. Only use if the origin
          is within a private network (VPC) where unencrypted traffic is acceptable.
          Re-enable HTTPS as soon as certificate is renewed.
        type: "aws_cli"
        command: >
          aws cloudfront get-distribution-config
          --id <DISTRIBUTION_ID>
          --query 'DistributionConfig' > /tmp/cf-config.json
          # Edit: set Origins.Items[].CustomOriginConfig.OriginProtocolPolicy = http-only
          aws cloudfront update-distribution
          --id <DISTRIBUTION_ID>
          --distribution-config file:///tmp/cf-config.json
          --if-match <ETAG>
        rollback_command: >
          aws cloudfront update-distribution
          --id <DISTRIBUTION_ID>
          --distribution-config file:///tmp/cf-config-backup.json
          --if-match <CURRENT_ETAG>
        risk: "high"
        requires_approval: true
        estimated_impact: >
          Traffic between CloudFront and origin is unencrypted.
          Only acceptable for private VPC origins. Must be reverted after cert renewal.

  - root_cause_code: "CF-WAF"
    actions:
      - order: 1
        name: "Switch blocking WAF rule to Count mode to stop blocking legitimate traffic"
        description: >
          Temporarily switch the offending WAF rule from Block to Count mode to stop
          blocking end users while the rule is investigated. Count mode logs matches
          without blocking. Review sampled requests to confirm the rule is causing
          false positives before permanently modifying the rule.
        type: "aws_cli"
        command: >
          aws wafv2 update-web-acl
          --name <WAF_ACL_NAME>
          --scope CLOUDFRONT
          --id <WAF_ACL_ID>
          --default-action Allow={}
          --rules file:///tmp/waf-rules-count-mode.json
          --visibility-config SampledRequestsEnabled=true,CloudWatchMetricsEnabled=true,MetricName=<METRIC>
          --lock-token <LOCK_TOKEN>
        rollback_command: >
          aws wafv2 update-web-acl
          --name <WAF_ACL_NAME>
          --scope CLOUDFRONT
          --id <WAF_ACL_ID>
          --rules file:///tmp/waf-rules-backup.json
          --lock-token <NEW_LOCK_TOKEN>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Switching rule to Count mode disables blocking for that rule.
          Legitimate security protection is reduced while in Count mode.
          Re-enable Block mode as soon as the false positive is resolved.

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Retrieve and save distribution ETag before any update-distribution call"
      check: >
        Run: aws cloudfront get-distribution-config --id <DISTRIBUTION_ID> --query ETag
        Store ETag value; it is required for the --if-match parameter in update-distribution.
      block: true

    - description: "Back up current distribution config before modification"
      check: >
        Save get-distribution-config output to /tmp/cf-config-backup.json before any edit.
      block: true

    - description: "WAF rule switch to Count mode must be time-boxed"
      check: >
        Set a reminder to re-enable Block mode within 1 hour of switching to Count mode.
        Count mode reduces security posture and must not persist indefinitely.
      block: false

    - description: "HTTP-only origin protocol is a last-resort emergency measure only"
      check: >
        HTTP-only origin protocol must only be used for private VPC origins.
        Requires explicit security team approval for internet-facing origins.
      block: true

  post_conditions:
    - description: "5xxErrorRate must return to baseline within 15 minutes after origin fix"
      check: >
        AWS/CloudFront 5xxErrorRate < 0.5% over a 5-minute window post-remediation.
      auto_rollback: false

    - description: "Cache invalidation must complete before verifying content freshness"
      check: >
        Run: aws cloudfront get-invalidation --distribution-id <ID> --id <INVALIDATION_ID>
        Wait for Status = Completed before testing content.
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "5xxErrorRate returned to baseline"
      method: "CloudWatch Metrics – AWS/CloudFront 5xxErrorRate"
      expected: "5xxErrorRate < 0.5% over 5-minute window"
      metric:
        namespace: "AWS/CloudFront"
        metric_name: "5xxErrorRate"
        statistic: "Average"
        threshold: "< 0.5"

    - name: "OriginLatency within normal range"
      method: "CloudWatch Metrics – AWS/CloudFront OriginLatency"
      expected: "OriginLatency p95 within historical baseline"
      metric:
        namespace: "AWS/CloudFront"
        metric_name: "OriginLatency"
        statistic: "p95"
        threshold: "within_baseline"

    - name: "Cache invalidation completed"
      method: "CloudFront get-invalidation status"
      expected: "Invalidation Status = Completed"
      cli: >
        aws cloudfront get-invalidation
        --distribution-id <DISTRIBUTION_ID>
        --id <INVALIDATION_ID>
        --query 'Invalidation.Status'

    - name: "Content freshness confirmed"
      method: "HTTP request to distribution URL with cache-busting disabled"
      expected: "Response body matches current origin content, ETag/Last-Modified reflects update time"

    - name: "WAF block count returns to expected level"
      method: "CloudWatch Metrics – WAF BlockedRequests"
      expected: "BlockedRequests count back to pre-incident baseline (no false positives)"
      metric:
        namespace: "AWS/WAFV2"
        metric_name: "BlockedRequests"
        statistic: "Sum"
        threshold: "at_baseline"

  stability_window: 300
  success_criteria: >
    All of the following for 5 consecutive minutes:
    (1) 5xxErrorRate < 0.5%,
    (2) OriginLatency within baseline,
    (3) Cache invalidation completed (if issued),
    (4) No unexpected WAF blocks.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 600
  notify:
    - oncall
    - platform-team
