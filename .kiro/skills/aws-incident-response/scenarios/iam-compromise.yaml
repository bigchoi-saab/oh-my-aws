schema: "decision-knowledge-record/v1"

metadata:
  id: "iam-compromise"
  name: "IAM Credential Compromise"
  description: >
    IAM access keys or role credentials are exfiltrated and used by an unauthorized actor.
    Covers identification of compromised credentials, blast radius assessment, immediate
    containment via key disablement and session revocation, post-compromise audit via
    CloudTrail and Athena, and credential rotation with verification.
  category: "security"
  service: "iam"
  severity: "critical"
  tags:
    - iam
    - credentials
    - access-key
    - guardduty
    - cloudtrail
    - security
    - compromise
    - exfiltration
  source_refs:
    - title: "AWS Security Incident Response Guide"
      url: "https://docs.aws.amazon.com/whitepapers/latest/aws-security-incident-response-guide/welcome.html"
      type: "official_doc"
    - title: "GuardDuty IAM Finding Types"
      url: "https://docs.aws.amazon.com/guardduty/latest/ug/guardduty_finding-types-iam.html"
      type: "official_doc"
    - title: "AWS Playbook – Compromised IAM Credentials"
      url: "https://github.com/aws-samples/aws-customer-playbook-framework/blob/main/docs/Compromised_IAM_Credentials.md"
      type: "playbook"
    - title: "IAM – Revoking Temporary Security Credentials"
      url: "https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles_use_revoke-sessions.html"
      type: "official_doc"
    - title: "CloudTrail – Querying Logs with Athena"
      url: "https://docs.aws.amazon.com/athena/latest/ug/cloudtrail-logs.html"
      type: "official_doc"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  type: "event_bridge"
  description: "GuardDuty IAM anomalous behavior finding OR unusual API call pattern OR billing spike"
  condition: >
    GuardDuty finding type contains 'IAMUser/AnomalousBehavior' OR
    CloudTrail shows API calls from unexpected geo/IP OR
    AWS Billing spike > 20% from baseline
  guardduty_finding_types:
    - "CredentialAccess:IAMUser/AnomalousBehavior"
    - "DefenseEvasion:IAMUser/AnomalousBehavior"
    - "Discovery:IAMUser/AnomalousBehavior"
    - "Exfiltration:IAMUser/AnomalousBehavior"
    - "Impact:IAMUser/AnomalousBehavior"
    - "InitialAccess:IAMUser/AnomalousBehavior"
    - "Persistence:IAMUser/AnomalousBehavior"
    - "Policy:IAMUser/RootCredentialUsage"
    - "PrivilegeEscalation:IAMUser/AnomalousBehavior"
    - "Recon:IAMUser/MaliciousIPCaller"
    - "Stealth:IAMUser/CloudTrailLoggingDisabled"
    - "UnauthorizedAccess:IAMUser/ConsoleLoginSuccess.B"
    - "UnauthorizedAccess:IAMUser/InstanceCredentialExfiltration"
    - "UnauthorizedAccess:IAMUser/MaliciousIPCaller"
    - "UnauthorizedAccess:IAMUser/TorIPCaller"

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "GuardDuty finding of IAM anomalous behavior or malicious IP caller"
    detection_method: "GuardDuty Findings console or EventBridge rule"
    metric: "GuardDuty | Findings | severity >= HIGH | IAM finding type"

  - id: "SYM-02"
    description: "CloudTrail shows API calls from unexpected source IP, region, or user agent"
    detection_method: "CloudTrail Insights or Athena query"
    log_query: |
      SELECT eventTime, userIdentity.arn, sourceIPAddress, eventName, awsRegion, errorCode
      FROM cloudtrail_logs
      WHERE userIdentity.accessKeyId = '<COMPROMISED_KEY_ID>'
        AND eventTime > '<COMPROMISE_TIME>'
      ORDER BY eventTime ASC

  - id: "SYM-03"
    description: "AWS Billing shows unexpected spike in service usage"
    detection_method: "AWS Cost Explorer or Billing Alerts"
    metric: "AWS/Billing | EstimatedCharges | sudden increase > 20% baseline"

  - id: "SYM-04"
    description: "IAM credential report shows access keys last used from unexpected time or location"
    detection_method: "IAM Credential Report download"

  - id: "SYM-05"
    description: "New IAM users, roles, or policies created outside of known change windows"
    detection_method: "CloudTrail – CreateUser, CreateRole, AttachUserPolicy events"

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  decision_tree:
    - step: 1
      question: "What are the compromised credentials? Identify the Access Key ID and IAM principal ARN."
      check:
        cli: >
          aws guardduty list-findings
          --detector-id <DETECTOR_ID>
          --finding-criteria '{"Criterion":{"severity":{"Gte":7}}}'
          --query 'FindingIds'

          aws guardduty get-findings
          --detector-id <DETECTOR_ID>
          --finding-ids <FINDING_IDS>
          --query 'Findings[*].{Type:Type,AccessKeyId:Resource.AccessKeyDetails.AccessKeyId,UserArn:Resource.AccessKeyDetails.UserArn,Principal:Service.Action.AwsApiCallAction.RemoteIpDetails}'
      branches:
        - condition: "Access Key ID and IAM ARN identified in GuardDuty finding"
          result: "CREDENTIALS_IDENTIFIED"
          next_step: 2
        - condition: "No GuardDuty finding – investigate CloudTrail directly"
          result: "MANUAL_INVESTIGATION"
          next_step: 2

    - step: 2
      question: "When did the compromise begin? Identify GuardDuty eventFirstSeen timestamp."
      check:
        cli: >
          aws guardduty get-findings
          --detector-id <DETECTOR_ID>
          --finding-ids <FINDING_IDS>
          --query 'Findings[*].{FirstSeen:Service.EventFirstSeen,LastSeen:Service.EventLastSeen,Count:Service.Count}'
      branches:
        - condition: "eventFirstSeen timestamp identified"
          result: "COMPROMISE_TIME_ESTABLISHED"
          next_step: 3
        - condition: "GuardDuty not enabled – check IAM credential report last-used timestamps"
          result: "USE_CREDENTIAL_REPORT"
          next_step: 3

    - step: 3
      question: "What API actions were performed post-compromise? Review CloudTrail for all actions by the compromised principal after eventFirstSeen."
      check:
        cli: >
          aws cloudtrail lookup-events
          --lookup-attributes AttributeKey=AccessKeyId,AttributeValue=<COMPROMISED_KEY_ID>
          --start-time <COMPROMISE_TIME>
          --end-time <NOW>
          --query 'Events[*].{Time:EventTime,Name:EventName,Resource:Resources[0].ResourceName,Source:CloudTrailEvent}'
        athena_query: |
          SELECT eventTime, eventName, eventSource, sourceIPAddress, awsRegion,
                 userIdentity.arn, requestParameters, responseElements, errorCode
          FROM cloudtrail_logs
          WHERE userIdentity.accessKeyId = '<COMPROMISED_KEY_ID>'
            AND eventTime >= '<COMPROMISE_TIME>'
          ORDER BY eventTime ASC
          LIMIT 1000
      branches:
        - condition: "API calls show resource creation (EC2, IAM, S3, Lambda, etc.)"
          result: "BLAST_RADIUS_CONFIRMED – document all created/modified resources"
          next_step: 0
        - condition: "API calls limited to read/list operations only"
          result: "DATA_EXFILTRATION_RISK – check S3 GetObject, SSM GetParameter events"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "IAM-KEY-LEAK"
    name: "Long-term access key exposed in code repository, logs, or environment variable"
    description: >
      IAM access keys (AKIA...) were committed to a public or private repository,
      included in application logs, or embedded in container images. Automated
      credential scanners or threat actors discovered and began using the key.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"

  - code: "IAM-ROLE-SSRF"
    name: "Instance or container role credentials exfiltrated via SSRF attack"
    description: >
      An SSRF vulnerability allowed an attacker to query the EC2 IMDSv1 metadata endpoint
      (169.254.169.254) or ECS task metadata, obtaining temporary credentials for the
      attached instance/task role. IMDSv2 not enforced.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"

  - code: "IAM-PHISHING"
    name: "Console credentials obtained via phishing or credential stuffing"
    description: >
      An IAM user's console password and MFA bypass were obtained through phishing.
      The attacker logged in via the console and may have created new access keys.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-04"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "IAM-KEY-LEAK"
    actions:
      - order: 1
        name: "IMMEDIATE – Disable compromised access key"
        description: >
          Disable the access key immediately to stop further API calls.
          Do NOT delete yet – retain for forensic evidence and to confirm
          no further calls appear in CloudTrail after disablement.
          WARNING: Assess blast radius first – disabling may break running workloads
          that depend on this key. Identify all services using the key before acting.
        type: "aws_cli"
        command: >
          aws iam update-access-key
          --access-key-id <COMPROMISED_KEY_ID>
          --status Inactive
          --user-name <IAM_USER_NAME>
        rollback_command: >
          aws iam update-access-key
          --access-key-id <COMPROMISED_KEY_ID>
          --status Active
          --user-name <IAM_USER_NAME>
        risk: "HIGH"
        requires_approval: true
        estimated_impact: >
          Any application or CI/CD pipeline using this access key will lose AWS API access
          immediately. Identify all consumers before executing. Coordinate with application
          owners to switch to a new key or IAM role-based access.

      - order: 2
        name: "Revoke active sessions for the IAM user"
        description: >
          Attach a deny-all inline policy to the IAM user to invalidate all existing
          console sessions and SDK sessions. This complements key disablement.
        type: "aws_cli"
        command: >
          aws iam put-user-policy
          --user-name <IAM_USER_NAME>
          --policy-name DenyAllAccess
          --policy-document '{
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Deny",
              "Action": "*",
              "Resource": "*"
            }]
          }'
        rollback_command: >
          aws iam delete-user-policy
          --user-name <IAM_USER_NAME>
          --policy-name DenyAllAccess
        risk: "HIGH"
        requires_approval: true
        estimated_impact: "All API and console access for this IAM user is immediately blocked."

      - order: 3
        name: "Revoke all temporary role sessions (if role was assumed)"
        description: >
          If the compromised credentials were used to assume an IAM role, revoke all
          active sessions for that role by attaching an AWSRevokeOlderSessions inline policy.
          This invalidates all tokens issued before the policy attachment time.
        type: "aws_cli"
        command: >
          aws iam put-role-policy
          --role-name <ROLE_NAME>
          --policy-name AWSRevokeOlderSessions
          --policy-document '{
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Deny",
              "Action": ["*"],
              "Resource": ["*"],
              "Condition": {
                "DateLessThan": {
                  "aws:TokenIssueTime": "<REVOCATION_TIMESTAMP_ISO8601>"
                }
              }
            }]
          }'
        rollback_command: >
          aws iam delete-role-policy
          --role-name <ROLE_NAME>
          --policy-name AWSRevokeOlderSessions
        risk: "HIGH"
        requires_approval: true
        estimated_impact: >
          All role sessions issued before <REVOCATION_TIMESTAMP_ISO8601> are immediately
          invalidated. Services using this role will need to re-assume it.

      - order: 4
        name: "Audit all resources created or modified post-compromise via Athena/CloudTrail"
        description: >
          Query CloudTrail logs in Athena to enumerate all create/modify/delete API calls
          made by the compromised credentials after the compromise timestamp. Build a complete
          list of resources to investigate, terminate, or remediate.
        type: "aws_cli"
        command: >
          # Query Athena for all mutating API calls by compromised credentials
          aws athena start-query-execution
          --query-string "SELECT eventTime, eventName, eventSource, awsRegion,
                          requestParameters, responseElements
                          FROM cloudtrail_logs
                          WHERE userIdentity.accessKeyId = '<COMPROMISED_KEY_ID>'
                            AND eventTime >= '<COMPROMISE_TIME>'
                            AND errorCode IS NULL
                            AND eventName NOT LIKE 'Get%'
                            AND eventName NOT LIKE 'List%'
                            AND eventName NOT LIKE 'Describe%'
                          ORDER BY eventTime ASC"
          --result-configuration OutputLocation=s3://<AUDIT_BUCKET>/athena-results/
          --query-execution-context Database=<CLOUDTRAIL_DB>
        rollback_command: "N/A – read-only audit action"
        risk: "LOW"
        requires_approval: false
        estimated_impact: "Athena query cost: ~$5 per TB scanned. Scope to date range to minimize cost."

      - order: 5
        name: "Rotate credentials – create new access key and delete compromised key"
        description: >
          After all consumers have been updated to use a new key or IAM role,
          create a replacement access key, update all dependent systems, then
          delete the compromised key permanently.
        type: "aws_cli"
        command: >
          # Create new key
          aws iam create-access-key --user-name <IAM_USER_NAME>

          # After updating all consumers, delete the compromised key
          aws iam delete-access-key
          --access-key-id <COMPROMISED_KEY_ID>
          --user-name <IAM_USER_NAME>
        rollback_command: "N/A – do not restore the compromised key. If needed, create another new key."
        risk: "LOW"
        requires_approval: false
        estimated_impact: "No service disruption if consumers are updated before key deletion."

  - root_cause_code: "IAM-ROLE-SSRF"
    actions:
      - order: 1
        name: "Enforce IMDSv2 on all EC2 instances to prevent SSRF-based credential theft"
        description: >
          Require IMDSv2 (token-based) on all instances to prevent SSRF attacks from
          accessing the metadata endpoint without a PUT request for a session token.
        type: "aws_cli"
        command: >
          aws ec2 modify-instance-metadata-options
          --instance-id <INSTANCE_ID>
          --http-tokens required
          --http-put-response-hop-limit 1
          --http-endpoint enabled
        rollback_command: >
          aws ec2 modify-instance-metadata-options
          --instance-id <INSTANCE_ID>
          --http-tokens optional
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Applications that query IMDSv1 directly (without PUT token) will break.
          Validate all instance applications support IMDSv2 before enforcing.

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "WARNING – disabling access key may break running workloads; assess blast radius first"
      check: >
        Before disabling the key, run:
        aws iam get-access-key-last-used --access-key-id <COMPROMISED_KEY_ID>
        Identify the service last using the key and notify the owning team.
        Search CI/CD systems, Secrets Manager, and Parameter Store for the key ID.
        Confirm no production traffic is actively using the key in the last 5 minutes.
      block: true

    - description: "Confirm GuardDuty or CloudTrail evidence before taking containment action"
      check: >
        Document the specific GuardDuty finding ID or CloudTrail event that triggered
        this response. Do not disable credentials based on billing alerts alone without
        corroborating CloudTrail evidence of unauthorized API calls.
      block: true

    - description: "Preserve forensic evidence before deleting any resources"
      check: >
        Do not delete the compromised access key or attacker-created resources until
        forensic snapshots, CloudTrail exports, and VPC Flow Log exports are complete.
        Evidence must be preserved for post-incident review and potential legal action.
      block: true

    - description: "AWSRevokeOlderSessions timestamp must be set to current time or later"
      check: >
        The DateLessThan aws:TokenIssueTime in the revocation policy must use the
        current UTC timestamp (not a future time) to ensure all existing sessions
        issued before now are revoked.
      block: true

  post_conditions:
    - description: "No new API calls from compromised credentials for 30 minutes post-containment"
      check: >
        Re-query CloudTrail 30 minutes after disabling the key:
        aws cloudtrail lookup-events
        --lookup-attributes AttributeKey=AccessKeyId,AttributeValue=<COMPROMISED_KEY_ID>
        --start-time <DISABLE_TIMESTAMP>
        Expect zero events returned.
      auto_rollback: false

    - description: "Error rate for dependent services must not increase post-remediation"
      check: >
        Monitor application error rates for 15 minutes after key disablement.
        If 5xx errors increase, verify all consumers have switched to new credentials.
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "No CloudTrail events from compromised key post-containment"
      method: "CloudTrail lookup-events or Athena query"
      expected: "Zero API calls from <COMPROMISED_KEY_ID> after disable timestamp"
      cli: >
        aws cloudtrail lookup-events
        --lookup-attributes AttributeKey=AccessKeyId,AttributeValue=<COMPROMISED_KEY_ID>
        --start-time <DISABLE_TIMESTAMP>
        --query 'Events | length(@)'

    - name: "Access key status is Inactive"
      method: "IAM list-access-keys"
      expected: "Status = Inactive for <COMPROMISED_KEY_ID>"
      cli: >
        aws iam list-access-keys
        --user-name <IAM_USER_NAME>
        --query 'AccessKeyMetadata[?AccessKeyId==`<COMPROMISED_KEY_ID>`].Status'

    - name: "No unauthorized IAM resources remain"
      method: "CloudTrail audit of attacker-created resources"
      expected: "All IAM users, roles, and policies created by attacker have been deleted or quarantined"
      cli: >
        aws iam list-users --query 'Users[?CreateDate>=`<COMPROMISE_TIME>`]'
        aws iam list-roles --query 'Roles[?CreateDate>=`<COMPROMISE_TIME>`]'

    - name: "GuardDuty findings resolved or suppressed with documented rationale"
      method: "GuardDuty console or CLI"
      expected: "All related findings are in ARCHIVED state with documented resolution"
      cli: >
        aws guardduty list-findings
        --detector-id <DETECTOR_ID>
        --finding-criteria '{"Criterion":{"updatedAt":{"Gte":<INCIDENT_START_EPOCH>}}}'

  stability_window: 1800
  success_criteria: >
    All of the following for 30 consecutive minutes:
    (1) Zero CloudTrail events from the compromised access key,
    (2) Key status confirmed Inactive,
    (3) No attacker-created IAM resources active,
    (4) Application error rates at pre-incident baseline.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 300
  notify:
    - security-team
    - oncall
    - ciso
