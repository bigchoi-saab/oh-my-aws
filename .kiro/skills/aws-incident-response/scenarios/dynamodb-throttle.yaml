schema: "decision-knowledge-record/v1"

metadata:
  id: "dynamodb-throttle"
  name: "DynamoDB Throttling"
  description: >
    DynamoDB returns ProvisionedThroughputExceededException or ThrottledRequests metric
    rises above zero. Covers three root causes (insufficient provisioned capacity,
    hot partition, burst capacity exhaustion) with structured decision-tree diagnosis,
    CLI-driven remediation including billing mode switch, and DAX caching.
  category: "database"
  service: "dynamodb"
  severity: "high"
  tags:
    - dynamodb
    - throttling
    - hot-partition
    - capacity
    - on-demand
    - provisioned
    - burst
    - dax
  source_refs:
    - title: "Amazon DynamoDB – Throughput Capacity for Reads and Writes"
      url: "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/HowItWorks.ReadWriteCapacityMode.html"
      type: "official_doc"
    - title: "Troubleshoot Amazon DynamoDB Throttling (re:Post)"
      url: "https://repost.aws/knowledge-center/dynamodb-table-throttled"
      type: "repost_kc"
    - title: "Amazon DynamoDB – Partitions and Data Distribution"
      url: "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/HowItWorks.Partitions.html"
      type: "official_doc"
    - title: "Amazon DynamoDB Auto Scaling"
      url: "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/AutoScaling.html"
      type: "official_doc"
    - title: "Amazon DynamoDB Accelerator (DAX)"
      url: "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/DAX.html"
      type: "official_doc"
    - title: "Best Practices for Designing and Architecting with DynamoDB"
      url: "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/best-practices.html"
      type: "official_doc"
    - title: "Well-Architected – Performance Efficiency: DynamoDB"
      url: "https://docs.aws.amazon.com/wellarchitected/latest/performance-efficiency-pillar/welcome.html"
      type: "well_architected"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  - type: "metric_threshold"
    description: "ThrottledRequests count rises above zero"
    condition: "AWS/DynamoDB ThrottledRequests Sum > 0 over 5 minutes"
  - type: "log_pattern"
    description: "Application returns ProvisionedThroughputExceededException"
    condition: "@message like 'ProvisionedThroughputExceededException'"
  - type: "metric_threshold"
    description: "ConsumedReadCapacityUnits or ConsumedWriteCapacityUnits approaches provisioned limit"
    condition: "ConsumedReadCapacityUnits / ProvisionedReadCapacityUnits > 0.80 OR ConsumedWriteCapacityUnits / ProvisionedWriteCapacityUnits > 0.80"

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "ThrottledRequests metric above zero (any operation type: GetItem, PutItem, Query, Scan)"
    detection_method: "CloudWatch Metrics"
    metric: "AWS/DynamoDB | ThrottledRequests | Sum > 0"

  - id: "SYM-02"
    description: "ProvisionedThroughputExceededException in application logs"
    detection_method: "CloudWatch Logs Insights on application log group"
    log_query: |
      fields @timestamp, @message
      | filter @message like "ProvisionedThroughputExceededException"
      | stats count() as throttleCount by bin(1m)
      | sort @timestamp desc

  - id: "SYM-03"
    description: "ConsumedReadCapacityUnits or ConsumedWriteCapacityUnits at or near provisioned limit"
    detection_method: "CloudWatch Metrics"
    metric: "AWS/DynamoDB | ConsumedReadCapacityUnits | Sum approaching ProvisionedReadCapacityUnits"

  - id: "SYM-04"
    description: "Throttled requests concentrated on specific partition keys (visible in CloudWatch Contributor Insights)"
    detection_method: "CloudWatch Contributor Insights for DynamoDB"
    cli: >
      aws dynamodb describe-contributor-insights
      --table-name <TABLE_NAME>

  - id: "SYM-05"
    description: "SuccessfulRequestLatency elevated despite low overall consumed capacity (burst exhausted)"
    detection_method: "CloudWatch Metrics"
    metric: "AWS/DynamoDB | SuccessfulRequestLatency | p99 elevated AND ThrottledRequests > 0"

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  decision_tree:
    - step: 1
      question: "Is ThrottledRequests > 0? Confirm throttling is occurring and identify the operation type."
      check:
        cli: >
          aws cloudwatch get-metric-statistics
          --namespace AWS/DynamoDB
          --metric-name ThrottledRequests
          --dimensions Name=TableName,Value=<TABLE_NAME>
          --statistics Sum
          --period 300
          --start-time $(date -u -d '30 minutes ago' +%FT%TZ)
          --end-time $(date -u +%FT%TZ)
      branches:
        - condition: "ThrottledRequests Sum > 0"
          result: "THROTTLING_CONFIRMED – identify billing mode"
          next_step: 2
        - condition: "ThrottledRequests = 0"
          result: "NOT_THROTTLING – investigate other latency sources"
          next_step: 0

    - step: 2
      question: "What is the table billing mode: On-Demand (PAY_PER_REQUEST) or Provisioned?"
      check:
        cli: >
          aws dynamodb describe-table
          --table-name <TABLE_NAME>
          --query 'Table.{BillingMode:BillingModeSummary.BillingMode,ReadCapacity:ProvisionedThroughput.ReadCapacityUnits,WriteCapacity:ProvisionedThroughput.WriteCapacityUnits}'
      branches:
        - condition: "BillingMode = PAY_PER_REQUEST (On-Demand)"
          result: "On-Demand tables can still throttle on hot partitions – proceed to step 4"
          next_step: 4
        - condition: "BillingMode = PROVISIONED"
          result: "Provisioned mode – check Auto Scaling and capacity headroom"
          next_step: 3

    - step: 3
      question: "Is DynamoDB Auto Scaling enabled and configured? Is consumed capacity close to provisioned?"
      check:
        cli: >
          aws application-autoscaling describe-scaling-policies
          --service-namespace dynamodb
          --resource-id table/<TABLE_NAME>
      branches:
        - condition: "Auto Scaling enabled AND consumed capacity near provisioned limit"
          result: "Auto Scaling lag – consumed exceeded provisioned before scale-out completed"
          next_step: 4
        - condition: "Auto Scaling NOT enabled AND consumed near provisioned limit"
          result: "DDB-CAPACITY – no automatic scaling, capacity insufficient"
          next_step: 0
        - condition: "Consumed well below provisioned but throttling still occurs"
          result: "DDB-HOT-PARTITION – uneven distribution causing per-partition throttle"
          next_step: 4

    - step: 4
      question: "Is throttling concentrated on specific partition keys? Check Contributor Insights."
      check:
        cli: >
          aws dynamodb describe-contributor-insights
          --table-name <TABLE_NAME>
      branches:
        - condition: "Contributor Insights shows top-N keys consuming disproportionate capacity"
          result: "DDB-HOT-PARTITION – partition key design flaw or access pattern skew"
          next_step: 0
        - condition: "Throttling distributed evenly across many partition keys"
          result: "DDB-CAPACITY or DDB-BURST – overall capacity or burst bucket exhausted"
          next_step: 5

    - step: 5
      question: "Is the throttling brief and episodic (burst) or sustained (capacity)?"
      check:
        cli: >
          aws cloudwatch get-metric-statistics
          --namespace AWS/DynamoDB
          --metric-name ThrottledRequests
          --dimensions Name=TableName,Value=<TABLE_NAME>
          --statistics Sum
          --period 60
          --start-time $(date -u -d '60 minutes ago' +%FT%TZ)
          --end-time $(date -u +%FT%TZ)
      branches:
        - condition: "ThrottledRequests spikes briefly then clears (< 5 minutes)"
          result: "DDB-BURST – burst capacity pool exhausted by traffic spike"
          next_step: 0
        - condition: "ThrottledRequests sustained > 5 minutes"
          result: "DDB-CAPACITY – provisioned capacity systematically insufficient"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "DDB-CAPACITY"
    name: "Provisioned throughput insufficient – consumed capacity exceeds provisioned RCU/WCU"
    description: >
      The table's provisioned ReadCapacityUnits or WriteCapacityUnits are too low for
      the current traffic volume. Either DynamoDB Auto Scaling is not enabled, or it
      cannot scale fast enough to absorb a sudden traffic spike. Results in sustained
      ThrottledRequests across all partition keys.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-03"

  - code: "DDB-HOT-PARTITION"
    name: "Hot partition – access pattern skewed to single or few partition key values"
    description: >
      DynamoDB distributes capacity evenly across partitions based on partition key.
      When a single partition key (or small set) receives disproportionately high
      traffic, that partition's per-key throughput limit is exceeded even if overall
      table capacity appears sufficient. Common causes: using monotonically increasing
      keys (timestamps, sequential IDs), user-specific data patterns, or celebrity
      items in social graphs.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-04"

  - code: "DDB-BURST"
    name: "Burst capacity exhausted – short spike consumed DynamoDB burst reserve"
    description: >
      DynamoDB provides burst capacity: unused capacity units from the previous 300
      seconds accumulate in a bucket (up to 5 minutes of unused capacity). A sudden
      traffic spike can exhaust the burst bucket, causing brief throttling even if
      the traffic level returns to normal provisioned capacity. Throttling is self-
      resolving once the burst bucket partially replenishes.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-05"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "DDB-CAPACITY"
    actions:
      - order: 1
        name: "Switch to On-Demand billing mode for immediate capacity relief"
        description: >
          Switching to On-Demand (PAY_PER_REQUEST) instantly removes provisioned capacity
          limits. DynamoDB scales to any traffic level automatically. Best for workloads
          with unpredictable or highly variable traffic. Cost is per request rather than
          per provisioned capacity unit.
        type: "aws_cli"
        command: >
          aws dynamodb update-table
          --table-name <TABLE_NAME>
          --billing-mode PAY_PER_REQUEST
        rollback_command: >
          aws dynamodb update-table
          --table-name <TABLE_NAME>
          --billing-mode PROVISIONED
          --provisioned-throughput ReadCapacityUnits=<PREVIOUS_RCU>,WriteCapacityUnits=<PREVIOUS_WCU>
        risk: "low"
        requires_approval: false
        estimated_impact: >
          On-Demand pricing: $0.25 per million WCU, $0.05 per million RCU (us-east-1).
          Can be more expensive than Provisioned for predictable high-throughput workloads.
          Note: Table can only be switched between billing modes once every 24 hours.

      - order: 2
        name: "Increase provisioned capacity (RCU/WCU) if remaining in Provisioned mode"
        description: >
          Manually increase ReadCapacityUnits or WriteCapacityUnits based on observed
          ConsumedReadCapacityUnits / ConsumedWriteCapacityUnits peaks from CloudWatch.
          Set to at least peak_consumed * 1.2 for headroom.
        type: "aws_cli"
        command: >
          aws dynamodb update-table
          --table-name <TABLE_NAME>
          --billing-mode PROVISIONED
          --provisioned-throughput ReadCapacityUnits=<NEW_RCU>,WriteCapacityUnits=<NEW_WCU>
        rollback_command: >
          aws dynamodb update-table
          --table-name <TABLE_NAME>
          --billing-mode PROVISIONED
          --provisioned-throughput ReadCapacityUnits=<PREVIOUS_RCU>,WriteCapacityUnits=<PREVIOUS_WCU>
        risk: "low"
        requires_approval: false
        estimated_impact: >
          Provisioned capacity pricing: $0.00065/RCU-hour, $0.00013/WCU-hour (us-east-1).
          Effective within seconds. DynamoDB scales capacity up immediately.

      - order: 3
        name: "Enable DynamoDB Auto Scaling to prevent future capacity exhaustion"
        description: >
          Enable Application Auto Scaling on the DynamoDB table to automatically adjust
          provisioned capacity based on CloudWatch target tracking. Set target utilization
          to 70% to provide buffer before throttling occurs.
        type: "aws_cli"
        command: >
          aws application-autoscaling register-scalable-target
          --service-namespace dynamodb
          --resource-id table/<TABLE_NAME>
          --scalable-dimension dynamodb:table:WriteCapacityUnits
          --min-capacity <MIN_WCU>
          --max-capacity <MAX_WCU> &&
          aws application-autoscaling put-scaling-policy
          --service-namespace dynamodb
          --resource-id table/<TABLE_NAME>
          --scalable-dimension dynamodb:table:WriteCapacityUnits
          --policy-name <TABLE_NAME>-write-scaling
          --policy-type TargetTrackingScaling
          --target-tracking-scaling-policy-configuration '{"TargetValue":70.0,"PredefinedMetricSpecification":{"PredefinedMetricType":"DynamoDBWriteCapacityUtilization"}}'
        rollback_command: >
          aws application-autoscaling deregister-scalable-target
          --service-namespace dynamodb
          --resource-id table/<TABLE_NAME>
          --scalable-dimension dynamodb:table:WriteCapacityUnits
        risk: "low"
        requires_approval: false
        estimated_impact: "Auto Scaling adjusts capacity within minutes of utilization change. Set max-capacity to control cost ceiling."

  - root_cause_code: "DDB-HOT-PARTITION"
    actions:
      - order: 1
        name: "Enable Contributor Insights to identify hot partition keys"
        description: >
          Enable CloudWatch Contributor Insights for DynamoDB to continuously monitor
          which partition keys consume the most read and write capacity. This is a
          prerequisite for hot partition diagnosis and ongoing monitoring.
        type: "aws_cli"
        command: >
          aws dynamodb update-contributor-insights
          --table-name <TABLE_NAME>
          --contributor-insights-action ENABLE
        rollback_command: >
          aws dynamodb update-contributor-insights
          --table-name <TABLE_NAME>
          --contributor-insights-action DISABLE
        risk: "low"
        requires_approval: false
        estimated_impact: "Contributor Insights incurs CloudWatch costs for metrics and rules."

      - order: 2
        name: "Add write sharding – append random suffix to partition key"
        description: >
          For write-heavy hot partitions, add a random numeric suffix (0-N) to the
          partition key to spread writes across N logical partitions. Reads must then
          query all N shards and merge. This is an application code change requiring
          data migration for existing items.
          Example: partition_key = original_key + "_" + random.randint(0, N-1)
        type: "code_change"
        command: >
          echo "Application code change required: add write sharding suffix to partition key.
          This is a data model change – existing items must be migrated to new key schema.
          Consider using DynamoDB Streams + Lambda for zero-downtime migration."
        rollback_command: >
          echo "Revert application code change and redeploy. Migrate data back to original key schema."
        risk: "high"
        requires_approval: true
        estimated_impact: >
          Code change + data migration required. Estimated effort: days to weeks depending
          on table size and migration strategy. Zero-downtime migration requires dual-write
          period. This is the only permanent fix for hot partition issues.

      - order: 3
        name: "Introduce DAX caching cluster to absorb hot read partition traffic"
        description: >
          DynamoDB Accelerator (DAX) is an in-memory caching layer that intercepts
          DynamoDB reads and serves cached responses. For read-heavy hot partitions,
          DAX can absorb 99%+ of read traffic, eliminating read throttling without
          partition key redesign. Does not help for write hot partitions.
        type: "aws_cli"
        command: >
          aws dax create-cluster
          --cluster-name <DAX_CLUSTER_NAME>
          --node-type dax.r6g.large
          --replication-factor 3
          --iam-role-arn <DAX_IAM_ROLE_ARN>
          --subnet-group-name <SUBNET_GROUP_NAME>
          --security-group-ids <SG_IDS>
        rollback_command: >
          aws dax delete-cluster --cluster-name <DAX_CLUSTER_NAME>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          DAX cluster cost: dax.r6g.large ~$0.269/hour per node x 3 nodes = ~$580/month.
          Application must use DAX client SDK instead of DynamoDB SDK for reads.
          DAX only helps read hot partitions; write hot partitions require key redesign.

  - root_cause_code: "DDB-BURST"
    actions:
      - order: 1
        name: "Wait for burst capacity replenishment (self-resolving for brief spikes)"
        description: >
          DynamoDB burst capacity replenishes at the rate of unused provisioned capacity
          (up to 5 minutes of burst reserve = provisioned_capacity * 300 seconds).
          If the traffic spike is brief and has subsided, throttling will clear as the
          burst bucket refills. Monitor ThrottledRequests for clearing.
        type: "aws_cli"
        command: >
          aws cloudwatch get-metric-statistics
          --namespace AWS/DynamoDB
          --metric-name ThrottledRequests
          --dimensions Name=TableName,Value=<TABLE_NAME>
          --statistics Sum
          --period 60
          --start-time $(date -u -d '15 minutes ago' +%FT%TZ)
          --end-time $(date -u +%FT%TZ)
        rollback_command: >
          echo "No rollback needed – burst replenishment is automatic"
        risk: "low"
        requires_approval: false
        estimated_impact: "No cost impact. Burst bucket replenishes within 5 minutes if traffic normalizes."

      - order: 2
        name: "Increase provisioned capacity or switch to On-Demand to handle recurring burst patterns"
        description: >
          If burst throttling is recurring (daily traffic peaks, batch jobs, marketing events),
          increase provisioned capacity to cover the peak traffic level, or switch to
          On-Demand to handle unpredictable spikes without burst bucket dependency.
        type: "aws_cli"
        command: >
          aws dynamodb update-table
          --table-name <TABLE_NAME>
          --billing-mode PAY_PER_REQUEST
        rollback_command: >
          aws dynamodb update-table
          --table-name <TABLE_NAME>
          --billing-mode PROVISIONED
          --provisioned-throughput ReadCapacityUnits=<PREVIOUS_RCU>,WriteCapacityUnits=<PREVIOUS_WCU>
        risk: "low"
        requires_approval: false
        estimated_impact: >
          On-Demand eliminates burst-related throttling. Cost impact depends on traffic pattern.
          Note: Table can only switch billing modes once every 24 hours.

      - order: 3
        name: "Add DAX caching to reduce DynamoDB read pressure during traffic spikes"
        description: >
          DAX intercepts read requests and serves cached responses, reducing DynamoDB
          read consumption during traffic spikes. Effective when burst exhaustion is
          driven by read traffic spikes (GetItem, Query, Scan operations).
        type: "aws_cli"
        command: >
          aws dax create-cluster
          --cluster-name <DAX_CLUSTER_NAME>
          --node-type dax.r6g.large
          --replication-factor 3
          --iam-role-arn <DAX_IAM_ROLE_ARN>
          --subnet-group-name <SUBNET_GROUP_NAME>
          --security-group-ids <SG_IDS>
        rollback_command: >
          aws dax delete-cluster --cluster-name <DAX_CLUSTER_NAME>
        risk: "medium"
        requires_approval: true
        estimated_impact: "DAX cluster cost: ~$580/month for 3-node dax.r6g.large cluster."

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Billing mode can only be switched once every 24 hours"
      check: >
        Confirm the last billing mode change was more than 24 hours ago via
        describe-table BillingModeSummary.LastUpdateToPayPerRequestDateTime before
        issuing update-table with a billing mode change. Attempting a second switch
        within 24 hours will fail with ValidationException.
      block: true

    - description: "Hot partition redesign requires data migration planning"
      check: >
        Partition key schema changes are not possible in-place on existing DynamoDB tables.
        A new table with the new key schema must be created and data migrated.
        Confirm a migration plan (DynamoDB Streams, AWS DMS, or custom Lambda) exists
        before committing to the DDB-HOT-PARTITION code change remediation.
      block: true

    - description: "DAX cluster requires application SDK change"
      check: >
        DAX is not transparent – the application must use the DAX client SDK (dax-client)
        instead of the standard DynamoDB SDK to route reads through DAX.
        Confirm application supports DAX SDK before provisioning the cluster.
      block: false

    - description: "On-Demand mode is more expensive for predictable high-throughput workloads"
      check: >
        Calculate break-even point: On-Demand becomes more expensive than Provisioned
        when average consumed capacity exceeds ~80% of a comparable provisioned table cost.
        For sustained high-throughput workloads, increasing Provisioned + Auto Scaling
        is more cost-effective than On-Demand.
      block: false

  post_conditions:
    - description: "ThrottledRequests must drop to 0 after capacity increase or mode switch"
      check: "ThrottledRequests Sum = 0 over 5-minute window post-action"
      auto_rollback: false

    - description: "SuccessfulRequestLatency must return to pre-throttling baseline"
      check: "p99 latency at or below pre-throttling baseline"
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "ThrottledRequests cleared to zero"
      method: "CloudWatch Metrics – ThrottledRequests"
      expected: "ThrottledRequests Sum = 0 over 5-minute window"
      metric:
        namespace: "AWS/DynamoDB"
        metric_name: "ThrottledRequests"
        statistic: "Sum"
        threshold: "= 0"

    - name: "ConsumedReadCapacityUnits and ConsumedWriteCapacityUnits within capacity"
      method: "CloudWatch Metrics – Consumed vs Provisioned capacity"
      expected: "Consumed capacity < 80% of provisioned (Provisioned mode) or no throttle (On-Demand)"
      metric:
        namespace: "AWS/DynamoDB"
        metric_name: "ConsumedWriteCapacityUnits"
        statistic: "Sum"
        threshold: "< ProvisionedWriteCapacityUnits * 0.80 (per minute)"

    - name: "SuccessfulRequestLatency within baseline"
      method: "CloudWatch Metrics – SuccessfulRequestLatency"
      expected: "p99 at or below pre-throttling baseline"
      metric:
        namespace: "AWS/DynamoDB"
        metric_name: "SuccessfulRequestLatency"
        statistic: "p99"
        threshold: "<= pre_throttling_baseline"

    - name: "Application ProvisionedThroughputExceededException cleared"
      method: "CloudWatch Logs Insights on application log group"
      expected: "Zero ProvisionedThroughputExceededException in 5-minute window"
      log_query: |
        fields @timestamp, @message
        | filter @message like "ProvisionedThroughputExceededException"
        | stats count() as throttleCount by bin(5m)

    - name: "Billing mode confirmed (On-Demand if switched)"
      method: "aws dynamodb describe-table"
      expected: "BillingMode = PAY_PER_REQUEST if switched to On-Demand"
      cli: >
        aws dynamodb describe-table
        --table-name <TABLE_NAME>
        --query 'Table.BillingModeSummary.BillingMode'

    - name: "DAX cluster available (if provisioned)"
      method: "aws dax describe-clusters"
      expected: "ClusterStatus = available for DAX cluster"
      cli: >
        aws dax describe-clusters
        --cluster-names <DAX_CLUSTER_NAME>
        --query 'Clusters[0].Status'

  stability_window: 300
  success_criteria: >
    All of the following for 5 consecutive minutes:
    (1) ThrottledRequests Sum = 0,
    (2) ConsumedWriteCapacityUnits < 80% of provisioned (or no limit in On-Demand),
    (3) ConsumedReadCapacityUnits < 80% of provisioned (or no limit in On-Demand),
    (4) SuccessfulRequestLatency p99 at or below pre-throttling baseline,
    (5) Zero ProvisionedThroughputExceededException in application logs.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 900
  notify:
    - oncall
    - platform-team
    - data-team
