schema: "decision-knowledge-record/v1"

metadata:
  id: "network-unauthorized"
  name: "Unauthorized Network Access (SG/NACL/Route Changes)"
  description: >
    Unauthorized or unexpected changes to Security Groups, Network ACLs, or VPC
    Route Tables are detected, potentially exposing internal resources to the internet
    or enabling lateral movement within the VPC. Covers identification of the change
    via CloudTrail, verification of the unauthorized rule, immediate reversion, and
    identification of the IAM principal responsible for the change.
  category: "security"
  service: "multi"
  severity: "high"
  tags:
    - security-group
    - network-acl
    - route-table
    - vpc
    - cloudtrail
    - unauthorized-access
    - network
    - security
    - lateral-movement
  source_refs:
    - title: "AWS Security Incident Response Guide"
      url: "https://docs.aws.amazon.com/whitepapers/latest/aws-security-incident-response-guide/welcome.html"
      type: "official_doc"
    - title: "CloudTrail - Supported Events Reference (EC2)"
      url: "https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-aws-service-specific-topics.html"
      type: "official_doc"
    - title: "VPC Security Groups - Working with Security Groups"
      url: "https://docs.aws.amazon.com/vpc/latest/userguide/working-with-security-groups.html"
      type: "official_doc"
    - title: "AWS Playbook - Unauthorized Network Changes"
      url: "https://github.com/aws-samples/aws-customer-playbook-framework"
      type: "playbook"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  type: "event_bridge"
  description: "CloudTrail events for unauthorized SG ingress/egress, NACL entry, or Route changes"
  condition: >
    CloudTrail records any of the following events from an unexpected IAM principal,
    at an unexpected time, or without a corresponding change management ticket:
    AuthorizeSecurityGroupIngress, AuthorizeSecurityGroupEgress, RevokeSecurityGroupIngress,
    CreateRoute, ReplaceRoute, DeleteRoute, CreateNetworkAclEntry, ReplaceNetworkAclEntry,
    DeleteNetworkAclEntry
  cloudtrail_events:
    - "AuthorizeSecurityGroupIngress"
    - "AuthorizeSecurityGroupEgress"
    - "RevokeSecurityGroupIngress"
    - "RevokeSecurityGroupEgress"
    - "CreateNetworkAclEntry"
    - "ReplaceNetworkAclEntry"
    - "DeleteNetworkAclEntry"
    - "CreateRoute"
    - "ReplaceRoute"
    - "DeleteRoute"
    - "ReplaceRouteTableAssociation"

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "CloudTrail records AuthorizeSecurityGroupIngress or CreateRoute from unexpected IAM principal or IP"
    detection_method: "CloudTrail Insights or EventBridge rule on specific API events"
    cli: >
      aws cloudtrail lookup-events
      --lookup-attributes AttributeKey=EventName,AttributeValue=AuthorizeSecurityGroupIngress
      --start-time $(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
      --query 'Events[*].{Time:EventTime,User:Username,Event:CloudTrailEvent}'

  - id: "SYM-02"
    description: "Security Group now allows 0.0.0.0/0 on a sensitive port such as 22, 3389, 3306, or 5432"
    detection_method: "AWS Config rule restricted-ssh or restricted-common-ports reports NON_COMPLIANT"
    metric: "AWS Config | restricted-ssh | NON_COMPLIANT"

  - id: "SYM-03"
    description: "VPC Flow Logs show ACCEPT traffic from unexpected external IP ranges to internal resources"
    detection_method: "VPC Flow Log analysis or CloudWatch Logs Insights query"
    log_query: |
      fields @timestamp, srcAddr, dstAddr, dstPort, action, protocol
      | filter action = "ACCEPT"
        and srcAddr not like "10."
        and srcAddr not like "172.16."
        and srcAddr not like "192.168."
      | filter dstPort in [22, 3389, 3306, 5432, 6379, 27017]
      | sort @timestamp desc
      | limit 100

  - id: "SYM-04"
    description: "Network ACL has a DENY rule removed or an ALLOW rule added for an unexpected IP range"
    detection_method: "AWS Config nacl-changes or CloudTrail ReplaceNetworkAclEntry event"

  - id: "SYM-05"
    description: "Route table has a new route pointing to an internet gateway or unexpected transit gateway"
    detection_method: "CloudTrail CreateRoute or ReplaceRoute event from unexpected principal"

# ---------------------------------------------------------------------------
# DIAGNOSIS - DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  decision_tree:
    - step: 1
      question: "What network change was made and by whom? Look up recent CloudTrail events."
      check:
        cli: >
          aws cloudtrail lookup-events
          --lookup-attributes AttributeKey=EventName,AttributeValue=AuthorizeSecurityGroupIngress
          --start-time $(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          --query 'Events[*].{Time:EventTime,User:Username,ResourceId:Resources[0].ResourceName}'

          aws cloudtrail lookup-events
          --lookup-attributes AttributeKey=EventName,AttributeValue=CreateRoute
          --start-time $(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          --query 'Events[*].{Time:EventTime,User:Username,ResourceId:Resources[0].ResourceName}'

          aws cloudtrail lookup-events
          --lookup-attributes AttributeKey=EventName,AttributeValue=CreateNetworkAclEntry
          --start-time $(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          --query 'Events[*].{Time:EventTime,User:Username,ResourceId:Resources[0].ResourceName}'
      branches:
        - condition: "Change made by known IAM principal within normal change window with ticket reference"
          result: "AUTHORIZED_CHANGE - no action required, close the alert with documentation"
          next_step: 0
        - condition: "Change made by unknown principal, outside change window, or without a ticket"
          result: "UNAUTHORIZED_CHANGE - proceed with immediate revert"
          next_step: 2
        - condition: "Change made by automated tool (CDK, Terraform, CloudFormation) unexpectedly"
          result: "AUTOMATION_DRIFT - investigate CI/CD pipeline for unauthorized trigger"
          next_step: 2

    - step: 2
      question: "What is the specific rule or route that was added? What does it expose?"
      check:
        cli: >
          aws ec2 describe-security-groups
          --group-ids <SG_ID>
          --query 'SecurityGroups[*].{Name:GroupName,Ingress:IpPermissions,Egress:IpPermissionsEgress}'

          aws ec2 describe-network-acls
          --network-acl-ids <NACL_ID>
          --query 'NetworkAcls[*].Entries'

          aws ec2 describe-route-tables
          --route-table-ids <RTB_ID>
          --query 'RouteTables[*].Routes'
      branches:
        - condition: "SG rule allows 0.0.0.0/0 on port 22 (SSH) or 3389 (RDP)"
          result: "CRITICAL_EXPOSURE - admin ports open to internet, revert immediately"
          next_step: 3
        - condition: "SG rule allows 0.0.0.0/0 on database ports (3306, 5432, 6379, 27017)"
          result: "CRITICAL_EXPOSURE - database ports open to internet, revert immediately"
          next_step: 3
        - condition: "Route added pointing private subnet to internet gateway"
          result: "ROUTING_EXPOSURE - private subnet now routable to internet, revert immediately"
          next_step: 3
        - condition: "NACL DENY rule removed allowing previously blocked traffic"
          result: "NACL_BYPASS - blocking rule removed, revert immediately"
          next_step: 3

    - step: 3
      question: "Is there evidence that the exposed port or route was actively exploited?"
      check:
        cli: >
          aws ec2 describe-flow-logs
          --filter Name=resource-id,Values=<VPC_ID>
          --query 'FlowLogs[*].{Id:FlowLogId,LogGroup:LogGroupName}'
      branches:
        - condition: "VPC Flow Logs show ACCEPT traffic from external IPs to the exposed port since the change"
          result: "POTENTIAL_BREACH - revert rule AND escalate to security team for host forensics"
          next_step: 0
        - condition: "No VPC Flow Logs enabled or no ACCEPT traffic from external IPs"
          result: "NO_EXPLOITATION_EVIDENCE - revert rule, enable Flow Logs, document"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "NET-UNAUTHORIZED"
    name: "Unauthorized or unreviewed network configuration change via IAM principal"
    description: >
      An IAM user, role, or service account made a Security Group, Network ACL, or
      Route Table change without authorization. This could be a malicious insider,
      compromised credentials, overly permissive IAM policies allowing EC2 network
      modification, or an automated tool triggered without proper change controls.
      Common vectors: direct console change, CLI command, CDK/Terraform apply from
      a compromised pipeline, or a Lambda function with overly broad EC2 permissions.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-03"

  - code: "NET-MISCONFIGURATION"
    name: "Accidental network misconfiguration by an authorized user"
    description: >
      An authorized IAM user or automated tool made an unintended network change,
      such as applying the wrong Security Group rule or using 0.0.0.0/0 instead of
      a specific CIDR. The change was not malicious but still creates exposure.
      Common in manual console changes or IaC changes not reviewed in code review.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "NET-UNAUTHORIZED"
    actions:
      - order: 1
        name: "Identify the unauthorized change from CloudTrail and document the IAM principal"
        description: >
          Before reverting, fully document the unauthorized change: the IAM principal ARN,
          source IP, the exact API call and parameters, and the timestamp. This evidence
          is required for the post-incident review and potential IAM containment if the
          credentials are compromised. Use the iam-compromise scenario if credentials are suspect.
        type: "aws_cli"
        command: >
          aws cloudtrail lookup-events
          --lookup-attributes AttributeKey=EventName,AttributeValue=AuthorizeSecurityGroupIngress
          --start-time <INCIDENT_START_TIME>
          --query 'Events[*].CloudTrailEvent'
          --output text
        rollback_command: "N/A - read-only forensic action"
        risk: "LOW"
        requires_approval: false
        estimated_impact: "No impact. Diagnostic read-only operation."

      - order: 2
        name: "Revert unauthorized Security Group ingress rule"
        description: >
          Revoke the specific unauthorized ingress rule from the Security Group.
          Use the exact parameters from the CloudTrail event (protocol, port, CIDR) to
          ensure only the unauthorized rule is removed and not legitimate rules.
        type: "aws_cli"
        command: >
          aws ec2 revoke-security-group-ingress
          --group-id <SG_ID>
          --protocol <PROTOCOL>
          --port <PORT>
          --cidr <CIDR>
        rollback_command: >
          aws ec2 authorize-security-group-ingress
          --group-id <SG_ID>
          --protocol <PROTOCOL>
          --port <PORT>
          --cidr <CIDR>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          The specific ingress rule is removed immediately. Any traffic matching
          this rule will be blocked. Verify no legitimate traffic uses this rule
          by checking VPC Flow Logs before executing.

      - order: 3
        name: "Revert unauthorized Security Group egress rule"
        description: >
          If an unauthorized egress rule was added (e.g., to allow data exfiltration),
          revoke it. Egress rules control outbound traffic from resources in the SG.
        type: "aws_cli"
        command: >
          aws ec2 revoke-security-group-egress
          --group-id <SG_ID>
          --ip-permissions '[{"IpProtocol":"<PROTOCOL>","FromPort":<FROM_PORT>,"ToPort":<TO_PORT>,"IpRanges":[{"CidrIp":"<CIDR>"}]}]'
        rollback_command: >
          aws ec2 authorize-security-group-egress
          --group-id <SG_ID>
          --ip-permissions '[{"IpProtocol":"<PROTOCOL>","FromPort":<FROM_PORT>,"ToPort":<TO_PORT>,"IpRanges":[{"CidrIp":"<CIDR>"}]}]'
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Outbound traffic matching this egress rule is blocked immediately.
          Verify no legitimate service depends on this egress path before revoking.

      - order: 4
        name: "Revert unauthorized Network ACL entry"
        description: >
          Delete the unauthorized NACL entry or restore a deleted DENY rule.
          NACLs are stateless and apply to all traffic in the subnet. Rule numbers
          determine evaluation order - lower numbers are evaluated first.
        type: "aws_cli"
        command: >
          aws ec2 delete-network-acl-entry
          --network-acl-id <NACL_ID>
          --rule-number <RULE_NUMBER>
          --egress <true|false>
        rollback_command: >
          aws ec2 create-network-acl-entry
          --network-acl-id <NACL_ID>
          --rule-number <RULE_NUMBER>
          --protocol <PROTOCOL>
          --rule-action <allow|deny>
          --egress <true|false>
          --cidr-block <CIDR>
          --port-range From=<FROM_PORT>,To=<TO_PORT>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Deleting the NACL entry takes effect immediately for all new connections in the subnet.
          NACLs are stateless - existing established connections are not disrupted until
          they re-initiate. Monitor VPC Flow Logs for REJECT entries confirming the rule is active.

      - order: 5
        name: "Revert unauthorized route from Route Table"
        description: >
          Delete the unauthorized route that was added to the route table. This prevents
          traffic from routing to an unauthorized destination (e.g., internet gateway for
          a private subnet, or transit gateway for unintended network peering).
        type: "aws_cli"
        command: >
          aws ec2 delete-route
          --route-table-id <RTB_ID>
          --destination-cidr-block <DESTINATION_CIDR>
        rollback_command: >
          aws ec2 create-route
          --route-table-id <RTB_ID>
          --destination-cidr-block <DESTINATION_CIDR>
          --gateway-id <GATEWAY_ID>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Route deletion takes effect within seconds. Traffic to the destination CIDR
          will no longer route via the unauthorized gateway. If any legitimate traffic
          used this route, it will be dropped. Verify with VPC Flow Logs before deleting.

      - order: 6
        name: "Investigate and contain the IAM principal that made the unauthorized change"
        description: >
          If the IAM principal is not recognized or is suspected to be compromised,
          investigate and contain those credentials. Follow the iam-compromise scenario
          playbook if credentials appear compromised.
        type: "aws_cli"
        command: >
          aws iam get-user
          --user-name <IAM_USER_NAME>

          aws iam list-access-keys
          --user-name <IAM_USER_NAME>
          --query 'AccessKeyMetadata[*].{KeyId:AccessKeyId,Status:Status,Created:CreateDate}'

          aws cloudtrail lookup-events
          --lookup-attributes AttributeKey=Username,AttributeValue=<IAM_USER_NAME>
          --start-time <INCIDENT_START_TIME>
          --query 'Events[*].{Time:EventTime,Event:EventName,Source:EventSource}'
        rollback_command: "N/A - investigative action. See iam-compromise scenario for credential containment."
        risk: "LOW"
        requires_approval: false
        estimated_impact: "Read-only investigation. No impact."

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Verify the change is unauthorized before reverting"
      check: >
        Before reverting any network rule, confirm via CloudTrail that:
        (1) The IAM principal is not a recognized infrastructure automation account
        (2) There is no corresponding change management ticket for this change
        (3) The change was made outside the normal deployment window
        (4) The specific rule does not match any documented network exception
        Reverting a legitimate change may cause an outage. Verify with network and
        security teams before executing any revoke or delete action.
      block: true

    - description: "Check for active legitimate traffic before reverting Security Group or Route rules"
      check: >
        Before revoking a Security Group rule or deleting a route, query VPC Flow Logs
        to check if legitimate traffic is actively using the rule. Use CloudWatch Logs
        Insights on the VPC Flow Log group and filter by the relevant source/destination
        CIDR and port. If legitimate production traffic is found using the rule, coordinate
        with the application team before reverting.
      block: true

    - description: "Document all evidence before making any changes"
      check: >
        Before reverting, save the full CloudTrail event JSON, current Security Group rules,
        NACL entries, and VPC Flow Log entries as forensic evidence. This documentation is
        required for the post-incident review and any legal or compliance investigation.
      block: false

  post_conditions:
    - description: "Verify the unauthorized rule or route no longer exists"
      check: >
        After reverting, confirm the rule is removed:
        aws ec2 describe-security-groups --group-ids <SG_ID>
        aws ec2 describe-network-acls --network-acl-ids <NACL_ID>
        aws ec2 describe-route-tables --route-table-ids <RTB_ID>
        Confirm the unauthorized entry is absent from the current configuration.
      auto_rollback: false

    - description: "Verify VPC Flow Logs show REJECT for previously exposed traffic"
      check: >
        Monitor VPC Flow Logs for 15 minutes after reverting the rule to confirm
        traffic that was previously ACCEPT is now showing REJECT entries.
        This confirms the revert was applied correctly.
      auto_rollback: false

    - description: "Review and tighten IAM permissions for network modification"
      check: >
        After the incident, review which IAM roles and users have permissions for
        ec2:AuthorizeSecurityGroupIngress, ec2:CreateRoute, and ec2:CreateNetworkAclEntry.
        Apply least privilege by restricting these to known infrastructure automation roles.
        Consider using Service Control Policies (SCPs) to restrict these at the org level.
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "Unauthorized Security Group rule reverted"
      method: "aws ec2 describe-security-groups"
      expected: "The specific unauthorized ingress/egress rule is absent from the Security Group"
      cli: >
        aws ec2 describe-security-groups
        --group-ids <SG_ID>
        --query 'SecurityGroups[*].IpPermissions'

    - name: "Unauthorized NACL entry removed"
      method: "aws ec2 describe-network-acls"
      expected: "The specific rule number is absent or the restored DENY rule is present"
      cli: >
        aws ec2 describe-network-acls
        --network-acl-ids <NACL_ID>
        --query 'NetworkAcls[*].Entries[?RuleNumber==`<RULE_NUMBER>`]'

    - name: "Unauthorized route deleted"
      method: "aws ec2 describe-route-tables"
      expected: "The unauthorized destination CIDR route is absent from the route table"
      cli: >
        aws ec2 describe-route-tables
        --route-table-ids <RTB_ID>
        --query 'RouteTables[*].Routes[?DestinationCidrBlock==`<DESTINATION_CIDR>`]'

    - name: "VPC Flow Logs show REJECT for previously exposed traffic path"
      method: "CloudWatch Logs Insights on VPC Flow Log group"
      expected: "Traffic on previously exposed port now shows REJECT in VPC Flow Logs"

    - name: "AWS Config rule COMPLIANT for restricted-ssh and restricted-common-ports"
      method: "aws configservice get-compliance-details-by-config-rule"
      expected: "All affected Security Groups show COMPLIANT status"
      cli: >
        aws configservice get-compliance-details-by-config-rule
        --config-rule-name restricted-ssh
        --compliance-types COMPLIANT

  stability_window: 900
  success_criteria: >
    All of the following for 15 consecutive minutes:
    (1) Unauthorized Security Group rule, NACL entry, or route is absent from configuration,
    (2) VPC Flow Logs show REJECT for traffic to the previously exposed port or path,
    (3) AWS Config rules restricted-ssh and restricted-common-ports are COMPLIANT,
    (4) No new CloudTrail events for network modification from the unauthorized principal,
    (5) Application error rate and connectivity unaffected for legitimate traffic.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 300
  notify:
    - security-team
    - oncall
    - network-team
