schema: "decision-knowledge-record/v1"

metadata:
  id: "cert-expiry"
  name: "ACM Certificate Expiry or Renewal Failure"
  description: >
    HTTPS endpoints return certificate errors or browsers show security warnings.
    ACM certificate status is EXPIRED or PENDING_VALIDATION with a past-due renewal.
    Covers three root causes: ACM auto-renewal failure due to missing DNS validation
    records, DNS validation CNAME misconfiguration, and certificate region mismatch
    (CloudFront requires certificates in us-east-1). Includes email-to-DNS validation
    migration and consumer impact assessment before any certificate change.
  category: "security"
  service: "acm"
  severity: "high"
  tags:
    - acm
    - certificate
    - tls
    - https
    - dns-validation
    - cloudfront
    - route53
    - cert-expiry
  source_refs:
    - title: "ACM – Managed Renewal"
      url: "https://docs.aws.amazon.com/acm/latest/userguide/managed-renewal.html"
      type: "official_doc"
    - title: "ACM – DNS Validation"
      url: "https://docs.aws.amazon.com/acm/latest/userguide/dns-validation.html"
      type: "official_doc"
    - title: "ACM – Troubleshooting Certificate Renewal"
      url: "https://docs.aws.amazon.com/acm/latest/userguide/troubleshooting-renewal.html"
      type: "troubleshooting_guide"
    - title: "CloudFront – Using HTTPS with ACM"
      url: "https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/cnames-and-https-requirements.html"
      type: "official_doc"
    - title: "re:Post – ACM Certificate Not Renewing"
      url: "https://repost.aws/knowledge-center/acm-certificate-renewal"
      type: "repost_kc"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  type: "alarm"
  description: "HTTPS certificate error in browser or application, or ACM certificate status EXPIRED or PENDING_VALIDATION overdue"
  condition: >
    ACM certificate DaysToExpiry CloudWatch metric <= 30 (warning) OR
    ACM certificate status = EXPIRED OR
    Application returns ERR_CERT_DATE_INVALID or SSL handshake failure OR
    ACM EventBridge event for certificate approaching expiration
  cloudwatch_metric:
    namespace: "AWS/CertificateManager"
    metric_name: "DaysToExpiry"
    alarm_threshold: 30
    alarm_comparison: "LessThanOrEqualToThreshold"

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "Browser shows 'Your connection is not private' / NET::ERR_CERT_DATE_INVALID for HTTPS endpoint"
    detection_method: "End-user report or synthetic HTTPS monitor"

  - id: "SYM-02"
    description: "ACM certificate status is EXPIRED or FAILED in the ACM console or CLI"
    detection_method: "aws acm list-certificates or describe-certificate"
    cli: >
      aws acm list-certificates
      --certificate-statuses EXPIRED PENDING_VALIDATION FAILED
      --query 'CertificateSummaryList[*].{Domain:DomainName,Arn:CertificateArn,Status:Status}'

  - id: "SYM-03"
    description: "ACM DaysToExpiry CloudWatch metric at or near zero"
    detection_method: "CloudWatch Metrics – AWS/CertificateManager namespace"
    metric: "AWS/CertificateManager | DaysToExpiry | Minimum <= 30 | per certificate ARN"

  - id: "SYM-04"
    description: "DNS CNAME record for ACM validation missing or incorrect in Route 53"
    detection_method: "Route 53 list-resource-record-sets cross-checked with ACM describe-certificate"
    cli: >
      aws acm describe-certificate
      --certificate-arn <CERT_ARN>
      --query 'Certificate.DomainValidationOptions[*].{Domain:DomainName,CNAMEName:ResourceRecord.Name,CNAMEValue:ResourceRecord.Value,Status:ValidationStatus}'

  - id: "SYM-05"
    description: "CloudFront distribution references an ACM certificate ARN from a region other than us-east-1"
    detection_method: "CloudFront list-distributions – inspect ACMCertificateArn region segment"
    cli: >
      aws cloudfront list-distributions
      --query 'DistributionList.Items[*].{Domain:DomainName,CertArn:ViewerCertificate.ACMCertificateArn}'
      --region us-east-1

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  decision_tree:
    - step: 1
      question: "What is the current ACM certificate status and days until expiry?"
      check:
        cli: >
          aws acm describe-certificate
          --certificate-arn <CERT_ARN>
          --query 'Certificate.{Status:Status,NotAfter:NotAfter,RenewalEligibility:RenewalEligibility,
                  ValidationMethod:DomainValidationOptions[0].ValidationMethod,
                  ValidationStatus:DomainValidationOptions[0].ValidationStatus,
                  InUseBy:InUseBy}'
      branches:
        - condition: "Status = EXPIRED"
          result: "CERT-ACM-EXPIRE – certificate already expired, requires immediate re-issue"
          next_step: 2
        - condition: "Status = PENDING_VALIDATION and renewal overdue"
          result: "CERT-DNS-FAIL – renewal pending, DNS validation likely failing"
          next_step: 3
        - condition: "Status = ISSUED but consumer is CloudFront and errors present"
          result: "CERT-REGION candidate – check certificate region"
          next_step: 4

    - step: 2
      question: "For EXPIRED certificates: what validation method is configured?"
      check:
        cli: >
          aws acm describe-certificate
          --certificate-arn <CERT_ARN>
          --query 'Certificate.DomainValidationOptions[*].{Domain:DomainName,Method:ValidationMethod,
                  CNAMEName:ResourceRecord.Name,CNAMEValue:ResourceRecord.Value,Status:ValidationStatus}'
      branches:
        - condition: "ValidationMethod = DNS and ValidationStatus = PENDING_VALIDATION"
          result: "CERT-DNS-FAIL – CNAME missing or not propagated, proceed to step 3"
          next_step: 3
        - condition: "ValidationMethod = EMAIL"
          result: "CERT-DNS-FAIL – email validation cannot auto-renew; migrate to DNS validation"
          next_step: 3
        - condition: "ValidationStatus = SUCCESS but certificate still EXPIRED"
          result: "Request new certificate – do not rely on failed renewal path"
          next_step: 0

    - step: 3
      question: "Do the DNS validation CNAME records exist in Route 53 with the correct value?"
      check:
        cli: >
          # Get expected CNAME name and value from ACM
          aws acm describe-certificate
          --certificate-arn <CERT_ARN>
          --query 'Certificate.DomainValidationOptions[*].ResourceRecord'

          # Check if CNAME exists in Route 53 hosted zone
          aws route53 list-resource-record-sets
          --hosted-zone-id <HOSTED_ZONE_ID>
          --query 'ResourceRecordSets[?Type==`CNAME`].{Name:Name,Value:ResourceRecords[0].Value}'
      branches:
        - condition: "CNAME record missing from Route 53 hosted zone"
          result: "CERT-DNS-FAIL – add missing CNAME record"
          next_step: 0
        - condition: "CNAME record exists but value does not match ACM expected value"
          result: "CERT-DNS-FAIL – update incorrect CNAME record value"
          next_step: 0
        - condition: "CNAME record exists and value matches"
          result: "DNS_PROPAGATION – ACM checks every 30 min; wait up to 72 hours then re-check"
          next_step: 0

    - step: 4
      question: "Is the certificate in the correct region for its consumer? CloudFront requires us-east-1."
      check:
        cli: >
          # Extract region from certificate ARN (4th colon-delimited segment)
          # ARN format: arn:aws:acm:<REGION>:<ACCOUNT>:certificate/<ID>
          echo "<CERT_ARN>" | cut -d: -f4

          # Confirm CloudFront distribution's certificate ARN
          aws cloudfront get-distribution-config
          --id <DISTRIBUTION_ID>
          --query 'DistributionConfig.ViewerCertificate.ACMCertificateArn'
          --region us-east-1
      branches:
        - condition: "Certificate region is not us-east-1 and consumer is CloudFront"
          result: "CERT-REGION – request new certificate in us-east-1"
          next_step: 0
        - condition: "Certificate region does not match ALB region"
          result: "CERT-REGION – request new certificate in the ALB region"
          next_step: 0
        - condition: "Certificate region matches consumer region"
          result: "REGION_OK – root cause is not region mismatch, investigate consumer attachment"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "CERT-ACM-EXPIRE"
    name: "ACM certificate expired – auto-renewal failed or was not configured"
    description: >
      The ACM certificate reached its expiry date (typically 13 months for ACM-issued
      certificates) without successful renewal. Auto-renewal requires valid DNS validation
      CNAME records to remain in DNS for the certificate lifetime. The most common cause
      is DNS validation records being deleted after initial issuance, or email validation
      being used instead of DNS validation (email validation cannot auto-renew).
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-03"

  - code: "CERT-DNS-FAIL"
    name: "DNS validation CNAME record missing or incorrect – blocking auto-renewal"
    description: >
      ACM DNS validation requires a specific CNAME record to remain in DNS for the
      lifetime of the certificate to enable auto-renewal. If the record was deleted
      after initial validation, or was never created (email validation used), ACM
      cannot validate domain ownership and the certificate will not renew. ACM begins
      renewal attempts 60 days before expiry and checks approximately every 30 minutes.
    probability: "high"
    related_symptoms:
      - "SYM-02"
      - "SYM-03"
      - "SYM-04"

  - code: "CERT-REGION"
    name: "Certificate issued in wrong region – CloudFront requires us-east-1"
    description: >
      CloudFront distributions must use ACM certificates issued in the us-east-1
      (N. Virginia) region. Certificates in other regions cannot be attached to
      CloudFront viewer HTTPS configurations. ALB requires certificates in the same
      region as the load balancer. Region mismatch causes attachment errors and may
      result in CloudFront using an expired or default AWS certificate.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-05"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "CERT-ACM-EXPIRE"
    actions:
      - order: 1
        name: "PREREQUISITE – Check all downstream consumers of the certificate before changes"
        description: >
          Before requesting a new certificate or making any changes, identify every
          resource currently using the expiring or expired certificate. Replacing a
          certificate without updating all consumers leaves those resources broken.
        type: "aws_cli"
        command: >
          aws acm describe-certificate
          --certificate-arn <CERT_ARN>
          --query 'Certificate.InUseBy'
        rollback_command: "N/A – read-only prerequisite check"
        risk: "low"
        requires_approval: false
        estimated_impact: "Read-only. No service impact. Required before any remediation action."

      - order: 2
        name: "Request a new ACM certificate with DNS validation"
        description: >
          Request a replacement certificate for the same domain(s) using DNS validation.
          DNS validation is strongly preferred over email validation because it enables
          ACM auto-renewal without annual manual intervention.
        type: "aws_cli"
        command: >
          aws acm request-certificate
          --domain-name <PRIMARY_DOMAIN>
          --validation-method DNS
          --subject-alternative-names <SAN_1> <SAN_2>
          --idempotency-token <UNIQUE_TOKEN>
          --query 'CertificateArn'
        rollback_command: >
          aws acm delete-certificate --certificate-arn <NEW_CERT_ARN>
        risk: "low"
        requires_approval: false
        estimated_impact: "ACM certificates are free. No cost impact for requesting a new certificate."

      - order: 3
        name: "Add DNS validation CNAME records to Route 53"
        description: >
          After requesting the certificate, ACM provides CNAME records that must be
          added to Route 53. These records MUST REMAIN in DNS permanently to enable
          auto-renewal on future cycles. ACM can add these records automatically if
          the Route 53 hosted zone is in the same account.
        type: "aws_cli"
        command: >
          # Get the required CNAME name and value from ACM
          aws acm describe-certificate
          --certificate-arn <NEW_CERT_ARN>
          --query 'Certificate.DomainValidationOptions[*].ResourceRecord'

          # Add CNAME record to Route 53
          aws route53 change-resource-record-sets
          --hosted-zone-id <HOSTED_ZONE_ID>
          --change-batch '{
            "Changes": [{
              "Action": "UPSERT",
              "ResourceRecordSet": {
                "Name": "<CNAME_NAME_FROM_ACM>",
                "Type": "CNAME",
                "TTL": 300,
                "ResourceRecords": [{"Value": "<CNAME_VALUE_FROM_ACM>"}]
              }
            }]
          }'
        rollback_command: >
          # WARNING: Do not delete ACM validation CNAME – it is required for future auto-renewal.
          # Only delete if the certificate itself is being deleted permanently.
          aws route53 change-resource-record-sets
          --hosted-zone-id <HOSTED_ZONE_ID>
          --change-batch '{"Changes":[{"Action":"DELETE","ResourceRecordSet":{"Name":"<CNAME_NAME>","Type":"CNAME","TTL":300,"ResourceRecords":[{"Value":"<CNAME_VALUE>"}]}}]}'
        risk: "low"
        requires_approval: false
        estimated_impact: >
          CNAME record propagation: typically 1-5 minutes within AWS, up to 72 hours
          for external DNS providers. ACM checks validation approximately every 30 minutes.

      - order: 4
        name: "Wait for ISSUED status then update all consumers to new certificate ARN"
        description: >
          After CNAME propagation ACM validates and issues the certificate (typically
          5-30 minutes). Update all identified consumers (ALB, CloudFront, API Gateway)
          to reference the new certificate ARN.
        type: "aws_cli"
        command: >
          # Wait for ISSUED status
          aws acm wait certificate-validated --certificate-arn <NEW_CERT_ARN>

          # Update ALB HTTPS listener
          aws elbv2 modify-listener
          --listener-arn <LISTENER_ARN>
          --certificates CertificateArn=<NEW_CERT_ARN>

          # CloudFront: get current config, update ViewerCertificate.ACMCertificateArn,
          # then call update-distribution with the new ETag
          # (see CERT-REGION remediation order 2 for CloudFront update commands)
        rollback_command: >
          aws elbv2 modify-listener
          --listener-arn <LISTENER_ARN>
          --certificates CertificateArn=<OLD_CERT_ARN>
        risk: "high"
        requires_approval: true
        estimated_impact: >
          ALB certificate swap is non-disruptive for established connections.
          CloudFront certificate update takes 5-15 minutes to propagate globally.

  - root_cause_code: "CERT-DNS-FAIL"
    actions:
      - order: 1
        name: "Add missing DNS validation CNAME record for existing certificate"
        description: >
          If the certificate is still within its validity period but renewal is pending,
          adding the CNAME record allows ACM to complete renewal automatically without
          requiring consumer updates – the same certificate ARN is renewed in place.
        type: "aws_cli"
        command: >
          # Get the required CNAME details from ACM
          aws acm describe-certificate
          --certificate-arn <CERT_ARN>
          --query 'Certificate.DomainValidationOptions[*].{Domain:DomainName,
                  CNAMEName:ResourceRecord.Name,
                  CNAMEValue:ResourceRecord.Value,
                  Status:ValidationStatus}'

          # Add the CNAME to Route 53
          aws route53 change-resource-record-sets
          --hosted-zone-id <HOSTED_ZONE_ID>
          --change-batch '{
            "Changes": [{
              "Action": "UPSERT",
              "ResourceRecordSet": {
                "Name": "<CNAME_NAME_FROM_ACM>",
                "Type": "CNAME",
                "TTL": 300,
                "ResourceRecords": [{"Value": "<CNAME_VALUE_FROM_ACM>"}]
              }
            }]
          }'
        rollback_command: >
          # WARNING: Do not delete this CNAME – it must remain permanently for auto-renewal.
          echo "Retain ACM validation CNAME permanently. Deleting it will prevent future auto-renewal."
        risk: "low"
        requires_approval: false
        estimated_impact: >
          Adding the CNAME is non-disruptive. ACM detects the record within 30 minutes
          and begins renewal validation. Certificate renews in place – no consumer update required.

      - order: 2
        name: "Migrate from email validation to DNS validation for automatic future renewal"
        description: >
          Email validation certificates require manual email response every renewal cycle
          and cannot auto-renew. Migrate by requesting a new certificate with DNS validation,
          adding the CNAME, waiting for ISSUED status, then replacing the email-validated
          certificate on all consumers.
        type: "aws_cli"
        command: >
          # Step 1: Request new certificate with DNS validation
          aws acm request-certificate
          --domain-name <DOMAIN>
          --validation-method DNS
          --subject-alternative-names <SAN_LIST>
          --query 'CertificateArn'

          # Step 2: Get validation CNAME records and add to Route 53 (see order 1 above)

          # Step 3: Wait for ISSUED
          aws acm wait certificate-validated --certificate-arn <NEW_CERT_ARN>

          # Step 4: Update consumers
          aws elbv2 modify-listener
          --listener-arn <LISTENER_ARN>
          --certificates CertificateArn=<NEW_CERT_ARN>
        rollback_command: >
          aws elbv2 modify-listener
          --listener-arn <LISTENER_ARN>
          --certificates CertificateArn=<OLD_EMAIL_CERT_ARN>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Requires updating all consumers once new certificate is issued.
          Zero-downtime if consumer swap is performed before old certificate expiry.

  - root_cause_code: "CERT-REGION"
    actions:
      - order: 1
        name: "Request new ACM certificate in the correct region"
        description: >
          CloudFront requires an ACM certificate issued in us-east-1.
          ALB requires a certificate in the same region as the load balancer.
          Request a new certificate in the required region with DNS validation.
        type: "aws_cli"
        command: >
          # For CloudFront – must be us-east-1
          aws acm request-certificate
          --domain-name <DOMAIN>
          --validation-method DNS
          --subject-alternative-names <SAN_1> <SAN_2>
          --region us-east-1
          --query 'CertificateArn'

          # Add DNS validation CNAME to Route 53 (same steps as CERT-DNS-FAIL order 1)
          aws acm wait certificate-validated
          --certificate-arn <NEW_CERT_ARN>
          --region us-east-1
        rollback_command: >
          aws acm delete-certificate
          --certificate-arn <NEW_CERT_ARN>
          --region us-east-1
        risk: "low"
        requires_approval: false
        estimated_impact: "Certificate request is non-disruptive. No consumer change until certificate is attached."

      - order: 2
        name: "Update CloudFront distribution to use the new us-east-1 certificate"
        description: >
          After the new certificate is issued in us-east-1, update the CloudFront
          distribution ViewerCertificate to reference the new ARN.
          CloudFront propagation takes 5-15 minutes globally.
        type: "aws_cli"
        command: >
          # Get current distribution config and ETag
          ETAG=$(aws cloudfront get-distribution-config
          --id <DISTRIBUTION_ID>
          --region us-east-1
          --query 'ETag'
          --output text)

          # Save config to file, update ViewerCertificate.ACMCertificateArn to new ARN,
          # then update the distribution
          aws cloudfront get-distribution-config
          --id <DISTRIBUTION_ID>
          --region us-east-1
          --query 'DistributionConfig' > /tmp/dist-config.json

          # Edit /tmp/dist-config.json – update ACMCertificateArn field to <NEW_CERT_ARN>
          # then:
          aws cloudfront update-distribution
          --id <DISTRIBUTION_ID>
          --if-match $ETAG
          --distribution-config file:///tmp/dist-config.json
          --region us-east-1
        rollback_command: >
          # Revert to previous certificate ARN using same update-distribution process
          # with the original ETag and original ACMCertificateArn value
          echo "Retrieve new ETag after failed update then call update-distribution with original cert ARN"
        risk: "high"
        requires_approval: true
        estimated_impact: >
          CloudFront certificate update propagates to all edge locations over 5-15 minutes.
          No service interruption for established connections during propagation.

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Check all downstream consumers of the certificate before making any changes"
      check: >
        Run: aws acm describe-certificate --certificate-arn <CERT_ARN> --query 'Certificate.InUseBy'
        Identify all ALBs, CloudFront distributions, API Gateways, and other services
        using the certificate. Notify owning teams before proceeding with any change.
        A certificate replacement that misses a consumer leaves that service broken.
      block: true

    - description: "Do not delete the ACM DNS validation CNAME record – it must remain permanently"
      check: >
        The DNS validation CNAME record must remain in Route 53 for the entire lifetime
        of the certificate to enable future auto-renewal cycles. Tag or document this
        record in your DNS runbook as permanent infrastructure. Never clean it up.
      block: true

    - description: "CloudFront certificate must be in us-east-1 – verify region before consumer update"
      check: >
        Before updating a CloudFront distribution's ViewerCertificate, confirm the
        new certificate ARN contains ':us-east-1:' in the region segment.
        Run: echo <CERT_ARN> | cut -d: -f4 and confirm output is 'us-east-1'.
      block: true

    - description: "Certificate must reach ISSUED status before updating consumers"
      check: >
        Do not update ALB, CloudFront, or API Gateway to reference a certificate that
        is still in PENDING_VALIDATION state. Use aws acm wait certificate-validated
        or poll until Status = ISSUED before executing any consumer update.
      block: true

  post_conditions:
    - description: "All certificate consumers must be verified serving the new certificate"
      check: >
        After consumer update, verify each endpoint is presenting the new certificate:
        openssl s_client -connect <DOMAIN>:443 -servername <DOMAIN> 2>/dev/null | openssl x509 -noout -dates
        Confirm notAfter date matches the new certificate expiry (approximately 13 months out).
      auto_rollback: false

    - description: "DNS validation CNAME must be confirmed present in Route 53 post-remediation"
      check: >
        Run: aws route53 list-resource-record-sets --hosted-zone-id <ZONE_ID> --query
        'ResourceRecordSets[?Type==`CNAME` && contains(Name, `acm-validations.aws`)]'
        Confirm the CNAME record is present to ensure future auto-renewal succeeds.
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "ACM certificate status is ISSUED"
      method: "aws acm describe-certificate"
      expected: "Status = ISSUED and NotAfter > 60 days from today"
      cli: >
        aws acm describe-certificate
        --certificate-arn <CERT_ARN>
        --query 'Certificate.{Status:Status,NotAfter:NotAfter,RenewalEligibility:RenewalEligibility}'

    - name: "Browser and openssl confirm valid certificate without errors"
      method: "openssl s_client TLS handshake"
      expected: "TLS handshake succeeds, no certificate error, notAfter > today"
      cli: >
        openssl s_client -connect <DOMAIN>:443 -servername <DOMAIN> 2>/dev/null | openssl x509 -noout -dates -subject

    - name: "DNS validation CNAME record present in Route 53"
      method: "Route 53 list-resource-record-sets"
      expected: "CNAME record with ACM-provided name and value present in hosted zone"
      cli: >
        aws route53 list-resource-record-sets
        --hosted-zone-id <HOSTED_ZONE_ID>
        --query 'ResourceRecordSets[?Type==`CNAME` && contains(Name, `acm-validations.aws`)]'

    - name: "ACM DaysToExpiry metric above 60"
      method: "CloudWatch Metrics – AWS/CertificateManager"
      expected: "DaysToExpiry >= 60 for the certificate ARN"
      metric:
        namespace: "AWS/CertificateManager"
        metric_name: "DaysToExpiry"
        statistic: "Minimum"
        threshold: ">= 60"

    - name: "All consumers serving the new certificate ARN"
      method: "aws acm describe-certificate InUseBy cross-check"
      expected: "All previously identified consumers reference the new certificate ARN"
      cli: >
        aws acm describe-certificate
        --certificate-arn <NEW_CERT_ARN>
        --query 'Certificate.InUseBy'

    - name: "CloudFront or ALB 5xx error rate not elevated post-update"
      method: "CloudWatch Metrics – 5xxErrorRate"
      expected: "5xxErrorRate < 0.1% for 5-minute window after consumer update"
      metric:
        namespace: "AWS/CloudFront"
        metric_name: "5xxErrorRate"
        statistic: "Average"
        threshold: "< 0.1"

  stability_window: 600
  success_criteria: >
    All of the following confirmed:
    (1) Certificate Status = ISSUED with NotAfter > 60 days,
    (2) All consumers updated to new certificate ARN,
    (3) openssl confirms valid certificate with no errors on all HTTPS endpoints,
    (4) DNS validation CNAME present in Route 53,
    (5) 5xxErrorRate < 0.1% for 10 consecutive minutes post-update.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 3600
  notify:
    - oncall
    - platform-team
    - security-team
