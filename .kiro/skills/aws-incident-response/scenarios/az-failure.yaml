schema: "decision-knowledge-record/v1"

metadata:
  id: "az-failure"
  name: "AZ-Level Failure"
  description: >
    A single Availability Zone becomes impaired, causing concentrated health check failures,
    elevated error rates, and latency spikes for resources resident in that AZ. Covers
    detection via AZ-dimensioned CloudWatch metrics and AWS Health Dashboard, traffic
    evacuation via ARC Zonal Shift, and automatic recovery paths through ALB, Auto Scaling,
    and RDS Multi-AZ failover.
  category: "platform"
  service: "multi"
  severity: "critical"
  tags:
    - az-failure
    - zonal-shift
    - arc
    - alb
    - auto-scaling
    - rds-failover
    - multi-az
    - availability
    - platform
  source_refs:
    - title: "ARC Zonal Shift – Start a Zonal Shift"
      url: "https://docs.aws.amazon.com/r53recovery/latest/dg/arc-zonal-shift.html"
      type: "official_doc"
    - title: "ALB – Health Checks for Your Target Groups"
      url: "https://docs.aws.amazon.com/elasticloadbalancing/latest/application/target-group-health-checks.html"
      type: "official_doc"
    - title: "Auto Scaling – Availability Zone Rebalancing"
      url: "https://docs.aws.amazon.com/autoscaling/ec2/userguide/auto-scaling-benefits.html"
      type: "official_doc"
    - title: "RDS – Multi-AZ Deployments"
      url: "https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Concepts.MultiAZ.html"
      type: "official_doc"
    - title: "AWS Health Dashboard – Viewing Events"
      url: "https://docs.aws.amazon.com/health/latest/ug/getting-started-phd.html"
      type: "official_doc"
    - title: "Well-Architected – Use Availability Zones"
      url: "https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/use-fault-isolation-to-protect-your-workload.html"
      type: "well_architected"
    - title: "Troubleshoot AZ Impairment with Zonal Shift (re:Post)"
      url: "https://repost.aws/knowledge-center/route53-arc-zonal-shift"
      type: "repost_kc"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  type: "metric_threshold"
  description: "Health check failures and error metrics concentrated in a single AZ dimension"
  condition: >
    ALB UnHealthyHostCount rising in one AZ only, OR CloudWatch metrics showing elevated
    error rate / latency for resources in a single AZ while other AZs remain healthy.
  log_query: |
    fields @timestamp, @message, @logStream
    | filter @message like "health check" OR @message like "connection refused" OR @message like "timeout"
    | sort @timestamp desc
    | limit 100

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "ALB UnHealthyHostCount rising in one AZ while other AZs remain at zero"
    detection_method: "CloudWatch Metrics – UnHealthyHostCount dimensioned by AvailabilityZone"
    metric: "AWS/ApplicationELB | UnHealthyHostCount | by AvailabilityZone"

  - id: "SYM-02"
    description: "EC2 or ECS task status checks failing only for instances in the affected AZ"
    detection_method: "CloudWatch Metrics – StatusCheckFailed dimensioned by AvailabilityZone"
    metric: "AWS/EC2 | StatusCheckFailed | by AvailabilityZone"

  - id: "SYM-03"
    description: "AWS Health Dashboard shows an open AZ-scoped infrastructure event"
    detection_method: "AWS Health API – describe-events filtered by AZ"
    metric: "AWS Health | AZ-scoped infrastructure event"

  - id: "SYM-04"
    description: "Overall 5xx error rate or latency p99 elevated, driven by traffic that routed to the affected AZ"
    detection_method: "CloudWatch Metrics – HTTPCode_Target_5XX_Count and TargetResponseTime"
    metric: "AWS/ApplicationELB | HTTPCode_Target_5XX_Count | Sum AND TargetResponseTime | p99"

  - id: "SYM-05"
    description: "RDS connection errors or read replica lag spike if the writer or replica is in the affected AZ"
    detection_method: "CloudWatch Metrics – DatabaseConnections and ReplicaLag"
    metric: "AWS/RDS | DatabaseConnections | Minimum AND ReplicaLag | Maximum"

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  decision_tree:
    - step: 1
      question: "Are health check failures and error metrics concentrated in a single AZ dimension?"
      check:
        cli: >
          aws cloudwatch get-metric-statistics
          --namespace AWS/ApplicationELB
          --metric-name UnHealthyHostCount
          --dimensions Name=LoadBalancer,Value=<ALB_ARN_SUFFIX> Name=TargetGroup,Value=<TG_ARN_SUFFIX> Name=AvailabilityZone,Value=<AZ_ID>
          --statistics Maximum
          --period 60
          --start-time $(date -u -d '30 minutes ago' +%FT%TZ)
          --end-time $(date -u +%FT%TZ)
      branches:
        - condition: "UnHealthyHostCount elevated in one AZ, zero in others"
          result: "AZ_IMPAIRMENT_CONFIRMED"
          next_step: 2
        - condition: "UnHealthyHostCount elevated across multiple AZs"
          result: "NOT_SINGLE_AZ – investigate region-level or application-level issue"
          next_step: 0

    - step: 2
      question: "Does the AWS Health Dashboard show an active AZ-scoped infrastructure event?"
      check:
        cli: >
          aws health describe-events
          --filter eventTypeCategories=issue
          --region <REGION>
          --query 'events[?contains(availabilityZone, `<AZ_ID>`)].[eventTypeCode,statusCode,startTime]'
        cli_alt: >
          aws health describe-events
          --filter services=EC2,ECS,RDS eventTypeCategories=issue
          --query 'events[*].[service,region,availabilityZone,statusCode,startTime]'
      branches:
        - condition: "Open Health event scoped to the AZ"
          result: "AWS_CONFIRMED_AZ_IMPAIRMENT – AWS infrastructure issue, not application"
          next_step: 3
        - condition: "No Health event found"
          result: "POSSIBLE_AZ_IMPAIRMENT – verify with AZ-dimensioned metrics before acting"
          next_step: 3

    - step: 3
      question: "Which services have resources resident in the affected AZ?"
      check:
        cli: >
          aws ec2 describe-instances
          --filters Name=availability-zone,Values=<AZ_ID> Name=instance-state-name,Values=running
          --query 'Reservations[*].Instances[*].[InstanceId,AvailabilityZone,State.Name]'
        cli_ecs: >
          aws ecs list-tasks
          --cluster <CLUSTER_NAME>
          --query 'taskArns'
        cli_rds: >
          aws rds describe-db-instances
          --query 'DBInstances[?AvailabilityZone==`<AZ_ID>`].[DBInstanceIdentifier,MultiAZ,AvailabilityZone]'
      branches:
        - condition: "EC2 instances and/or ECS tasks in affected AZ"
          result: "COMPUTE_IN_AFFECTED_AZ – prepare zonal shift and ASG rebalance"
          next_step: 4
        - condition: "RDS writer instance in affected AZ"
          result: "DB_WRITER_IN_AFFECTED_AZ – prepare RDS failover"
          next_step: 4

    - step: 4
      question: "Do remaining AZs have sufficient capacity to absorb the affected AZ traffic load?"
      check:
        cli: >
          aws cloudwatch get-metric-statistics
          --namespace AWS/ApplicationELB
          --metric-name HealthyHostCount
          --dimensions Name=LoadBalancer,Value=<ALB_ARN_SUFFIX> Name=TargetGroup,Value=<TG_ARN_SUFFIX> Name=AvailabilityZone,Value=<HEALTHY_AZ_ID>
          --statistics Minimum
          --period 60
          --start-time $(date -u -d '10 minutes ago' +%FT%TZ)
          --end-time $(date -u +%FT%TZ)
      branches:
        - condition: "Healthy AZ target count >= affected AZ target count"
          result: "CAPACITY_SUFFICIENT – proceed with zonal shift"
          next_step: 0
        - condition: "Healthy AZ target count < affected AZ target count"
          result: "CAPACITY_INSUFFICIENT – scale out remaining AZs before shifting traffic"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "AZ-INFRA"
    name: "AWS infrastructure impairment within the Availability Zone"
    description: >
      AWS infrastructure components (physical hosts, networking, power) within the AZ
      are degraded or unavailable. EC2 status checks fail, instances become unreachable,
      and services dependent on those instances report errors. AWS Health Dashboard
      typically shows a corresponding infrastructure event.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-03"
      - "SYM-04"

  - code: "AZ-NETWORK"
    name: "Networking impairment within or connecting to the Availability Zone"
    description: >
      Network connectivity within the AZ or between the AZ and other AZs or the internet
      is impaired. Health checks timeout rather than receiving explicit failure responses.
      VPC Flow Logs may show dropped packets destined for resources in the affected AZ.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-04"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "AZ-INFRA"
    actions:
      - order: 1
        name: "ARC Zonal Shift – shift traffic away from the affected AZ"
        description: >
          Use Route 53 ARC Zonal Shift to immediately move traffic away from the
          affected AZ across all registered load balancers. This is the fastest
          and most comprehensive traffic evacuation method.
          GUARDRAIL: Verify remaining AZs have sufficient capacity before executing.
        type: "aws_cli"
        command: >
          aws arc-zonal-shift start-zonal-shift
          --resource-identifier <ALB_ARN>
          --away-from <AZ_ID>
          --expires-in 1h
          --comment "AZ failure - shifting traffic away from <AZ_ID>"
        rollback_command: >
          aws arc-zonal-shift cancel-zonal-shift
          --zonal-shift-id <ZONAL_SHIFT_ID>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          All traffic routed away from the affected AZ. Remaining AZs must handle
          full load. Monitor remaining AZ capacity closely during shift.

      - order: 2
        name: "ALB – Automatic unhealthy target removal (health check based)"
        description: >
          ALB automatically stops routing traffic to targets that fail health checks.
          Verify that health check interval and threshold are configured to detect
          failures quickly. No manual action required if health checks are configured
          correctly. Confirm unhealthy targets are deregistered.
        type: "aws_cli"
        command: >
          aws elbv2 describe-target-health
          --target-group-arn <TARGET_GROUP_ARN>
          --query 'TargetHealthDescriptions[*].[Target.Id,TargetHealth.State,TargetHealth.Reason]'
        rollback_command: >
          echo "ALB health checks are automatic. No rollback needed – targets re-register when healthy."
        risk: "low"
        requires_approval: false
        estimated_impact: "Automatic. ALB stops sending traffic to unhealthy targets within health check threshold cycles."

      - order: 3
        name: "Auto Scaling – Replace instances in other AZs"
        description: >
          Auto Scaling automatically replaces terminated or failed instances and
          rebalances across remaining healthy AZs. If AZ impairment causes instance
          termination, ASG launches replacements in healthy AZs. Verify that the
          ASG minimum capacity can be met by remaining AZs.
        type: "aws_cli"
        command: >
          aws autoscaling describe-auto-scaling-groups
          --auto-scaling-group-names <ASG_NAME>
          --query 'AutoScalingGroups[0].[MinSize,MaxSize,DesiredCapacity,AvailabilityZones,Instances[*].[InstanceId,AvailabilityZone,HealthStatus]]'
        rollback_command: >
          echo "ASG rebalancing is automatic. Monitor instance counts per AZ during recovery."
        risk: "low"
        requires_approval: false
        estimated_impact: "ASG launches replacement instances in healthy AZs. Scale-out may temporarily increase cost."

      - order: 4
        name: "RDS – Force Multi-AZ failover if writer is in the affected AZ"
        description: >
          If the RDS writer instance is in the affected AZ, trigger a Multi-AZ failover
          to promote the standby replica in a healthy AZ. DNS endpoint updates automatically.
          Applications using the RDS DNS endpoint will reconnect to the new writer after
          a brief connection interruption (typically 60-120 seconds).
        type: "aws_cli"
        command: >
          aws rds reboot-db-instance
          --db-instance-identifier <DB_INSTANCE_ID>
          --force-failover
        rollback_command: >
          aws rds reboot-db-instance
          --db-instance-identifier <DB_INSTANCE_ID>
          --force-failover
        risk: "high"
        requires_approval: true
        estimated_impact: >
          60-120 second connection interruption during failover. Applications must handle
          reconnection. DNS TTL for RDS endpoint is typically 5 seconds – ensure application
          connection pools honor low TTL values.

  - root_cause_code: "AZ-NETWORK"
    actions:
      - order: 1
        name: "ARC Zonal Shift – shift traffic away from the affected AZ"
        description: >
          Same action as AZ-INFRA order 1. Network impairment requires the same
          traffic evacuation response.
        type: "aws_cli"
        command: >
          aws arc-zonal-shift start-zonal-shift
          --resource-identifier <ALB_ARN>
          --away-from <AZ_ID>
          --expires-in 1h
          --comment "AZ network impairment - shifting traffic away from <AZ_ID>"
        rollback_command: >
          aws arc-zonal-shift cancel-zonal-shift
          --zonal-shift-id <ZONAL_SHIFT_ID>
        risk: "medium"
        requires_approval: true
        estimated_impact: "Same as AZ-INFRA order 1."

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Verify remaining AZs have sufficient healthy target capacity before zonal shift"
      check: >
        Confirm HealthyHostCount in all non-affected AZs is >= the total target count
        of the affected AZ. If remaining capacity is insufficient, scale out first:
        increase ASG desired count or ECS service desired count before initiating shift.
      block: true

    - description: "Confirm AZ-scoped impairment before shifting traffic – do not shift for application errors"
      check: >
        Verify that error metrics are concentrated in the AZ dimension (SYM-01, SYM-02).
        If errors are distributed across AZs, the cause is likely application-level,
        not AZ-level. Zonal shift for application errors will not help and reduces capacity.
      block: true

    - description: "RDS force-failover requires confirmation that standby replica is healthy"
      check: >
        Run: aws rds describe-db-instances --db-instance-identifier <ID>
        --query 'DBInstances[0].[MultiAZ,SecondaryAvailabilityZone,DBInstanceStatus]'
        Confirm MultiAZ=true and status=available before forcing failover.
      block: true

    - description: "Zonal shift expiry must be set – do not use indefinite shifts"
      check: >
        Always specify --expires-in when starting a zonal shift (minimum 1h, maximum 3d).
        Monitor and extend or cancel before expiry. Indefinite shifts reduce fault tolerance
        by permanently operating in a reduced-AZ configuration.
      block: false

  post_conditions:
    - description: "Healthy target count in remaining AZs must be stable or increasing after zonal shift"
      check: "HealthyHostCount in non-affected AZs >= pre-shift HealthyHostCount"
      auto_rollback: false

    - description: "5xx error rate must drop to pre-event baseline within 5 minutes of zonal shift"
      check: "HTTPCode_Target_5XX_Count returns to pre-event baseline after shift completes"
      auto_rollback: false

    - description: "Cancel zonal shift when AWS confirms AZ recovery"
      check: >
        Monitor AWS Health Dashboard for AZ recovery event. Cancel the zonal shift
        after confirming AZ health metrics (StatusCheckFailed = 0) are stable for
        at least 15 minutes.
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "5xx error rate returned to pre-event baseline after zonal shift"
      method: "CloudWatch Metrics – HTTPCode_Target_5XX_Count"
      expected: "5xx count at or below pre-event baseline for 5 consecutive minutes after shift"
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "HTTPCode_Target_5XX_Count"
        statistic: "Sum"
        threshold: "<= pre_event_baseline"

    - name: "Healthy target count in remaining AZs sufficient for load"
      method: "CloudWatch Metrics – HealthyHostCount by AvailabilityZone"
      expected: "HealthyHostCount in non-affected AZs >= required capacity for full traffic load"
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "HealthyHostCount"
        statistic: "Minimum"
        threshold: ">= required_capacity"

    - name: "Unhealthy host count in affected AZ no longer impacting traffic"
      method: "CloudWatch Metrics – UnHealthyHostCount by AvailabilityZone"
      expected: "Zonal shift prevents traffic from reaching unhealthy targets in affected AZ"
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "UnHealthyHostCount"
        statistic: "Maximum"
        threshold: "traffic not routed to unhealthy AZ targets"

    - name: "RDS connection count stable after failover"
      method: "CloudWatch Metrics – DatabaseConnections"
      expected: "DatabaseConnections recovers to pre-event level within 3 minutes of failover"
      metric:
        namespace: "AWS/RDS"
        metric_name: "DatabaseConnections"
        statistic: "Average"
        threshold: ">= pre_event_connection_count"

    - name: "Request latency p99 returned to pre-event level"
      method: "CloudWatch Metrics – TargetResponseTime p99"
      expected: "TargetResponseTime p99 at or below pre-event baseline"
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "TargetResponseTime"
        statistic: "p99"
        threshold: "<= pre_event_p99"

    - name: "AWS Health Dashboard AZ event resolved"
      method: "AWS Health API – describe-events"
      expected: "AZ-scoped event statusCode=closed before canceling zonal shift"
      log_query: |
        fields @timestamp, @message
        | filter @message like "availability zone" OR @message like "AZ"
        | sort @timestamp desc
        | limit 20

  stability_window: 300
  success_criteria: >
    All of the following for 5 consecutive minutes after zonal shift:
    (1) 5xx error rate at or below pre-event baseline,
    (2) HealthyHostCount in remaining AZs sufficient for full traffic load,
    (3) Request latency p99 at or below pre-event baseline,
    (4) RDS connections stable (if failover was performed).
    Cancel zonal shift only after AWS Health Dashboard confirms AZ recovery
    AND AZ metrics are stable for at least 15 minutes.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 300
  notify:
    - oncall
    - platform-team
    - database-team
