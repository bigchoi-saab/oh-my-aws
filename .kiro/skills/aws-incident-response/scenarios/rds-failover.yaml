schema: "decision-knowledge-record/v1"

metadata:
  id: "rds-failover"
  name: "RDS Multi-AZ Failover"
  description: >
    RDS Multi-AZ failover event causes DB connection errors and application outage.
    Covers three failover root causes (AZ failure, maintenance event, manual failover)
    with structured diagnosis, remediation, and verification procedures. Key delay
    factors include stale connection pools, DNS cache, and Route Table mismatches.
  category: "database"
  service: "rds"
  severity: "critical"
  tags:
    - rds
    - failover
    - multi-az
    - connection-pool
    - dns
    - database
  source_refs:
    - title: "Amazon RDS – Multi-AZ Deployments"
      url: "https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/Concepts.MultiAZ.html"
      type: "official_doc"
    - title: "Troubleshooting Multi-AZ Failover for Amazon RDS"
      url: "https://repost.aws/knowledge-center/rds-multi-az-failover-troubleshoot"
      type: "repost_kc"
    - title: "Amazon RDS – Working with DB Instance Events"
      url: "https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/working-with-events.html"
      type: "official_doc"
    - title: "Amazon RDS Proxy – Managing Connections"
      url: "https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/rds-proxy.html"
      type: "official_doc"
    - title: "Well-Architected – Reliability Pillar: Multi-AZ"
      url: "https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/welcome.html"
      type: "well_architected"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  - type: "event_bridge"
    description: "RDS event notification for Multi-AZ failover"
    condition: "RDS event message contains 'Multi-AZ failover' OR 'failover to standby'"
  - type: "metric_threshold"
    description: "DB connection errors spike"
    condition: "DatabaseConnections drop to 0 OR application DB error rate > 5%"
  - type: "log_pattern"
    description: "Application logs show DB connection failure"
    condition: "@message like 'Connection refused' OR @message like 'Communications link failure'"

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "RDS event 'Multi-AZ failover started' or 'failover to standby completed' in event log"
    detection_method: "aws rds describe-events"
    cli: >
      aws rds describe-events
      --source-identifier <DB_INSTANCE_IDENTIFIER>
      --source-type db-instance
      --duration 60

  - id: "SYM-02"
    description: "DBInstanceStatus transitions through 'rebooting' → 'available' with new Writer AZ"
    detection_method: "aws rds describe-db-instances"
    cli: >
      aws rds describe-db-instances
      --db-instance-identifier <DB_INSTANCE_IDENTIFIER>
      --query 'DBInstances[0].{Status:DBInstanceStatus,MultiAZ:MultiAZ,AvailabilityZone:AvailabilityZone}'

  - id: "SYM-03"
    description: "Application DB connection errors spike (Connection refused, timeout, Communications link failure)"
    detection_method: "CloudWatch Logs Insights on application log group"
    log_query: |
      fields @timestamp, @message
      | filter @message like "Connection refused"
        OR @message like "Communications link failure"
        OR @message like "The last packet sent successfully"
      | stats count() as errorCount by bin(1m)
      | sort @timestamp desc

  - id: "SYM-04"
    description: "DatabaseConnections metric drops to 0 at failover time then recovers"
    detection_method: "CloudWatch Metrics"
    metric: "AWS/RDS | DatabaseConnections | Minimum drops to 0"

  - id: "SYM-05"
    description: "ReplicaLag metric elevated above 0 during failover synchronization"
    detection_method: "CloudWatch Metrics"
    metric: "AWS/RDS | ReplicaLag | Maximum > 0"

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  decision_tree:
    - step: 1
      question: "Has a Multi-AZ failover event been recorded in RDS event history?"
      check:
        cli: >
          aws rds describe-events
          --source-identifier <DB_INSTANCE_IDENTIFIER>
          --source-type db-instance
          --duration 60
          --query "Events[?contains(Message,'failover')]"
      branches:
        - condition: "Failover event found"
          result: "FAILOVER_CONFIRMED"
          next_step: 2
        - condition: "No failover event found"
          result: "NOT_FAILOVER – investigate other DB issues"
          next_step: 0

    - step: 2
      question: "What is the current DBInstanceStatus and which AZ is the new Writer in?"
      check:
        cli: >
          aws rds describe-db-instances
          --db-instance-identifier <DB_INSTANCE_IDENTIFIER>
          --query 'DBInstances[0].{Status:DBInstanceStatus,AZ:AvailabilityZone,MultiAZ:MultiAZ,Endpoint:Endpoint.Address}'
      branches:
        - condition: "Status = 'available' and AZ changed from original"
          result: "FAILOVER_COMPLETED – proceed to network verification"
          next_step: 3
        - condition: "Status = 'rebooting' or 'failing-over'"
          result: "FAILOVER_IN_PROGRESS – wait for completion before action"
          next_step: 0

    - step: 3
      question: "Is the Route Table configured to reach the new Writer AZ? Does Security Group allow access from app subnets?"
      check:
        cli: >
          aws ec2 describe-route-tables
          --filters Name=association.subnet-id,Values=<APP_SUBNET_IDS>
          --query 'RouteTables[*].Routes'
      branches:
        - condition: "Route Table missing route to new AZ subnet"
          result: "RDS-AZ-FAILURE – network path broken"
          next_step: 0
        - condition: "Route Table and SG allow access to new AZ"
          result: "NETWORK_OK – investigate application layer"
          next_step: 4

    - step: 4
      question: "Is the application connection pool still pointing at the old Writer (stale connections)?"
      check:
        description: >
          Check if DNS Writer endpoint resolves to the new instance IP.
          Compare current endpoint IP against RDS-reported instance IP.
        cli: >
          nslookup <CLUSTER_WRITER_ENDPOINT>
      branches:
        - condition: "DNS resolves to old IP (TTL not expired) OR app connection pool not refreshed"
          result: "STALE_CONNECTION_POOL or DNS_CACHE – proceed to remediation"
          next_step: 0
        - condition: "DNS resolves to new IP and connections still failing"
          result: "RDS-MAINT or RDS-MANUAL – check event source for root cause classification"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "RDS-AZ-FAILURE"
    name: "Availability Zone infrastructure failure triggered automatic failover"
    description: >
      AWS infrastructure issue in the primary AZ caused RDS to automatically promote
      the standby instance in a different AZ to the new Writer. The original AZ
      experienced hardware or network degradation.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-03"
    known_delays:
      - cause: "Stale connection pool"
        duration: "5-30 minutes"
      - cause: "DNS cache (TTL)"
        duration: "15-60 seconds"
      - cause: "Route Table missing for new AZ subnet"
        duration: "10-30 minutes (until discovered)"

  - code: "RDS-MAINT"
    name: "Scheduled AWS maintenance event triggered planned failover"
    description: >
      AWS scheduled maintenance (OS patching, minor version upgrade) caused a
      controlled Multi-AZ failover. The event is planned but may not have been
      communicated to application teams in time to prepare connection pool handling.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-03"
    known_delays:
      - cause: "Stale connection pool"
        duration: "5-30 minutes"
      - cause: "DNS cache (TTL)"
        duration: "15-60 seconds"

  - code: "RDS-MANUAL"
    name: "Manual failover initiated via console or CLI (Reboot with Failover)"
    description: >
      An operator or automation triggered a manual failover using the AWS console,
      CLI reboot-db-instance --force-failover, or RDS Proxy health check recovery.
      Root cause is human or automation-initiated action.
    probability: "low"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-03"
    known_delays:
      - cause: "Stale connection pool"
        duration: "5-30 minutes"
      - cause: "DNS cache (TTL)"
        duration: "15-60 seconds"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "RDS-AZ-FAILURE"
    prerequisite: >
      GUARDRAIL: Confirm failover is complete (DBInstanceStatus = 'available') before
      taking any remediation action. Acting during an in-progress failover can cause
      further connection disruption.
    actions:
      - order: 1
        name: "Verify new Writer AZ Route Table and Security Group"
        description: >
          Confirm the application subnets have a route to the new Writer AZ subnet.
          Verify Security Groups allow inbound on DB port (3306 MySQL / 5432 PostgreSQL)
          from application instance security groups or CIDR ranges.
        type: "aws_cli"
        command: >
          aws ec2 describe-route-tables
          --filters Name=association.subnet-id,Values=<APP_SUBNET_IDS>
          --query 'RouteTables[*].{RouteTableId:RouteTableId,Routes:Routes}'
        rollback_command: >
          echo "Remove any added routes or SG rules if they cause unintended access"
        risk: "low"
        requires_approval: false
        estimated_impact: "Read-only verification. No change."

      - order: 2
        name: "Flush DNS cache on application hosts"
        description: >
          The RDS Writer endpoint DNS TTL is typically 5 seconds but OS-level or
          JVM-level DNS caches may hold the old IP for 15-60 seconds or longer.
          Flushing the DNS cache forces re-resolution to the new Writer IP.
        type: "aws_cli"
        command: >
          # Linux (systemd-resolved):
          sudo systemd-resolve --flush-caches
          # Linux (nscd):
          sudo service nscd restart
          # Java applications: set networkaddress.cache.ttl=1 in JVM options
        rollback_command: >
          echo "No rollback needed for DNS flush"
        risk: "low"
        requires_approval: false
        estimated_impact: "Transient DNS re-resolution. Brief additional latency possible."

      - order: 3
        name: "Refresh application connection pool (rolling restart or pool drain)"
        description: >
          The most common delay after RDS failover is stale connection pools in the
          application that still point to the old Writer. Force a rolling restart of
          application instances or trigger a connection pool drain to close all existing
          connections. New connections will re-resolve DNS to the new Writer endpoint.
        type: "aws_cli"
        command: >
          # ECS rolling restart:
          aws ecs update-service
          --cluster <CLUSTER_NAME>
          --service <SERVICE_NAME>
          --force-new-deployment
          # EC2 Auto Scaling rolling refresh:
          aws autoscaling start-instance-refresh
          --auto-scaling-group-name <ASG_NAME>
          --preferences MinHealthyPercentage=50
        rollback_command: >
          # ECS rollback to previous task definition:
          aws ecs update-service
          --cluster <CLUSTER_NAME>
          --service <SERVICE_NAME>
          --task-definition <PREVIOUS_TASK_DEF>
        risk: "medium"
        requires_approval: true
        estimated_impact: "Rolling restart causes brief capacity reduction. Ensure minimum healthy count is maintained."

  - root_cause_code: "RDS-MAINT"
    prerequisite: >
      GUARDRAIL: Confirm failover is complete (DBInstanceStatus = 'available') before
      taking any remediation action.
    actions:
      - order: 1
        name: "Flush DNS cache and refresh connection pool"
        description: >
          Same as RDS-AZ-FAILURE remediation. Maintenance-triggered failovers produce
          identical connection disruption patterns. DNS flush and connection pool
          refresh are the primary recovery actions.
        type: "aws_cli"
        command: >
          sudo systemd-resolve --flush-caches &&
          aws ecs update-service
          --cluster <CLUSTER_NAME>
          --service <SERVICE_NAME>
          --force-new-deployment
        rollback_command: >
          aws ecs update-service
          --cluster <CLUSTER_NAME>
          --service <SERVICE_NAME>
          --task-definition <PREVIOUS_TASK_DEF>
        risk: "medium"
        requires_approval: true
        estimated_impact: "Rolling restart causes brief capacity reduction."

      - order: 2
        name: "Introduce RDS Proxy to abstract failover from application connection pools"
        description: >
          RDS Proxy maintains persistent connections to the RDS instance and automatically
          re-routes to the new Writer after failover, reducing application-visible downtime
          from 20-30 seconds to under 5 seconds. Eliminates stale connection pool problem.
        type: "aws_cli"
        command: >
          aws rds create-db-proxy
          --db-proxy-name <PROXY_NAME>
          --engine-family MYSQL
          --auth '[{"AuthScheme":"SECRETS","SecretArn":"<SECRET_ARN>","IAMAuth":"DISABLED"}]'
          --role-arn <IAM_ROLE_ARN>
          --vpc-subnet-ids <SUBNET_IDS>
          --vpc-security-group-ids <SG_IDS>
        rollback_command: >
          aws rds delete-db-proxy --db-proxy-name <PROXY_NAME>
        risk: "medium"
        requires_approval: true
        estimated_impact: "RDS Proxy incurs hourly cost per vCPU of the largest instance class."

  - root_cause_code: "RDS-MANUAL"
    prerequisite: >
      GUARDRAIL: Confirm failover is complete (DBInstanceStatus = 'available') before
      taking any remediation action. Identify who initiated the manual failover and why.
    actions:
      - order: 1
        name: "Flush DNS cache and refresh connection pool"
        description: >
          Same recovery steps as AZ failure. The application layer is unaware of whether
          the failover was manual or automatic.
        type: "aws_cli"
        command: >
          sudo systemd-resolve --flush-caches &&
          aws ecs update-service
          --cluster <CLUSTER_NAME>
          --service <SERVICE_NAME>
          --force-new-deployment
        rollback_command: >
          aws ecs update-service
          --cluster <CLUSTER_NAME>
          --service <SERVICE_NAME>
          --task-definition <PREVIOUS_TASK_DEF>
        risk: "medium"
        requires_approval: true
        estimated_impact: "Rolling restart causes brief capacity reduction."

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Failover must be complete before any remediation action"
      check: >
        Confirm DBInstanceStatus = 'available' via aws rds describe-db-instances before
        taking any remediation action. Acting during a failover-in-progress state can
        cause additional connection disruption and confuse the recovery process.
      block: true

    - description: "Identify the new Writer AZ before restarting application"
      check: >
        Record the new AvailabilityZone from describe-db-instances output.
        Confirm Route Table and Security Group allow application subnet access to new AZ
        before forcing a connection pool refresh. A restart without connectivity will loop.
      block: true

    - description: "Do not manually initiate a second failover during recovery"
      check: >
        Do not run reboot-db-instance --force-failover or trigger another manual failover
        while the current failover is being recovered. Double failover extends downtime.
      block: true

  post_conditions:
    - description: "Application error rate must return to pre-failover baseline"
      check: "DB connection error rate drops to near 0 within 5-minute stability window"
      auto_rollback: false

    - description: "DatabaseConnections count must return to normal operating level"
      check: "DatabaseConnections metric recovers to pre-failover baseline within 10 minutes"
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "DB instance status available in new AZ"
      method: "aws rds describe-db-instances"
      expected: "DBInstanceStatus = 'available', AvailabilityZone = new AZ"
      cli: >
        aws rds describe-db-instances
        --db-instance-identifier <DB_INSTANCE_IDENTIFIER>
        --query 'DBInstances[0].{Status:DBInstanceStatus,AZ:AvailabilityZone}'

    - name: "Query latency normal"
      method: "CloudWatch Metrics – ReadLatency and WriteLatency"
      expected: "ReadLatency and WriteLatency within pre-failover baseline (p95)"
      metric:
        namespace: "AWS/RDS"
        metric_name: "WriteLatency"
        statistic: "p95"
        threshold: "<= pre_failover_baseline"

    - name: "Replica Lag converged to 0"
      method: "CloudWatch Metrics – ReplicaLag"
      expected: "ReplicaLag = 0 (new standby has caught up)"
      metric:
        namespace: "AWS/RDS"
        metric_name: "ReplicaLag"
        statistic: "Maximum"
        threshold: "= 0"

    - name: "DatabaseConnections stable"
      method: "CloudWatch Metrics – DatabaseConnections"
      expected: "DatabaseConnections count stable and at normal operating level"
      metric:
        namespace: "AWS/RDS"
        metric_name: "DatabaseConnections"
        statistic: "Average"
        threshold: "stable, not oscillating"

    - name: "Application DB error rate cleared"
      method: "CloudWatch Logs Insights on application log group"
      expected: "Zero DB connection error messages in 5-minute window"
      log_query: |
        fields @timestamp, @message
        | filter @message like "Connection refused"
          OR @message like "Communications link failure"
        | stats count() as errorCount by bin(5m)

  stability_window: 300
  success_criteria: >
    All of the following for 5 consecutive minutes:
    (1) DBInstanceStatus = 'available' in the new AZ,
    (2) ReplicaLag = 0,
    (3) DatabaseConnections stable at normal level,
    (4) Application DB error rate at or below pre-failover baseline,
    (5) Query latency (ReadLatency/WriteLatency p95) within normal range.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 900
  notify:
    - oncall
    - dba-team
    - platform-team
