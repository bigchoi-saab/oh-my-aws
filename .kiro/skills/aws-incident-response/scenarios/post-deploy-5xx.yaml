schema: "decision-knowledge-record/v1"

metadata:
  id: "post-deploy-5xx"
  name: "Post-Deployment 5xx Error Spike"
  description: >
    HTTP 5xx error rate spikes immediately following a deployment event across Lambda,
    ECS, EC2/ASG, or API Gateway. Covers four root causes (code regression, configuration
    error, dependency incompatibility, resource exhaustion) with deployment-correlated
    diagnosis, rollback-first remediation, and verification procedures.
  category: "deployment"
  service: "multi"
  severity: "critical"
  tags:
    - deployment
    - 5xx
    - rollback
    - regression
    - codedeploy
    - canary
    - ecs
    - lambda
    - api-gateway
  source_refs:
    - title: "CodeDeploy – Automatically Roll Back a Deployment"
      url: "https://docs.aws.amazon.com/codedeploy/latest/userguide/deployments-rollback-and-redeploy.html"
      type: "official_doc"
    - title: "ECS – Service Circuit Breaker"
      url: "https://docs.aws.amazon.com/AmazonECS/latest/developerguide/deployment-circuit-breaker.html"
      type: "official_doc"
    - title: "Lambda – Traffic Shifting with Aliases"
      url: "https://docs.aws.amazon.com/lambda/latest/dg/configuration-aliases.html"
      type: "official_doc"
    - title: "API Gateway – Stage Rollback"
      url: "https://docs.aws.amazon.com/apigateway/latest/developerguide/how-to-deploy-api.html"
      type: "official_doc"
    - title: "X-Ray – Service Map"
      url: "https://docs.aws.amazon.com/xray/latest/devguide/xray-console-servicemap.html"
      type: "official_doc"
    - title: "Well-Architected – Deployment Safety"
      url: "https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/deploy-changes-in-small-frequent-reversible-increments.html"
      type: "well_architected"
    - title: "Troubleshoot CodeDeploy Failed Deployments (re:Post)"
      url: "https://repost.aws/knowledge-center/codedeploy-deployment-failed"
      type: "repost_kc"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  type: "metric_threshold"
  description: "5xx error rate rises above threshold correlated with a recent deployment event"
  condition: "5xxErrorRate > 1% within 10 minutes of deployment completion"
  log_query: |
    fields @timestamp, @requestId, @message, @logStream
    | filter @message like "5xx" OR @message like "Internal Server Error" OR @message like "status=5"
    | sort @timestamp desc
    | limit 100

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "ALB HTTPCode_Target_5XX_Count or API Gateway 5XXError metric spikes within minutes of deployment"
    detection_method: "CloudWatch Metrics – HTTP 5xx counters aligned to deployment timestamp"
    metric: "AWS/ApplicationELB | HTTPCode_Target_5XX_Count OR AWS/ApiGateway | 5XXError | Sum"

  - id: "SYM-02"
    description: "Application logs contain new exception types or stack traces not present before deployment"
    detection_method: "CloudWatch Logs Insights – error pattern diff pre/post deploy"
    log_query: |
      fields @timestamp, @message
      | filter @message like "Exception" OR @message like "Error" OR @message like "FATAL"
      | sort @timestamp desc
      | limit 200

  - id: "SYM-03"
    description: "Request latency p99 increases significantly after deployment while error rate rises"
    detection_method: "CloudWatch Metrics – TargetResponseTime p99"
    metric: "AWS/ApplicationELB | TargetResponseTime | p99"

  - id: "SYM-04"
    description: "X-Ray service map shows new RED fault nodes in services changed by the deployment"
    detection_method: "AWS X-Ray service map – fault rate by service node"
    metric: "X-Ray | FaultRate | by service node"

  - id: "SYM-05"
    description: "CodeDeploy deployment event timestamp is within 10 minutes before error onset"
    detection_method: "AWS CloudTrail – CreateDeployment or StartDeployment event"
    metric: "CloudTrail | eventName=CreateDeployment | eventTime"

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  key_principle: "Roll back first if reversible, diagnose later."
  decision_tree:
    - step: 1
      question: "Is there a deployment event within 10 minutes before the error spike onset?"
      check:
        cli: >
          aws codedeploy list-deployments
          --deployment-group-name <DEPLOYMENT_GROUP>
          --include-only-statuses Succeeded Failed InProgress
          --create-time-range start=$(date -u -d '60 minutes ago' +%FT%TZ),end=$(date -u +%FT%TZ)
        cli_alt: >
          aws cloudtrail lookup-events
          --lookup-attributes AttributeKey=EventName,AttributeValue=CreateDeployment
          --start-time $(date -u -d '60 minutes ago' +%FT%TZ)
          --end-time $(date -u +%FT%TZ)
      branches:
        - condition: "Deployment timestamp < error spike onset AND gap < 10 minutes"
          result: "DEPLOY_CORRELATED – proceed with rollback-first protocol"
          next_step: 2
        - condition: "No recent deployment found"
          result: "NOT_DEPLOY_RELATED – investigate other incident categories"
          next_step: 0

    - step: 2
      question: "Is the deployment still rolling out (partial traffic)? Or has it completed?"
      check:
        cli: >
          aws codedeploy get-deployment
          --deployment-id <DEPLOYMENT_ID>
          --query '[deploymentInfo.status, deploymentInfo.deploymentOverview]'
      branches:
        - condition: "Status=InProgress – canary or rolling still in flight"
          result: "STOP_DEPLOYMENT – halt further traffic shift immediately"
          next_step: 3
        - condition: "Status=Succeeded – all instances or functions on new version"
          result: "FULL_ROLLBACK_REQUIRED"
          next_step: 3

    - step: 3
      question: "Compare pre/post release error rate and latency by endpoint to determine blast radius"
      check:
        log_query: |
          fields @timestamp, @requestId, @message
          | filter @message like "Error" OR @message like "Exception"
          | stats count() as errorCount by bin(5m)
          | sort @timestamp desc
        cli: >
          aws cloudwatch get-metric-statistics
          --namespace AWS/ApplicationELB
          --metric-name HTTPCode_Target_5XX_Count
          --dimensions Name=LoadBalancer,Value=<ALB_ARN_SUFFIX>
          --statistics Sum
          --period 60
          --start-time $(date -u -d '30 minutes ago' +%FT%TZ)
          --end-time $(date -u +%FT%TZ)
      branches:
        - condition: "Error rate > 1% across multiple endpoints"
          result: "BROAD_IMPACT – initiate full rollback"
          next_step: 4
        - condition: "Error rate isolated to single endpoint or canary slice"
          result: "NARROW_IMPACT – halt canary, scope investigation"
          next_step: 4

    - step: 4
      question: "Examine application logs for new error patterns introduced by this deployment"
      check:
        log_query: |
          fields @timestamp, @message
          | filter @message like "Exception" OR @message like "FATAL" OR @message like "NullPointer"
          | stats count() as freq by @message
          | sort freq desc
          | limit 20
      branches:
        - condition: "New exception class not present in pre-deploy logs"
          result: "DEPLOY-CODE – code regression identified"
          next_step: 0
        - condition: "Errors reference missing env var, config key, or wrong endpoint"
          result: "DEPLOY-CONFIG – configuration error identified"
          next_step: 0
        - condition: "Errors reference library version conflict or missing dependency"
          result: "DEPLOY-DEPS – dependency incompatibility identified"
          next_step: 0
        - condition: "OOM, throttling, or resource limit errors"
          result: "DEPLOY-RESOURCE – resource exhaustion identified"
          next_step: 0

    - step: 5
      question: "Run X-Ray trace analysis to identify new bottlenecks introduced by the deployment"
      check:
        cli: >
          aws xray get-service-graph
          --start-time $(date -u -d '15 minutes ago' +%s)
          --end-time $(date -u +%s)
      branches:
        - condition: "New RED fault node visible in service map post-deploy"
          result: "X-RAY_FAULT_ISOLATED – matches log error pattern"
          next_step: 0
        - condition: "No new fault nodes but latency spike visible"
          result: "LATENCY_REGRESSION – check DEPLOY-RESOURCE or DEPLOY-DEPS"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "DEPLOY-CODE"
    name: "Code regression or bug introduced by the new release"
    description: >
      The new application version contains a code defect that causes runtime exceptions,
      unhandled errors, or incorrect business logic producing 5xx responses. Common causes:
      untested edge cases, null pointer dereferences, missing null guards, or API contract
      changes between services. Application logs show new exception class names not present
      in pre-deployment log streams.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-04"

  - code: "DEPLOY-CONFIG"
    name: "Configuration or environment variable error in the new release"
    description: >
      The deployment introduced a missing, incorrect, or environment-mismatched configuration
      value. Common patterns: wrong database endpoint for the target environment, missing
      Secrets Manager secret reference, incorrect feature flag value, or removed environment
      variable that existing code depends on.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"

  - code: "DEPLOY-DEPS"
    name: "Dependency version conflict or incompatible library introduced"
    description: >
      The new release contains a dependency version that is incompatible with the runtime
      environment or with other libraries. Common patterns: breaking API change in a minor
      bump, native library incompatibility with the container base image, or transitive
      dependency pulled in that conflicts with another package.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-03"

  - code: "DEPLOY-RESOURCE"
    name: "New release exceeds resource limits causing OOM, throttling, or timeout"
    description: >
      The new application version consumes significantly more memory, CPU, or concurrent
      connections than the previous release, pushing the runtime past configured limits.
      Common patterns: increased memory footprint from new library, tighter concurrency
      limits exposed by higher per-request work, or Lambda reserved concurrency exceeded
      by the new invocation pattern.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-03"
      - "SYM-04"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "DEPLOY-CODE"
    actions:
      - order: 1
        name: "Lambda – Switch alias to previous version (immediate traffic shift)"
        description: >
          Update the Lambda alias used by the API Gateway or event source to point back
          to the previously known-good published version. Takes effect on next invocation.
        type: "aws_cli"
        command: >
          aws lambda update-alias
          --function-name <FUNCTION_NAME>
          --name <ALIAS_NAME>
          --function-version <PREVIOUS_VERSION>
        rollback_command: >
          aws lambda update-alias
          --function-name <FUNCTION_NAME>
          --name <ALIAS_NAME>
          --function-version <FAILED_VERSION>
        risk: "low"
        requires_approval: false
        estimated_impact: "Immediate traffic shift. No downtime. Previous version resumes serving all traffic."

      - order: 2
        name: "Lambda – CodeDeploy canary rollback (if deployment still in flight)"
        description: >
          Stop the in-progress CodeDeploy deployment to prevent further traffic shift
          to the failing version and roll back any shifted traffic.
        type: "aws_cli"
        command: >
          aws codedeploy stop-deployment
          --deployment-id <DEPLOYMENT_ID>
          --auto-rollback-enabled
        rollback_command: >
          aws codedeploy create-deployment
          --application-name <APP_NAME>
          --deployment-group-name <DEPLOYMENT_GROUP>
          --revision <PREVIOUS_REVISION>
        risk: "low"
        requires_approval: false
        estimated_impact: "Stops traffic shift. Triggers automatic rollback to previous revision."

      - order: 3
        name: "ECS – Revert task definition to previous revision"
        description: >
          Force a new ECS service deployment using the previous known-good task definition
          revision. ECS will drain current tasks and replace with the previous version.
        type: "aws_cli"
        command: >
          aws ecs update-service
          --cluster <CLUSTER_NAME>
          --service <SERVICE_NAME>
          --task-definition <PREVIOUS_TASK_DEF_ARN>
          --force-new-deployment
        rollback_command: >
          aws ecs update-service
          --cluster <CLUSTER_NAME>
          --service <SERVICE_NAME>
          --task-definition <FAILED_TASK_DEF_ARN>
          --force-new-deployment
        risk: "low"
        requires_approval: false
        estimated_impact: >
          ECS rolling update replaces tasks gradually. Brief mixed-version traffic during
          drain period (typically 30-120 seconds depending on deregistration delay).

      - order: 4
        name: "ECS – Circuit Breaker auto-rollback (if enabled)"
        description: >
          If ECS deployment circuit breaker is enabled, ECS automatically stops the
          deployment and rolls back when a threshold of task failures is detected.
          Verify circuit breaker triggered and confirm rollback state.
        type: "aws_cli"
        command: >
          aws ecs describe-services
          --cluster <CLUSTER_NAME>
          --services <SERVICE_NAME>
          --query 'services[0].deployments[*].[status,rolloutState,rolloutStateReason]'
        rollback_command: >
          echo "Circuit breaker handles rollback automatically. If manual intervention needed, use update-service with previous task definition."
        risk: "low"
        requires_approval: false
        estimated_impact: "Automatic. Circuit breaker rolls back without manual intervention."

      - order: 5
        name: "EC2/ASG – Launch Template rollback to previous version"
        description: >
          Set the Auto Scaling Group to use the previous Launch Template version and
          trigger instance refresh to replace running instances with the previous AMI or
          user data configuration.
        type: "aws_cli"
        command: >
          aws autoscaling update-auto-scaling-group
          --auto-scaling-group-name <ASG_NAME>
          --launch-template LaunchTemplateName=<TEMPLATE_NAME>,Version=<PREVIOUS_VERSION> &&
          aws autoscaling start-instance-refresh
          --auto-scaling-group-name <ASG_NAME>
          --preferences MinHealthyPercentage=80
        rollback_command: >
          aws autoscaling update-auto-scaling-group
          --auto-scaling-group-name <ASG_NAME>
          --launch-template LaunchTemplateName=<TEMPLATE_NAME>,Version=<FAILED_VERSION>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Instance refresh gradually replaces instances. Duration depends on fleet size
          and MinHealthyPercentage. Maintain 80% healthy during refresh.

      - order: 6
        name: "API Gateway – Roll back stage deployment to previous deployment ID"
        description: >
          Revert the API Gateway stage to point at the previous deployment. API Gateway
          retains all previous deployments and supports instant reversion.
        type: "aws_cli"
        command: >
          aws apigateway update-stage
          --rest-api-id <API_ID>
          --stage-name <STAGE_NAME>
          --patch-operations op=replace,path=/deploymentId,value=<PREVIOUS_DEPLOYMENT_ID>
        rollback_command: >
          aws apigateway update-stage
          --rest-api-id <API_ID>
          --stage-name <STAGE_NAME>
          --patch-operations op=replace,path=/deploymentId,value=<FAILED_DEPLOYMENT_ID>
        risk: "low"
        requires_approval: false
        estimated_impact: "Instant. API Gateway immediately serves previous configuration."

  - root_cause_code: "DEPLOY-CONFIG"
    actions:
      - order: 1
        name: "Identify and correct the misconfigured environment variable or secret reference"
        description: >
          Review the new deployment's configuration against the working previous version.
          Check for missing Secrets Manager ARNs, wrong Parameter Store paths, or
          environment variable name changes that broke existing code references.
        type: "aws_cli"
        command: >
          aws lambda get-function-configuration
          --function-name <FUNCTION_NAME>
          --query 'Environment.Variables'
        rollback_command: >
          echo "Revert via compute-specific rollback command above and correct config before next deploy"
        risk: "low"
        requires_approval: false
        estimated_impact: "No direct cost impact. Config correction requires a new deploy."

      - order: 2
        name: "Roll back using compute-specific rollback (see DEPLOY-CODE actions above)"
        description: >
          Apply the appropriate rollback action for the compute type (Lambda alias switch,
          ECS task definition revert, etc.) to immediately restore working configuration.
        type: "reference"
        command: "See DEPLOY-CODE remediation actions above"
        rollback_command: "N/A"
        risk: "low"
        requires_approval: false
        estimated_impact: "Same as compute-specific rollback above."

  - root_cause_code: "DEPLOY-DEPS"
    actions:
      - order: 1
        name: "Roll back to previous version using compute-specific rollback"
        description: >
          Dependency conflicts cannot be resolved without a code change. Roll back
          immediately to restore service, then fix the dependency issue in the next
          release cycle.
        type: "reference"
        command: "See DEPLOY-CODE remediation actions above"
        rollback_command: "N/A"
        risk: "low"
        requires_approval: false
        estimated_impact: "Same as compute-specific rollback above."

  - root_cause_code: "DEPLOY-RESOURCE"
    actions:
      - order: 1
        name: "Roll back to previous version to restore resource usage baseline"
        description: >
          If the new release exhausts memory, CPU, or concurrency limits, the fastest
          recovery is rollback. Then profile the new version in a lower-traffic environment
          before re-deploying with adjusted resource limits.
        type: "reference"
        command: "See DEPLOY-CODE remediation actions above"
        rollback_command: "N/A"
        risk: "low"
        requires_approval: false
        estimated_impact: "Same as compute-specific rollback above."

      - order: 2
        name: "Temporarily increase Lambda reserved concurrency or ECS desired count"
        description: >
          If rollback is not immediately possible and resource exhaustion is the cause,
          increase the resource limit as a stopgap while rollback is prepared.
        type: "aws_cli"
        command: >
          aws lambda put-function-concurrency
          --function-name <FUNCTION_NAME>
          --reserved-concurrent-executions <INCREASED_VALUE>
        rollback_command: >
          aws lambda put-function-concurrency
          --function-name <FUNCTION_NAME>
          --reserved-concurrent-executions <PREVIOUS_VALUE>
        risk: "medium"
        requires_approval: true
        estimated_impact: "Higher concurrency may increase cost. This is a stopgap, not a fix."

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Confirm deployment correlation before initiating rollback"
      check: >
        Verify deployment timestamp precedes error spike onset by fewer than 10 minutes.
        Do not roll back if error spike predates deployment or has an independent cause.
      block: true

    - description: "Identify the exact previous known-good version before rollback"
      check: >
        Retrieve and record the previous Lambda version ARN, ECS task definition ARN,
        Launch Template version number, or API Gateway deployment ID before issuing
        rollback command. Rollback to wrong version can worsen the incident.
      block: true

    - description: "EC2/ASG instance refresh MinHealthyPercentage must be at least 80%"
      check: >
        Confirm MinHealthyPercentage >= 80 before starting instance refresh.
        Lower values risk reducing capacity below traffic demand during rollback.
      block: true

    - description: "Do not re-deploy the failing version until root cause is confirmed"
      check: >
        After rollback, require root cause identification from diagnosis steps before
        allowing re-deployment of the same version or a hotfix based on assumptions.
      block: false

  post_conditions:
    - description: "5xx error rate must return to pre-deployment baseline within 5 minutes of rollback"
      check: "HTTPCode_Target_5XX_Count or API Gateway 5XXError must drop to <= pre-deploy baseline"
      auto_rollback: false

    - description: "No new exception patterns in logs after rollback completes"
      check: >
        CloudWatch Logs Insights query for exception class names from the failing version
        must return zero results within 5-minute window after rollback.
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "5xx error rate returned to pre-deployment baseline"
      method: "CloudWatch Metrics – HTTPCode_Target_5XX_Count or API Gateway 5XXError"
      expected: "5xx count at or below pre-deployment baseline for 5 consecutive minutes"
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "HTTPCode_Target_5XX_Count"
        statistic: "Sum"
        threshold: "<= pre_deploy_baseline"

    - name: "Active compute version confirmed as previous known-good version"
      method: "AWS CLI – describe current version in service"
      expected: "Lambda alias points to previous version, ECS service uses previous task def, ASG uses previous launch template"
      log_query: |
        fields @timestamp, @message
        | filter @message like "version" OR @message like "revision"
        | sort @timestamp desc
        | limit 20

    - name: "No new exception types in application logs"
      method: "CloudWatch Logs Insights – exception pattern query"
      expected: "Zero occurrences of exception class names from the failed version in the 5-minute window"
      log_query: |
        fields @timestamp, @message
        | filter @message like "Exception" OR @message like "FATAL"
        | stats count() as errorCount by bin(1m)
        | sort @timestamp desc

    - name: "Request latency p99 returned to pre-deployment level"
      method: "CloudWatch Metrics – TargetResponseTime p99"
      expected: "TargetResponseTime p99 at or below pre-deployment p99 value"
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "TargetResponseTime"
        statistic: "p99"
        threshold: "<= pre_deploy_p99"

    - name: "Healthy target count stable in ALB target group"
      method: "CloudWatch Metrics – HealthyHostCount"
      expected: "HealthyHostCount equals or exceeds pre-deployment baseline"
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "HealthyHostCount"
        statistic: "Minimum"
        threshold: ">= pre_deploy_healthy_count"

    - name: "X-Ray service map shows no new RED fault nodes"
      method: "AWS X-Ray service map – post-rollback observation"
      expected: "Service map fault rate by node at or below pre-deployment levels"
      metric:
        namespace: "X-Ray"
        metric_name: "FaultRate"
        statistic: "by service node"
        threshold: "<= pre_deploy_fault_rate"

  stability_window: 300
  success_criteria: >
    All of the following for 5 consecutive minutes after rollback:
    (1) 5xx error rate at or below pre-deployment baseline,
    (2) Active version confirmed as previous known-good release,
    (3) No new exception class names in application logs,
    (4) Request latency p99 at or below pre-deployment level.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: false
  escalation_timeout: 300
  notify:
    - oncall
    - release-team
    - platform-team
