schema: "decision-knowledge-record/v1"

metadata:
  id: "control-plane-failure"
  name: "AWS Control Plane Failure"
  description: >
    AWS control plane APIs (create/update/delete operations) fail while data plane
    workloads (running EC2 instances, Lambda invocations, active ECS tasks) continue
    to operate partially or fully. The core principle is Static Stability: the data
    plane must survive without the control plane. Remediation focuses on freezing all
    infrastructure changes, operating on pre-provisioned capacity, and using only
    data-plane-level operations until the control plane recovers.
  category: "platform"
  service: "multi"
  severity: "high"
  tags:
    - control-plane
    - static-stability
    - api-failure
    - data-plane
    - well-architected
    - reliability
    - provisioning
  source_refs:
    - title: "AWS Well-Architected – Static Stability (REL11-BP05)"
      url: "https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/rel_mitigate_interaction_failure_graceful_degradation.html"
      type: "well_architected"
    - title: "AWS Well-Architected – Data Plane vs Control Plane (REL11-BP04)"
      url: "https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/rel_mitigate_interaction_failure_limit_retry_requests.html"
      type: "well_architected"
    - title: "AWS Health API"
      url: "https://docs.aws.amazon.com/health/latest/ug/calling-the-api.html"
      type: "official_doc"
    - title: "AWS Incident Response Playbooks – Control Plane"
      url: "https://github.com/aws-samples/aws-incident-response-playbooks"
      type: "repost_kc"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  type: "event_bridge"
  description: "AWS Health Dashboard control plane service event or API error rate spike"
  condition: >
    AWS Health event for EC2/ECS/Lambda/Auto Scaling control plane APIs OR
    CloudTrail error rate for Create/Update/Delete operations > 50%
  log_query: |
    fields @timestamp, errorCode, eventName, eventSource, awsRegion
    | filter errorCode like "ServiceUnavailable" OR errorCode like "InternalError" OR errorCode like "RequestExpired"
    | filter eventName like "Create" OR eventName like "Update" OR eventName like "Delete" OR eventName like "Terminate"
    | stats count() as apiErrors by eventSource, errorCode, bin(5m)
    | sort apiErrors desc

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "AWS API calls for Create/Update/Delete operations return ServiceUnavailable or InternalError"
    detection_method: "CloudTrail – filter errorCode ServiceUnavailable or InternalError for mutating API calls"
    cli: >
      aws cloudtrail lookup-events
      --lookup-attributes AttributeKey=EventName,AttributeValue=RunInstances
      --query 'Events[?ErrorCode!=null].[EventTime,EventName,ErrorCode]'

  - id: "SYM-02"
    description: "CI/CD pipelines and infrastructure provisioning fail but running workloads continue"
    detection_method: "CodePipeline / CDK deploy failure logs while application metrics remain healthy"

  - id: "SYM-03"
    description: "Auto Scaling group unable to launch or terminate instances"
    detection_method: "EC2 Auto Scaling Activity History shows Launch failures"
    cli: >
      aws autoscaling describe-scaling-activities
      --auto-scaling-group-name <ASG_NAME>
      --query 'Activities[?StatusCode==`Failed`].[StartTime,Description,StatusMessage]'

  - id: "SYM-04"
    description: "AWS Health Dashboard shows active event for control plane services in the region"
    detection_method: "AWS Health API – describe-events for affected service"
    cli: >
      aws health describe-events
      --filter '{"regions":["<REGION>"],"eventStatusCodes":["open","upcoming"]}'
      --query 'events[*].{Service:service,StatusCode:statusCode,StartTime:startTime}'

  - id: "SYM-05"
    description: "Running workloads (EC2 instances, ECS tasks, Lambda) still serving traffic"
    detection_method: "ALB HealthyHostCount > 0 AND application error rate within baseline"

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  decision_tree:
    - step: 1
      question: "Is this a control plane failure (API errors on create/update/delete) while data plane is alive?"
      check:
        description: >
          KEY DISTINCTION: Control plane = AWS management APIs (create, update, delete resources).
          Data plane = actual traffic serving (EC2 serving HTTP, Lambda processing events,
          ECS tasks running). These can fail independently.
        cli: >
          aws health describe-events
          --filter '{"regions":["<REGION>"],"eventStatusCodes":["open"]}'
          --query 'events[*].{Service:service,EventTypeCode:eventTypeCode}'
      branches:
        - condition: "AWS Health shows control plane event AND running workloads are alive"
          result: "Confirmed control plane failure – activate Static Stability mode"
          next_step: 2
        - condition: "AWS Health shows data plane event OR running workloads are also failing"
          result: "Data plane failure – escalate to az-failure or region-outage scenario"
          next_step: 0
        - condition: "No AWS Health event – may be transient API error"
          result: "Check API error rate trend; if sustained >10 minutes, treat as control plane failure"
          next_step: 2

    - step: 2
      question: "What is the scope? Single service (e.g., EC2 API), multiple services, or full region?"
      check:
        cli: >
          aws health describe-events
          --filter '{"regions":["<REGION>"],"eventStatusCodes":["open"]}'
          --query 'events[*].service'
      branches:
        - condition: "Single service affected (e.g., only EC2 API)"
          result: "Scope is limited – freeze changes only for affected service, monitor data plane"
          next_step: 3
        - condition: "Multiple services or full region control plane affected"
          result: "Broad scope – freeze ALL infrastructure changes across all services"
          next_step: 3

    - step: 3
      question: "Is the data plane currently under-capacity? Are Auto Scaling events pending?"
      check:
        cli: >
          aws autoscaling describe-auto-scaling-groups
          --query 'AutoScalingGroups[*].{Name:AutoScalingGroupName,Desired:DesiredCapacity,Running:Instances[?LifecycleState==`InService`]|length(@)}'
      branches:
        - condition: "Running capacity >= minimum required (pre-provisioned)"
          result: "Data plane stable – hold position, freeze changes, wait for control plane recovery"
          next_step: 0
        - condition: "Running capacity below minimum required"
          result: "Insufficient pre-provisioned capacity – evaluate cross-region failover"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "CTRL-PLANE-AWS"
    name: "AWS infrastructure-level control plane service degradation"
    description: >
      AWS internal systems managing resource lifecycle (EC2 API, ECS control plane,
      Auto Scaling API, CloudFormation, Lambda management API) are degraded.
      This is an AWS-side issue; no customer-side configuration change will fix it.
      The correct response is Static Stability: keep existing workloads running,
      freeze all mutating operations, and wait for AWS to restore the control plane.
      Data plane workloads (running EC2 instances, active Lambda invocations, running
      ECS tasks) are designed to survive independently of the control plane.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-03"
      - "SYM-04"
      - "SYM-05"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "CTRL-PLANE-AWS"
    actions:
      - order: 1
        name: "Confirm control plane vs data plane status via AWS Health API"
        description: >
          Query AWS Health API to get the authoritative status of the affected service.
          This distinguishes a genuine AWS control plane event from a transient API error
          or configuration issue. Subscribe to AWS Health events via EventBridge for
          proactive notification in future incidents.
        type: "aws_cli"
        command: >
          aws health describe-events
          --filter '{"regions":["<REGION>"],"eventStatusCodes":["open","upcoming"]}'
          --query 'events[*].{Service:service,EventType:eventTypeCode,StartTime:startTime,StatusCode:statusCode}' &&
          aws health describe-event-details
          --event-arns <EVENT_ARN>
          --query 'successfulSet[0].eventDescription.latestDescription'
        rollback_command: >
          echo "Read-only operation. No rollback needed."
        risk: "low"
        requires_approval: false
        estimated_impact: "No impact. Diagnostic read-only operation."

      - order: 2
        name: "Freeze all infrastructure changes immediately"
        description: >
          STATIC STABILITY PRINCIPLE: During a control plane failure, mutating operations
          risk making the situation worse. Halt all infrastructure changes immediately.
          - Pause CI/CD pipelines (CodePipeline, GitHub Actions, Jenkins)
          - Suspend Terraform/CDK apply operations
          - Disable Auto Scaling policy-triggered scale-out (not scale-in)
          - Halt CloudFormation stack updates
          This preserves the current running state and prevents partial-state failures.
        type: "aws_cli"
        command: >
          aws codepipeline disable-stage-transition
          --pipeline-name <PIPELINE_NAME>
          --stage-name <STAGE_NAME>
          --transition-type Inbound
          --reason "Control plane failure in progress - changes frozen per incident protocol"
        rollback_command: >
          aws codepipeline enable-stage-transition
          --pipeline-name <PIPELINE_NAME>
          --stage-name <STAGE_NAME>
          --transition-type Inbound
        risk: "low"
        requires_approval: false
        estimated_impact: >
          Halts new deployments. Running workloads are unaffected.
          Planned deployments must be rescheduled after control plane recovery.

      - order: 3
        name: "Verify pre-provisioned capacity is sufficient for current traffic"
        description: >
          Check that currently running instances, tasks, and Lambda provisioned
          concurrency are sufficient to handle traffic without new resource creation.
          Static Stability requires pre-provisioning minimum capacity ahead of time
          so the system can operate through control plane failures.
        type: "aws_cli"
        command: >
          aws ec2 describe-instances
          --filters "Name=instance-state-name,Values=running"
          --query 'Reservations[*].Instances[*].{ID:InstanceId,Type:InstanceType,AZ:Placement.AvailabilityZone}'
          --output table &&
          aws ecs list-tasks
          --cluster <CLUSTER_NAME>
          --desired-status RUNNING
          --query 'taskArns|length(@)'
        rollback_command: >
          echo "Read-only operation. No rollback needed."
        risk: "low"
        requires_approval: false
        estimated_impact: "No impact. Capacity verification only."

      - order: 4
        name: "Execute data-plane-only operations if traffic management is needed"
        description: >
          During control plane failure, only data-plane operations are available and reliable.
          These operations do NOT require the AWS control plane:
          - ALB weighted target group adjustments (if already configured)
          - Route 53 DNS record changes (Route 53 control plane may still work)
          - Feature flag toggles in application configuration stores
          Do NOT attempt: Auto Scaling, launching instances, ECS service updates,
          Lambda configuration changes, or CloudFormation updates.
        type: "aws_cli"
        command: >
          aws route53 change-resource-record-sets
          --hosted-zone-id <ZONE_ID>
          --change-batch '{
            "Changes":[{
              "Action":"UPSERT",
              "ResourceRecordSet":{
                "Name":"<DOMAIN>",
                "Type":"A",
                "AliasTarget":{"HostedZoneId":"<ALB_ZONE_ID>","DNSName":"<ALB_DNS>","EvaluateTargetHealth":true}
              }
            }]
          }'
        rollback_command: >
          aws route53 change-resource-record-sets
          --hosted-zone-id <ZONE_ID>
          --change-batch file:///tmp/route53-previous-record.json
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Route 53 changes propagate within 60 seconds for low-TTL records.
          Verify Route 53 control plane is itself unaffected before attempting.

      - order: 5
        name: "Initiate cross-region failover if data plane capacity is insufficient"
        description: >
          If pre-provisioned capacity in the affected region cannot sustain traffic,
          shift traffic to a pre-configured standby region. This requires Route 53
          failover routing or ARC Routing Controls to be configured in advance.
          This is a last resort – only execute if data plane is failing due to
          under-capacity that cannot be resolved by control plane operations.
        type: "aws_cli"
        command: >
          aws route53-recovery-control-config update-routing-control-state
          --routing-control-arn <ROUTING_CONTROL_ARN>
          --routing-control-state On
        rollback_command: >
          aws route53-recovery-control-config update-routing-control-state
          --routing-control-arn <ROUTING_CONTROL_ARN>
          --routing-control-state Off
        risk: "high"
        requires_approval: true
        estimated_impact: >
          Traffic shifted to standby region. Requires standby region to be pre-warmed
          and data to be replicated. Cross-region latency increases for users.

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Confirm AWS Health event before declaring control plane failure"
      check: >
        Run: aws health describe-events to confirm an active control plane event.
        Do not freeze infrastructure changes based solely on a single API error.
        Require sustained errors (>5 minutes) or explicit AWS Health event.
      block: true

    - description: "Verify data plane health before cross-region failover"
      check: >
        Check ALB HealthyHostCount and application error rate before initiating
        cross-region failover. Failover is only warranted if data plane capacity
        is genuinely insufficient, not merely because control plane APIs are slow.
      block: true

    - description: "Cross-region failover requires standby region readiness check"
      check: >
        Verify standby region has sufficient capacity, current data replication lag
        is within acceptable RPO, and Route 53 failover routing is configured.
        Do not initiate failover to an unverified standby region.
      block: true

    - description: "Do not attempt mutating control plane operations during failure"
      check: >
        During a confirmed control plane failure, do not attempt:
        RunInstances, UpdateService, CreateStack, UpdateFunctionConfiguration.
        These operations will fail and may create partial state that is harder
        to resolve when the control plane recovers.
      block: true

  post_conditions:
    - description: "Confirm control plane recovery via AWS Health before resuming operations"
      check: >
        Wait for AWS Health event status to change to 'closed' or 'resolved'
        before resuming CI/CD pipelines and infrastructure changes.
      auto_rollback: false

    - description: "Resume infrastructure changes incrementally after control plane recovery"
      check: >
        After control plane recovery, resume pipelines one at a time.
        Do not batch all deferred deployments simultaneously to avoid overwhelming
        the newly recovered control plane.
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "AWS Health event closed"
      method: "AWS Health API describe-events"
      expected: "Event statusCode = closed or no open events for affected service"
      cli: >
        aws health describe-events
        --filter '{"regions":["<REGION>"],"eventStatusCodes":["open"]}'
        --query 'events[?service==`<AFFECTED_SERVICE>`]'

    - name: "Control plane API calls succeeding"
      method: "AWS CLI test create/describe operations"
      expected: "Describe operations return results without ServiceUnavailable errors"
      cli: >
        aws ec2 describe-instances --max-results 5 --query 'Reservations[0].Instances[0].InstanceId'

    - name: "Data plane metrics stable"
      method: "CloudWatch Metrics – application error rate and latency"
      expected: "Application error rate and latency within pre-incident baseline"

    - name: "CI/CD pipelines resumed successfully"
      method: "CodePipeline execution status"
      expected: "First post-recovery pipeline execution completes without errors"
      cli: >
        aws codepipeline list-pipeline-executions
        --pipeline-name <PIPELINE_NAME>
        --query 'pipelineExecutionSummaries[0].{Status:status,StartTime:startTime}'

  stability_window: 600
  success_criteria: >
    All of the following:
    (1) AWS Health event status = closed for the affected service,
    (2) AWS API describe operations succeed without errors,
    (3) Application error rate and latency within baseline for 10 consecutive minutes,
    (4) At least one CI/CD pipeline resumed and completed successfully.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 900
  notify:
    - oncall
    - platform-team
    - engineering-leadership
