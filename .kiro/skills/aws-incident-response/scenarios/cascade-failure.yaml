schema: "decision-knowledge-record/v1"

metadata:
  id: "cascade-failure"
  name: "Cascade Failure and Retry Storm"
  description: >
    Multiple services fail simultaneously in an expanding blast radius pattern driven by
    retry amplification from a single root-node failure. A downstream dependency becomes
    unavailable; callers retry aggressively; retry volume overwhelms the dependency further
    and spills into caller services, eventually exhausting thread pools, connection pools,
    and concurrency limits across the entire call graph. Covers root-node identification
    via X-Ray service map, retry multiplier chain analysis, and a strict remediation
    sequence that reduces retry pressure before any scaling action.
  category: "platform"
  service: "multi"
  severity: "critical"
  tags:
    - cascade-failure
    - retry-storm
    - circuit-breaker
    - backpressure
    - xray-service-map
    - thread-pool-exhaustion
    - timeout-amplification
    - platform
  source_refs:
    - title: "X-Ray – Service Map"
      url: "https://docs.aws.amazon.com/xray/latest/devguide/xray-console-servicemap.html"
      type: "official_doc"
    - title: "Well-Architected – Prevent Cascading Failures"
      url: "https://docs.aws.amazon.com/wellarchitected/latest/reliability-pillar/rel_mitigate_interaction_failure_graceful_degradation.html"
      type: "well_architected"
    - title: "AWS Builder's Library – Timeouts, retries, and backoff with jitter"
      url: "https://aws.amazon.com/builders-library/timeouts-retries-and-backoff-with-jitter/"
      type: "builders_library"
    - title: "AWS Builder's Library – Using load shedding to avoid overload"
      url: "https://aws.amazon.com/builders-library/using-load-shedding-to-avoid-overload/"
      type: "builders_library"
    - title: "AWS Builder's Library – Making retries safe with idempotent APIs"
      url: "https://aws.amazon.com/builders-library/making-retries-safe-with-idempotent-apis/"
      type: "builders_library"
    - title: "AppMesh / ECS Circuit Breaker"
      url: "https://docs.aws.amazon.com/app-mesh/latest/userguide/virtual-nodes.html"
      type: "official_doc"
    - title: "Troubleshoot Cascading Failures in Distributed Systems (re:Post)"
      url: "https://repost.aws/knowledge-center/cascading-failures-distributed-systems"
      type: "repost_kc"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  type: "metric_threshold"
  description: "Multiple services show simultaneous error rate rise combined with retry count and timeout surge"
  condition: >
    Two or more services show ErrorRate > 5% simultaneously AND
    retry-related metrics (RetryCount, ThrottledRequests, or SQS ApproximateAgeOfOldestMessage) are rising.
  log_query: |
    fields @timestamp, @requestId, @message, @logStream
    | filter @message like "retry" OR @message like "timeout" OR @message like "circuit" OR @message like "connection refused"
    | sort @timestamp desc
    | limit 200

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "Multiple services show simultaneous error rate spikes visible in X-Ray service map as RED fault nodes"
    detection_method: "AWS X-Ray service map – fault rate and error rate by service node"
    metric: "X-Ray | FaultRate | by service node | multiple nodes RED"

  - id: "SYM-02"
    description: "Retry counts rising across services – SDK retry metrics, SQS ApproximateNumberOfMessagesNotVisible, or custom retry log lines"
    detection_method: "CloudWatch Metrics – service-specific retry counters"
    metric: "AWS/SQS | ApproximateNumberOfMessagesNotVisible | Sum OR application retry log count"

  - id: "SYM-03"
    description: "Latency p99 rising across multiple services as thread pools and connection pools fill with waiting retries"
    detection_method: "CloudWatch Metrics – TargetResponseTime or Lambda Duration p99 across services"
    metric: "AWS/ApplicationELB | TargetResponseTime | p99 – multiple target groups"

  - id: "SYM-04"
    description: "Lambda throttles or ECS service CPU at 100% on caller services despite no new user traffic increase"
    detection_method: "CloudWatch Metrics – Lambda Throttles and ECS CPUUtilization"
    metric: "AWS/Lambda | Throttles | Sum OR AWS/ECS | CPUUtilization | Maximum"

  - id: "SYM-05"
    description: "A single root dependency service shows the earliest error onset – all other errors follow its failure timeline"
    detection_method: "CloudTrail event timeline and X-Ray trace timestamps – first RED node"
    metric: "X-Ray | earliest fault timestamp by service node"

  - id: "SYM-06"
    description: "SQS queue depth growing rapidly on queues feeding into the degraded dependency"
    detection_method: "CloudWatch Metrics – ApproximateNumberOfMessagesVisible"
    metric: "AWS/SQS | ApproximateNumberOfMessagesVisible | Maximum – rising trend"

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  key_principle: >
    Identify the root node first. Reducing retries is the most important action before
    any scaling or rollback. Scaling workers before controlling retry pressure worsens
    the cascade by adding more retry capacity against an already-overloaded dependency.
  decision_tree:
    - step: 1
      question: "Identify the root failure node via X-Ray service map – which service errored first?"
      check:
        cli: >
          aws xray get-service-graph
          --start-time $(date -u -d '30 minutes ago' +%s)
          --end-time $(date -u +%s)
          --query 'Services[?SummaryStatistics.FaultStatistics.TotalCount > `0`].[Name,Type,SummaryStatistics.FaultStatistics.TotalCount,SummaryStatistics.ErrorStatistics.TotalCount]'
        cli_traces: >
          aws xray get-trace-summaries
          --start-time $(date -u -d '30 minutes ago' +%s)
          --end-time $(date -u +%s)
          --filter-expression "fault = true"
          --query 'TraceSummaries[*].[Id,ResponseTime,HasFault,HasError,ServiceIds[*].Name]'
      branches:
        - condition: "Single service shows faults earlier than all others in the service graph"
          result: "ROOT_NODE_IDENTIFIED – this is the source dependency causing the cascade"
          next_step: 2
        - condition: "Multiple services show faults at the same timestamp"
          result: "POSSIBLE_PLATFORM_EVENT – check AZ or region health before proceeding"
          next_step: 2

    - step: 2
      question: "Reconstruct the failure timeline – which service errored first and how did it propagate?"
      check:
        log_query: |
          fields @timestamp, @logStream, @message
          | filter @message like "Error" OR @message like "Exception" OR @message like "timeout" OR @message like "refused"
          | stats earliest(@timestamp) as firstError by @logStream
          | sort firstError asc
          | limit 20
        cli: >
          aws cloudtrail lookup-events
          --lookup-attributes AttributeKey=EventName,AttributeValue=InvokeFunction
          --start-time $(date -u -d '45 minutes ago' +%FT%TZ)
          --end-time $(date -u +%FT%TZ)
          --max-results 50
      branches:
        - condition: "Root node failure precedes all other service failures by >= 1 minute"
          result: "SINGLE_ROOT_CAUSE – cascade from one dependency"
          next_step: 3
        - condition: "Failures appear simultaneous across unrelated services"
          result: "MULTI_ROOT_CAUSE – may be AZ or shared infrastructure event"
          next_step: 3

    - step: 3
      question: "Measure the retry multiplier – how many retries are being generated per original request failure?"
      check:
        log_query: |
          fields @timestamp, @message
          | filter @message like "retry" OR @message like "Retry" OR @message like "attempt"
          | stats count() as retryCount by bin(1m)
          | sort @timestamp desc
          | limit 30
        cli_sqs: >
          aws cloudwatch get-metric-statistics
          --namespace AWS/SQS
          --metric-name ApproximateNumberOfMessagesNotVisible
          --dimensions Name=QueueName,Value=<QUEUE_NAME>
          --statistics Maximum
          --period 60
          --start-time $(date -u -d '30 minutes ago' +%FT%TZ)
          --end-time $(date -u +%FT%TZ)
      branches:
        - condition: "Retry log count > 5x original request failure count"
          result: "HIGH_RETRY_MULTIPLIER – retry storm confirmed, reduce retries immediately"
          next_step: 4
        - condition: "Retry count proportional to failure count (multiplier < 3x)"
          result: "LOW_RETRY_MULTIPLIER – cascade driven by capacity exhaustion, not retry storm"
          next_step: 4

    - step: 4
      question: "Are non-critical consumers (batch jobs, analytics pipelines) contributing to load on the failing dependency?"
      check:
        log_query: |
          fields @timestamp, @logStream, @message
          | filter @logStream like "batch" OR @logStream like "analytics" OR @logStream like "report" OR @message like "batch"
          | stats count() as callCount by @logStream
          | sort callCount desc
          | limit 10
      branches:
        - condition: "Batch or analytics consumers are calling the failing dependency"
          result: "NON_CRITICAL_CONSUMERS_ACTIVE – disable them immediately to reduce load"
          next_step: 0
        - condition: "Only critical path services are calling the dependency"
          result: "CRITICAL_PATH_ONLY – focus on circuit breakers and retry reduction"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "CASCADE-RETRY-STORM"
    name: "Retry amplification from aggressive retry configuration on a failed dependency"
    description: >
      A downstream dependency becomes slow or unavailable. Callers with aggressive retry
      policies (high max_attempts, no exponential backoff, no jitter) immediately retry
      failed requests. Each retry consumes dependency capacity, worsening its degradation.
      The dependency falls further behind, causing more timeouts, more retries, and so on
      in a positive feedback loop. Thread pools and connection pools fill with in-flight
      retries, causing caller services to also reject new requests.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-03"
      - "SYM-04"
      - "SYM-05"

  - code: "CASCADE-THREAD-POOL"
    name: "Thread pool or connection pool exhaustion propagating across service tiers"
    description: >
      Slow responses from a dependency cause threads in caller services to block waiting
      for responses. As threads accumulate in WAITING state, the caller's thread pool
      exhausts, causing it to reject new requests with 503 or connection refused errors.
      This propagates upstream tier by tier. The pattern manifests even without explicit
      retries – slow responses alone are sufficient to exhaust bounded thread pools.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-03"
      - "SYM-04"

  - code: "CASCADE-QUEUE-BUILDUP"
    name: "Message queue depth explosion feeding more load into the degraded dependency"
    description: >
      Asynchronous consumers (Lambda with SQS, ECS workers) continue pulling messages
      and attempting to process them against a failing dependency. Failed messages
      become visible again after visibility timeout and are retried by additional
      consumer instances, multiplying load. Queue depth grows faster than the
      consumer can drain it, creating a backlog that persists even after the root
      dependency recovers.
    probability: "medium"
    related_symptoms:
      - "SYM-02"
      - "SYM-05"
      - "SYM-06"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "CASCADE-RETRY-STORM"
    actions:
      - order: 1
        name: "CRITICAL FIRST ACTION: Reduce retry counts on all callers of the failing dependency"
        description: >
          The most important action in a retry storm is reducing the retry multiplier.
          Scaling workers before controlling retry pressure adds more retry capacity
          against an already-overloaded dependency and worsens the cascade.
          Set max_attempts to 1 (no retries) or 2 (one retry) on all services
          calling the root-node dependency. Deploy as an emergency configuration change.
          ANTI-PATTERN: Do NOT scale workers first. Scale after retry pressure is controlled.
        type: "aws_cli"
        command: >
          aws lambda update-function-configuration
          --function-name <CALLER_FUNCTION_NAME>
          --environment "Variables={AWS_MAX_ATTEMPTS=1}"
        rollback_command: >
          aws lambda update-function-configuration
          --function-name <CALLER_FUNCTION_NAME>
          --environment "Variables={AWS_MAX_ATTEMPTS=3}"
        risk: "medium"
        requires_approval: false
        estimated_impact: >
          Reduces retry load on the dependency immediately. Some requests will fail
          without retry, but this is preferable to the entire system being unavailable.
          User-facing error rate may temporarily increase, then stabilize as dependency recovers.

      - order: 2
        name: "Apply circuit breakers to all calls targeting the failing dependency"
        description: >
          Enable circuit breaker pattern on all service-to-service calls to the root-node
          dependency. A circuit breaker in OPEN state stops sending requests and returns
          an immediate fallback, giving the dependency time to recover without continued
          load. For ECS with App Mesh, configure outlier detection. For Lambda, use
          a custom circuit breaker stored in ElastiCache or DynamoDB.
        type: "aws_cli"
        command: >
          aws appmesh update-virtual-node
          --mesh-name <MESH_NAME>
          --virtual-node-name <VIRTUAL_NODE_NAME>
          --spec '{"listeners":[{"outlierDetection":{"baseEjectionDuration":{"unit":"s","value":30},"interval":{"unit":"s","value":10},"maxEjectionPercent":100,"maxServerErrors":5}}]}'
        rollback_command: >
          aws appmesh update-virtual-node
          --mesh-name <MESH_NAME>
          --virtual-node-name <VIRTUAL_NODE_NAME>
          --spec '<PREVIOUS_SPEC>'
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Circuit breaker stops all traffic to the dependency when open. Callers receive
          immediate fallback responses instead of timeouts, freeing thread pools.

      - order: 3
        name: "Disable non-critical consumers calling the failing dependency"
        description: >
          Stop all batch jobs, analytics pipelines, reporting tasks, and other non-critical
          processes that are calling the failing dependency. This immediately reduces load
          on the dependency without affecting critical user-facing traffic.
        type: "aws_cli"
        command: >
          aws ecs update-service
          --cluster <CLUSTER_NAME>
          --service <BATCH_SERVICE_NAME>
          --desired-count 0
        rollback_command: >
          aws ecs update-service
          --cluster <CLUSTER_NAME>
          --service <BATCH_SERVICE_NAME>
          --desired-count <PREVIOUS_DESIRED_COUNT>
        risk: "low"
        requires_approval: false
        estimated_impact: "Non-critical jobs stop. Batch processing backlog accumulates but critical traffic is protected."

      - order: 4
        name: "Apply backpressure at the edge – reduce ALB or API Gateway request rate"
        description: >
          Apply WAF rate limiting or API Gateway throttling at the edge to reduce the
          inbound request rate to a level the degraded system can sustain. This prevents
          new requests from adding to the retry pile while the system recovers.
        type: "aws_cli"
        command: >
          aws apigateway update-stage
          --rest-api-id <API_ID>
          --stage-name <STAGE_NAME>
          --patch-operations op=replace,path=/*/*/throttling/rateLimit,value=<REDUCED_RATE>
        rollback_command: >
          aws apigateway update-stage
          --rest-api-id <API_ID>
          --stage-name <STAGE_NAME>
          --patch-operations op=replace,path=/*/*/throttling/rateLimit,value=<ORIGINAL_RATE>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Some user requests receive 429 Too Many Requests. This is preferable to all
          requests timing out. Inform users via status page before applying.

      - order: 5
        name: "Gradual traffic restoration after core dependency recovery (10% → 25% → 50% → 100%)"
        description: >
          After the root dependency recovers and retry pressure is controlled, restore
          traffic gradually. Monitor error rate and latency at each step before advancing.
          Do not restore full traffic at once – the recovering dependency may not yet
          handle full load and will re-enter the cascade.
          Steps: 10% for 5 minutes → 25% for 5 minutes → 50% for 5 minutes → 100%.
          Roll back to previous step if error rate exceeds 1%.
        type: "aws_cli"
        command: >
          aws apigateway update-stage
          --rest-api-id <API_ID>
          --stage-name <STAGE_NAME>
          --patch-operations op=replace,path=/*/*/throttling/rateLimit,value=<10_PCT_RATE>
        rollback_command: >
          aws apigateway update-stage
          --rest-api-id <API_ID>
          --stage-name <STAGE_NAME>
          --patch-operations op=replace,path=/*/*/throttling/rateLimit,value=<REDUCED_RATE>
        risk: "low"
        requires_approval: false
        estimated_impact: "Controlled ramp-up. Pause at each step and verify metrics before proceeding."

  - root_cause_code: "CASCADE-THREAD-POOL"
    actions:
      - order: 1
        name: "Reduce or eliminate retries first (same as CASCADE-RETRY-STORM order 1)"
        description: >
          Thread pool exhaustion is worsened by retries blocking threads longer.
          Reduce retries to free threads faster and allow thread pools to drain.
        type: "reference"
        command: "See CASCADE-RETRY-STORM order 1 above"
        rollback_command: "See CASCADE-RETRY-STORM order 1 above"
        risk: "medium"
        requires_approval: false
        estimated_impact: "Same as CASCADE-RETRY-STORM order 1."

      - order: 2
        name: "Apply circuit breakers to stop threads from blocking on failing dependency"
        description: >
          A circuit breaker in OPEN state returns immediately without making the network
          call, freeing the thread instantly instead of blocking for timeout duration.
          This is the fastest way to drain an exhausted thread pool.
        type: "reference"
        command: "See CASCADE-RETRY-STORM order 2 above"
        rollback_command: "See CASCADE-RETRY-STORM order 2 above"
        risk: "medium"
        requires_approval: true
        estimated_impact: "Same as CASCADE-RETRY-STORM order 2."

  - root_cause_code: "CASCADE-QUEUE-BUILDUP"
    actions:
      - order: 1
        name: "Reduce Lambda event source mapping batch size and concurrency to control queue drain rate"
        description: >
          Lower the Lambda event source mapping batch size and reserved concurrency to
          reduce the rate at which messages are pulled from the queue. This prevents
          the consumer from generating more failed calls to the dependency than it can
          handle during recovery. Do not delete messages – they will be processed after recovery.
        type: "aws_cli"
        command: >
          aws lambda update-event-source-mapping
          --uuid <EVENT_SOURCE_MAPPING_UUID>
          --batch-size 1
          --scaling-config MaximumConcurrency=2
        rollback_command: >
          aws lambda update-event-source-mapping
          --uuid <EVENT_SOURCE_MAPPING_UUID>
          --batch-size <PREVIOUS_BATCH_SIZE>
          --scaling-config MaximumConcurrency=<PREVIOUS_MAX_CONCURRENCY>
        risk: "medium"
        requires_approval: false
        estimated_impact: >
          Queue processing slows significantly. Backlog accumulates but messages are not
          lost. Resume normal batch size after dependency recovers and retry pressure is controlled.

      - order: 2
        name: "Temporarily disable the event source mapping to stop all queue consumption"
        description: >
          If reducing batch size and concurrency is insufficient, disable the event source
          mapping entirely. Messages remain in the queue (up to retention period) and will
          be processed after recovery. Use only when dependency recovery requires full
          traffic isolation.
        type: "aws_cli"
        command: >
          aws lambda update-event-source-mapping
          --uuid <EVENT_SOURCE_MAPPING_UUID>
          --enabled false
        rollback_command: >
          aws lambda update-event-source-mapping
          --uuid <EVENT_SOURCE_MAPPING_UUID>
          --enabled true
        risk: "high"
        requires_approval: true
        estimated_impact: >
          All queue processing stops. Messages accumulate up to SQS retention period
          (max 14 days). Re-enable after dependency recovery and verify backlog drains
          without re-triggering cascade.

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Identify the root-node dependency before taking any remediation action"
      check: >
        Use X-Ray service map to identify the single dependency with the earliest fault
        timestamp. All remediation actions should target callers of this root node.
        Acting on secondary or tertiary nodes without fixing the root cause will not
        resolve the cascade.
      block: true

    - description: "ANTI-PATTERN: Do not scale workers before controlling retry pressure"
      check: >
        Scaling worker instances or Lambda concurrency before reducing retries adds
        more retry capacity against the already-overloaded root dependency. This is
        the most common mistake in cascade failure response and will worsen the incident.
        Retry pressure must be reduced first via max_attempts reduction and circuit breakers.
      block: true

    - description: "Monitor retry rate during every remediation step"
      check: >
        After each action, verify that retry-related metrics (RetryCount, SQS
        ApproximateNumberOfMessagesNotVisible, timeout log count) are decreasing.
        If retry rate does not decrease after an action, do not proceed to the next
        step until the root cause of continued retries is understood.
      block: false

    - description: "Gradual traffic restoration – do not restore 100% at once after recovery"
      check: >
        Follow the 10% → 25% → 50% → 100% restoration sequence. Pause at each step
        for at least 5 minutes and verify error rate < 1% and retry counts stable
        before advancing. A recovering dependency that receives full traffic immediately
        can re-enter the cascade.
      block: false

    - description: "SQS event source mapping disable requires queue retention period verification"
      check: >
        Before disabling an event source mapping, confirm SQS message retention period
        (default 4 days, max 14 days). Messages that exceed retention are permanently lost.
        Adjust retention period if recovery may take longer than current setting.
      block: false

  post_conditions:
    - description: "Retry rate must be decreasing before advancing to traffic restoration"
      check: "RetryCount log lines or SQS ApproximateNumberOfMessagesNotVisible must show declining trend"
      auto_rollback: false

    - description: "Root dependency error rate must be below 1% before starting traffic restoration"
      check: "Root-node dependency FaultRate in X-Ray < 1% for 5 consecutive minutes before restoring traffic"
      auto_rollback: false

    - description: "Roll back to previous traffic level if error rate exceeds 1% during restoration"
      check: >
        During gradual restoration, if error rate exceeds 1% at any step, immediately
        revert to the previous traffic level and hold for 5 minutes before retrying.
      auto_rollback: true

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "X-Ray service map shows no RED fault nodes"
      method: "AWS X-Ray service map – fault rate by service node"
      expected: "All service nodes show fault rate < 1% for 5 consecutive minutes"
      metric:
        namespace: "X-Ray"
        metric_name: "FaultRate"
        statistic: "by service node"
        threshold: "< 1% across all nodes"

    - name: "Retry count returning to pre-incident baseline"
      method: "CloudWatch Logs Insights – retry log count per minute"
      expected: "Retry log line count per minute at or below pre-incident baseline"
      log_query: |
        fields @timestamp, @message
        | filter @message like "retry" OR @message like "Retry" OR @message like "attempt"
        | stats count() as retryCount by bin(1m)
        | sort @timestamp desc
        | limit 30

    - name: "Request latency p99 returning to pre-incident baseline across all services"
      method: "CloudWatch Metrics – TargetResponseTime p99 for each target group"
      expected: "TargetResponseTime p99 at or below pre-incident baseline for all target groups"
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "TargetResponseTime"
        statistic: "p99"
        threshold: "<= pre_incident_p99"

    - name: "Lambda throttle count returning to zero or pre-incident baseline"
      method: "CloudWatch Metrics – Lambda Throttles"
      expected: "Throttles count at or below pre-incident baseline for 5 consecutive minutes"
      metric:
        namespace: "AWS/Lambda"
        metric_name: "Throttles"
        statistic: "Sum"
        threshold: "<= pre_incident_throttle_baseline"

    - name: "SQS queue depth stable or draining"
      method: "CloudWatch Metrics – ApproximateNumberOfMessagesVisible"
      expected: "Queue depth stable or decreasing – not growing – for 5 consecutive minutes"
      metric:
        namespace: "AWS/SQS"
        metric_name: "ApproximateNumberOfMessagesVisible"
        statistic: "Maximum"
        threshold: "trend not increasing"

    - name: "5xx error rate across all services at pre-incident baseline"
      method: "CloudWatch Metrics – HTTPCode_Target_5XX_Count across all ALB target groups"
      expected: "5xx count at or below pre-incident baseline for 5 consecutive minutes"
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "HTTPCode_Target_5XX_Count"
        statistic: "Sum"
        threshold: "<= pre_incident_baseline"

    - name: "Traffic restoration complete at 100% with stable metrics"
      method: "CloudWatch Metrics – RequestCount and ErrorRate"
      expected: >
        Full traffic (100%) restored with error rate < 1% and latency p99 within
        pre-incident range for 5 consecutive minutes after final restoration step.
      metric:
        namespace: "AWS/ApplicationELB"
        metric_name: "RequestCount"
        statistic: "Sum"
        threshold: ">= pre_incident_request_rate"

  stability_window: 300
  success_criteria: >
    All of the following for 5 consecutive minutes after traffic restoration:
    (1) X-Ray service map shows no RED fault nodes (fault rate < 1% all nodes),
    (2) Retry count at or below pre-incident baseline,
    (3) Request latency p99 at or below pre-incident baseline across all services,
    (4) 5xx error rate at or below pre-incident baseline,
    (5) SQS queue depths stable or draining.
    Re-enable non-critical consumers only after all criteria are met.
    Conduct post-incident review to add circuit breakers and retry budgets to all
    service-to-service calls to prevent recurrence.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 300
  notify:
    - oncall
    - platform-team
    - service-owners
