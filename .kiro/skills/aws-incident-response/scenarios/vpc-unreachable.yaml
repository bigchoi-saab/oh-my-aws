schema: "decision-knowledge-record/v1"

metadata:
  id: "vpc-unreachable"
  name: "VPC Connectivity Failure"
  description: >
    Resources inside or targeting a VPC become unreachable with connection timeout or
    refused errors. Covers six root causes across the network stack: Security Group,
    Network ACL, Route Table, NAT Gateway, DNS resolution, and VPC Endpoint failures.
    Diagnosis follows a strict layer-by-layer OSI model approach to isolate the exact
    failure point before remediation. VPC Reachability Analyzer is the definitive
    confirmation tool.
  category: "network"
  service: "vpc"
  severity: "critical"
  tags:
    - vpc
    - security-group
    - nacl
    - route-table
    - nat-gateway
    - dns
    - vpc-endpoint
    - network
    - connectivity
  source_refs:
    - title: "VPC Reachability Analyzer"
      url: "https://docs.aws.amazon.com/vpc/latest/reachability/what-is-reachability-analyzer.html"
      type: "official_doc"
    - title: "VPC Flow Logs – Troubleshooting"
      url: "https://docs.aws.amazon.com/vpc/latest/userguide/flow-logs-troubleshooting.html"
      type: "official_doc"
    - title: "Network ACLs – Stateless filtering"
      url: "https://docs.aws.amazon.com/vpc/latest/userguide/vpc-network-acls.html"
      type: "official_doc"
    - title: "Troubleshoot NAT Gateway"
      url: "https://docs.aws.amazon.com/vpc/latest/userguide/nat-gateway-troubleshooting.html"
      type: "troubleshooting_guide"
    - title: "VPC Endpoints – Troubleshooting"
      url: "https://docs.aws.amazon.com/vpc/latest/userguide/endpoint-troubleshooting.html"
      type: "troubleshooting_guide"
    - title: "Route 53 Resolver – DNS within VPC"
      url: "https://docs.aws.amazon.com/Route53/latest/DeveloperGuide/resolver.html"
      type: "official_doc"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  type: "log_pattern"
  description: "Connection timed out or refused errors, or VPC Flow Logs showing REJECT actions"
  condition: >
    Application logs contain 'Connection timed out' OR 'Connection refused' OR
    'connect ETIMEDOUT' OR 'No route to host' OR
    VPC Flow Logs contain action=REJECT for the target port/IP
  first_signal: "Connection timed out/refused 에러 OR VPC Flow Logs REJECT"

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "Application returns 'Connection timed out' when reaching a target within or from VPC"
    detection_method: "Application logs or client-side error observation"

  - id: "SYM-02"
    description: "VPC Flow Logs show REJECT records for the target IP/port combination"
    detection_method: "CloudWatch Logs Insights query on VPC Flow Logs"
    log_query: |
      fields @timestamp, srcAddr, dstAddr, srcPort, dstPort, protocol, action, logStatus
      | filter action = "REJECT"
      | filter dstAddr = "<TARGET_IP>" OR srcAddr = "<SOURCE_IP>"
      | sort @timestamp desc
      | limit 100

  - id: "SYM-03"
    description: "DNS resolution fails for internal or AWS service endpoints"
    detection_method: "nslookup or dig from within the VPC (via EC2 Systems Manager)"
    cli: >
      aws ssm start-session --target <INSTANCE_ID>
      # Then inside session:
      # nslookup <TARGET_HOSTNAME> 169.254.169.253
      # dig <TARGET_HOSTNAME> @169.254.169.253

  - id: "SYM-04"
    description: "NAT Gateway ErrorPortAllocation or PacketDropCount metrics elevated"
    detection_method: "CloudWatch Metrics – AWS/NATGateway namespace"
    metric: "AWS/NATGateway | ErrorPortAllocation | Sum > 0 OR PacketDropCount > 0"

  - id: "SYM-05"
    description: "VPC Endpoint returning AccessDenied or connection errors for AWS service calls"
    detection_method: "CloudWatch Logs – application error logs showing endpoint-related failures"

  - id: "SYM-06"
    description: "Route Table has no route for the target CIDR or has a blackhole route"
    detection_method: "AWS Console Route Table view or CLI describe-route-tables"

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE (LAYER-BY-LAYER – CRITICAL)
# ---------------------------------------------------------------------------
diagnosis:
  approach: >
    LAYER-BY-LAYER diagnosis is mandatory. Do not skip layers. Network connectivity
    failures can be caused by any single layer in the stack. Diagnosing in OSI order
    (DNS → Routing → Policy → NAT/IGW → Endpoint) prevents misdiagnosis and
    unnecessary remediation of the wrong layer.

  decision_tree:
    - step: 1
      layer: "DNS"
      question: "Does DNS resolution succeed for the target hostname from within the VPC?"
      check:
        description: >
          Test DNS resolution from an EC2 instance or Lambda in the same VPC/subnet
          as the failing resource. Use the VPC DNS resolver at base + 2 address
          (e.g., 10.0.0.2 for 10.0.0.0/16) or 169.254.169.253.
        cli: >
          # Use SSM to run DNS check on an instance in the affected VPC
          aws ssm send-command
          --instance-ids <EC2_INSTANCE_ID>
          --document-name AWS-RunShellScript
          --parameters 'commands=["nslookup <TARGET_HOSTNAME> 169.254.169.253","dig <TARGET_HOSTNAME> @169.254.169.253 +short"]'
          --query 'Command.CommandId'

          # Check Route 53 Resolver rules if using custom DNS
          aws route53resolver list-resolver-rules
          --query 'ResolverRules[*].{Name:Name,DomainName:DomainName,Status:Status,TargetIps:TargetIps}'
      branches:
        - condition: "DNS resolution fails or returns NXDOMAIN / SERVFAIL"
          result: "VPC-DNS"
          next_step: 0
        - condition: "DNS resolution succeeds – target IP obtained"
          result: "DNS_OK – proceed to routing check"
          next_step: 2

    - step: 2
      layer: "ROUTING"
      question: "Does a valid route exist in the Route Table for the target IP, and is it not a blackhole?"
      check:
        cli: >
          # Get subnet for source resource
          aws ec2 describe-instances
          --instance-ids <SOURCE_INSTANCE_ID>
          --query 'Reservations[*].Instances[*].{SubnetId:SubnetId,VpcId:VpcId}'

          # Get route table for that subnet
          aws ec2 describe-route-tables
          --filters Name=association.subnet-id,Values=<SUBNET_ID>
          --query 'RouteTables[*].Routes[*].{Destination:DestinationCidrBlock,Target:GatewayId,State:State,NatGatewayId:NatGatewayId,VpcPeeringId:VpcPeeringConnectionId}'
      branches:
        - condition: "No route matches target CIDR, or route state = blackhole"
          result: "VPC-ROUTE"
          next_step: 0
        - condition: "Valid active route exists for target"
          result: "ROUTING_OK – proceed to policy check"
          next_step: 3

    - step: 3
      layer: "POLICY"
      question: "Do Security Group rules allow the traffic? Do Network ACL rules allow the traffic (both inbound AND outbound – NACL is stateless)?"
      check:
        description: >
          CRITICAL: NACL rules are stateless. Both inbound AND outbound rules must
          explicitly allow the traffic. Unlike Security Groups, NACL does not
          automatically allow return traffic. Check both source and destination NACLs.
        cli: >
          # Check Security Group on source/destination
          aws ec2 describe-security-groups
          --group-ids <SG_ID>
          --query 'SecurityGroups[*].{Inbound:IpPermissions,Outbound:IpPermissionsEgress}'

          # Check Network ACL for source subnet
          aws ec2 describe-network-acls
          --filters Name=association.subnet-id,Values=<SOURCE_SUBNET_ID>
          --query 'NetworkAcls[*].Entries[*].{Rule:RuleNumber,Protocol:Protocol,Action:RuleAction,CIDR:CidrBlock,FromPort:PortRange.From,ToPort:PortRange.To}'

          # Check Network ACL for destination subnet
          aws ec2 describe-network-acls
          --filters Name=association.subnet-id,Values=<DEST_SUBNET_ID>
          --query 'NetworkAcls[*].Entries[*].{Rule:RuleNumber,Protocol:Protocol,Action:RuleAction,CIDR:CidrBlock,FromPort:PortRange.From,ToPort:PortRange.To}'
      branches:
        - condition: "Security Group missing inbound or outbound rule for target port/IP"
          result: "VPC-SG"
          next_step: 0
        - condition: "NACL DENY rule matches before ALLOW rule, or return traffic port range blocked"
          result: "VPC-NACL"
          next_step: 0
        - condition: "SG and NACL rules are correct"
          result: "POLICY_OK – proceed to NAT/IGW check"
          next_step: 4

    - step: 4
      layer: "NAT/IGW"
      question: "For traffic destined outside the VPC – is the NAT Gateway or Internet Gateway reachable and healthy?"
      check:
        cli: >
          # Check NAT Gateway status
          aws ec2 describe-nat-gateways
          --filter Name=vpc-id,Values=<VPC_ID>
          --query 'NatGateways[*].{Id:NatGatewayId,State:State,SubnetId:SubnetId}'

          # Check NAT Gateway CloudWatch metrics
          aws cloudwatch get-metric-statistics
          --namespace AWS/NATGateway
          --metric-name ErrorPortAllocation
          --dimensions Name=NatGatewayId,Value=<NAT_GW_ID>
          --statistics Sum
          --period 300
          --start-time $(date -u -d '30 minutes ago' +%FT%TZ)
          --end-time $(date -u +%FT%TZ)

          # Check Internet Gateway attachment
          aws ec2 describe-internet-gateways
          --filters Name=attachment.vpc-id,Values=<VPC_ID>
          --query 'InternetGateways[*].{Id:InternetGatewayId,State:Attachments[0].State}'
      branches:
        - condition: "NAT Gateway state != available OR ErrorPortAllocation > 0"
          result: "VPC-NAT"
          next_step: 0
        - condition: "Internet Gateway not attached to VPC"
          result: "VPC-ROUTE (missing IGW attachment)"
          next_step: 0
        - condition: "NAT/IGW healthy"
          result: "EXTERNAL_PATH_OK – proceed to VPC Endpoint check"
          next_step: 5

    - step: 5
      layer: "VPC_ENDPOINT"
      question: "If the target is an AWS service – is there a VPC Endpoint for it, and is it in Available state with correct policy?"
      check:
        cli: >
          # List VPC endpoints in the VPC
          aws ec2 describe-vpc-endpoints
          --filters Name=vpc-id,Values=<VPC_ID>
          --query 'VpcEndpoints[*].{Service:ServiceName,State:State,Type:VpcEndpointType,Policy:PolicyDocument}'
      branches:
        - condition: "VPC Endpoint exists but state != available OR endpoint policy denies the action"
          result: "VPC-ENDPOINT"
          next_step: 0
        - condition: "No VPC Endpoint – traffic goes via NAT Gateway (check step 4 result)"
          result: "NO_ENDPOINT – expected path via NAT Gateway"
          next_step: 6
        - condition: "Endpoint state = available and policy allows"
          result: "ENDPOINT_OK"
          next_step: 6

    - step: 6
      layer: "REACHABILITY_ANALYZER"
      question: "Run VPC Reachability Analyzer to get definitive path analysis."
      check:
        description: >
          VPC Reachability Analyzer performs deterministic packet walk through VPC
          configuration and identifies the exact hop where connectivity is blocked.
          This is the definitive diagnostic tool – run it if previous steps are
          inconclusive or to confirm root cause before remediation.
        cli: >
          # Step 1: Create network insights path
          aws ec2 create-network-insights-path
          --source <SOURCE_RESOURCE_ID>
          --destination <DESTINATION_RESOURCE_ID>
          --protocol TCP
          --destination-port <TARGET_PORT>
          --query 'NetworkInsightsPath.NetworkInsightsPathId'

          # Step 2: Start analysis
          aws ec2 start-network-insights-analysis
          --network-insights-path-id <PATH_ID>
          --query 'NetworkInsightsAnalysis.NetworkInsightsAnalysisId'

          # Step 3: Get results (wait ~30 seconds)
          aws ec2 describe-network-insights-analyses
          --network-insights-analysis-ids <ANALYSIS_ID>
          --query 'NetworkInsightsAnalyses[*].{Status:Status,Reachable:NetworkPathFound,Explanation:Explanations[0]}'
      branches:
        - condition: "NetworkPathFound = false – Explanations field identifies blocking component"
          result: "ROOT_CAUSE_CONFIRMED – apply remediation for identified component"
          next_step: 0
        - condition: "NetworkPathFound = true – connectivity should be working"
          result: "INVESTIGATE_APPLICATION_LAYER – OS firewall, application binding, TLS mismatch"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "VPC-SG"
    name: "Security Group missing inbound or outbound rule"
    description: >
      Security Groups act as stateful firewalls at the instance/ENI level. A missing
      inbound rule on the destination SG, or a missing outbound rule on the source SG,
      silently drops packets. Unlike NACL, SGs are stateful – return traffic is
      automatically allowed for established connections.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"

  - code: "VPC-NACL"
    name: "Network ACL deny rule or missing return-traffic port range"
    description: >
      NACLs are stateless subnet-level firewalls evaluated in rule number order.
      The most common misconfiguration is blocking ephemeral/return traffic ports
      (1024-65535) on the inbound NACL of the source subnet, or a low-numbered
      DENY rule overriding a higher-numbered ALLOW rule.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"

  - code: "VPC-ROUTE"
    name: "Route Table missing route or blackhole route"
    description: >
      The subnet's route table has no route for the destination CIDR, or the route
      exists but points to a deleted resource (blackhole state). Common causes:
      deleted NAT Gateway, deleted VPC Peering connection, or missing default route.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-06"

  - code: "VPC-NAT"
    name: "NAT Gateway failure or port exhaustion"
    description: >
      NAT Gateway is unavailable (failed state), or has exhausted its port allocation
      (max 55,000 simultaneous connections per destination IP). Causes packet drops
      for outbound internet-bound traffic from private subnets.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-04"

  - code: "VPC-DNS"
    name: "DNS resolution failure within VPC"
    description: >
      The VPC DNS resolver (Route 53 Resolver) is not reachable, DNS Hostnames or
      DNS Resolution attributes are disabled on the VPC, or a custom Resolver rule
      is forwarding queries to an unavailable DNS server.
    probability: "low"
    related_symptoms:
      - "SYM-01"
      - "SYM-03"

  - code: "VPC-ENDPOINT"
    name: "VPC Endpoint unavailable or endpoint policy denying access"
    description: >
      A VPC Interface or Gateway Endpoint for an AWS service is in a failed/pending
      state, or the endpoint resource policy denies the specific action or principal.
      Traffic fails silently if the route table points to the endpoint but the endpoint
      is not functional.
    probability: "low"
    related_symptoms:
      - "SYM-01"
      - "SYM-05"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "VPC-SG"
    actions:
      - order: 1
        name: "Add missing Security Group inbound rule on destination"
        description: >
          Add an inbound rule to the destination resource's Security Group allowing
          traffic from the source Security Group ID (preferred) or source CIDR.
          Using SG ID references rather than CIDRs is best practice.
        type: "aws_cli"
        command: >
          aws ec2 authorize-security-group-ingress
          --group-id <DESTINATION_SG_ID>
          --protocol tcp
          --port <TARGET_PORT>
          --source-group <SOURCE_SG_ID>
        rollback_command: >
          aws ec2 revoke-security-group-ingress
          --group-id <DESTINATION_SG_ID>
          --protocol tcp
          --port <TARGET_PORT>
          --source-group <SOURCE_SG_ID>
        risk: "medium"
        requires_approval: true
        estimated_impact: "Immediately allows traffic. Verify source SG ID is correct before executing."

      - order: 2
        name: "Add missing Security Group outbound rule on source (if custom egress rules exist)"
        description: >
          By default SGs allow all outbound traffic. If custom egress rules are present,
          add the required outbound rule to the source SG.
        type: "aws_cli"
        command: >
          aws ec2 authorize-security-group-egress
          --group-id <SOURCE_SG_ID>
          --protocol tcp
          --port <TARGET_PORT>
          --destination-group <DESTINATION_SG_ID>
        rollback_command: >
          aws ec2 revoke-security-group-egress
          --group-id <SOURCE_SG_ID>
          --protocol tcp
          --port <TARGET_PORT>
          --destination-group <DESTINATION_SG_ID>
        risk: "medium"
        requires_approval: true
        estimated_impact: "Allows outbound traffic from source SG to destination."

  - root_cause_code: "VPC-NACL"
    actions:
      - order: 1
        name: "Add NACL inbound rule for ephemeral/return traffic ports (1024-65535)"
        description: >
          CRITICAL: NACLs are stateless. Add an ALLOW rule for ephemeral port range
          (1024-65535) on the inbound side of the SOURCE subnet NACL to permit return
          traffic. Rule number must be LOWER than any existing DENY rule for these ports.
        type: "aws_cli"
        command: >
          aws ec2 create-network-acl-entry
          --network-acl-id <SOURCE_SUBNET_NACL_ID>
          --rule-number <RULE_NUMBER_LOWER_THAN_DENY>
          --protocol tcp
          --rule-action allow
          --ingress
          --cidr-block <DESTINATION_CIDR>
          --port-range From=1024,To=65535
        rollback_command: >
          aws ec2 delete-network-acl-entry
          --network-acl-id <SOURCE_SUBNET_NACL_ID>
          --rule-number <RULE_NUMBER>
          --ingress
        risk: "medium"
        requires_approval: true
        estimated_impact: "Allows return traffic on ephemeral ports. Verify CIDR is scoped appropriately."

      - order: 2
        name: "Add NACL outbound rule to allow traffic from source to destination"
        description: >
          Add an ALLOW rule on the outbound side of the source subnet NACL for the
          target port and destination CIDR. Ensure rule number is lower than any DENY.
        type: "aws_cli"
        command: >
          aws ec2 create-network-acl-entry
          --network-acl-id <SOURCE_SUBNET_NACL_ID>
          --rule-number <RULE_NUMBER>
          --protocol tcp
          --rule-action allow
          --egress
          --cidr-block <DESTINATION_CIDR>
          --port-range From=<TARGET_PORT>,To=<TARGET_PORT>
        rollback_command: >
          aws ec2 delete-network-acl-entry
          --network-acl-id <SOURCE_SUBNET_NACL_ID>
          --rule-number <RULE_NUMBER>
          --egress
        risk: "medium"
        requires_approval: true
        estimated_impact: "Allows outbound traffic on target port. NACL changes are immediate."

  - root_cause_code: "VPC-ROUTE"
    actions:
      - order: 1
        name: "Add missing route to Route Table"
        description: >
          Add the missing route for the target CIDR pointing to the correct target
          (NAT Gateway, Internet Gateway, VPC Peering Connection, Transit Gateway, etc.).
        type: "aws_cli"
        command: >
          # Add route pointing to NAT Gateway (for private subnet internet access)
          aws ec2 create-route
          --route-table-id <ROUTE_TABLE_ID>
          --destination-cidr-block 0.0.0.0/0
          --nat-gateway-id <NAT_GW_ID>

          # OR add route pointing to Internet Gateway (for public subnet)
          # aws ec2 create-route
          # --route-table-id <ROUTE_TABLE_ID>
          # --destination-cidr-block 0.0.0.0/0
          # --gateway-id <IGW_ID>
        rollback_command: >
          aws ec2 delete-route
          --route-table-id <ROUTE_TABLE_ID>
          --destination-cidr-block 0.0.0.0/0
        risk: "HIGH"
        requires_approval: true
        estimated_impact: >
          Route changes affect all resources in associated subnets immediately.
          Adding a default route to NAT Gateway enables internet access for entire subnet.

      - order: 2
        name: "Replace blackhole route with valid target"
        description: >
          A blackhole route indicates the route target has been deleted. Replace it
          with the correct active resource (new NAT Gateway, etc.).
        type: "aws_cli"
        command: >
          aws ec2 replace-route
          --route-table-id <ROUTE_TABLE_ID>
          --destination-cidr-block <DEST_CIDR>
          --nat-gateway-id <NEW_NAT_GW_ID>
        rollback_command: >
          aws ec2 replace-route
          --route-table-id <ROUTE_TABLE_ID>
          --destination-cidr-block <DEST_CIDR>
          --nat-gateway-id <OLD_NAT_GW_ID>
        risk: "HIGH"
        requires_approval: true
        estimated_impact: "Restores routing for all resources in associated subnets."

  - root_cause_code: "VPC-NAT"
    actions:
      - order: 1
        name: "Create a new NAT Gateway if existing one is in failed state"
        description: >
          If the existing NAT Gateway is in a failed state, create a new one in the
          same subnet, update the route table to point to the new NAT Gateway.
          NAT Gateway failure is rare but requires a full replacement.
        type: "aws_cli"
        command: >
          # Allocate Elastic IP for new NAT Gateway
          aws ec2 allocate-address --domain vpc
          --query 'AllocationId'

          # Create new NAT Gateway
          aws ec2 create-nat-gateway
          --subnet-id <PUBLIC_SUBNET_ID>
          --allocation-id <EIP_ALLOCATION_ID>
          --query 'NatGateway.NatGatewayId'

          # Wait for available state (takes ~60 seconds)
          aws ec2 wait nat-gateway-available
          --nat-gateway-ids <NEW_NAT_GW_ID>

          # Update route table
          aws ec2 replace-route
          --route-table-id <PRIVATE_ROUTE_TABLE_ID>
          --destination-cidr-block 0.0.0.0/0
          --nat-gateway-id <NEW_NAT_GW_ID>
        rollback_command: >
          aws ec2 replace-route
          --route-table-id <PRIVATE_ROUTE_TABLE_ID>
          --destination-cidr-block 0.0.0.0/0
          --nat-gateway-id <OLD_NAT_GW_ID>

          aws ec2 delete-nat-gateway --nat-gateway-id <NEW_NAT_GW_ID>
        risk: "HIGH"
        requires_approval: true
        estimated_impact: >
          New NAT Gateway provisioning takes approximately 60 seconds.
          Additional EIP charge: ~$0.005/hour. NAT data processing: $0.045/GB.

  - root_cause_code: "VPC-DNS"
    actions:
      - order: 1
        name: "Enable DNS resolution and DNS hostnames on the VPC"
        description: >
          Verify both enableDnsSupport (enables VPC DNS resolver) and
          enableDnsHostnames (enables DNS hostnames for instances) are enabled.
        type: "aws_cli"
        command: >
          # Check current DNS attributes
          aws ec2 describe-vpc-attribute
          --vpc-id <VPC_ID>
          --attribute enableDnsSupport

          aws ec2 describe-vpc-attribute
          --vpc-id <VPC_ID>
          --attribute enableDnsHostnames

          # Enable if disabled
          aws ec2 modify-vpc-attribute
          --vpc-id <VPC_ID>
          --enable-dns-support

          aws ec2 modify-vpc-attribute
          --vpc-id <VPC_ID>
          --enable-dns-hostnames
        rollback_command: >
          aws ec2 modify-vpc-attribute --vpc-id <VPC_ID> --no-enable-dns-support
        risk: "LOW"
        requires_approval: false
        estimated_impact: "Enables VPC DNS resolver. No impact on running traffic."

      - order: 2
        name: "Fix Route 53 Resolver rule pointing to unavailable DNS server"
        description: >
          If a custom Resolver rule forwards queries to an on-premises DNS server
          that is unreachable, update the rule to use a reachable DNS target IP.
        type: "aws_cli"
        command: >
          aws route53resolver list-resolver-rules
          --query 'ResolverRules[*].{Id:Id,Name:Name,Domain:DomainName,TargetIps:TargetIps}'

          aws route53resolver update-resolver-rule
          --resolver-rule-id <RULE_ID>
          --config TargetIps=[{Ip=<NEW_DNS_SERVER_IP>,Port=53}]
        rollback_command: >
          aws route53resolver update-resolver-rule
          --resolver-rule-id <RULE_ID>
          --config TargetIps=[{Ip=<OLD_DNS_SERVER_IP>,Port=53}]
        risk: "medium"
        requires_approval: true
        estimated_impact: "Changes DNS forwarding for all queries matching the rule domain."

  - root_cause_code: "VPC-ENDPOINT"
    actions:
      - order: 1
        name: "Check and fix VPC Endpoint state or endpoint policy"
        description: >
          If endpoint is in pending-acceptance state (Interface endpoint requiring acceptance),
          accept it. If the endpoint policy is too restrictive, update it to allow required actions.
        type: "aws_cli"
        command: >
          # Check endpoint status
          aws ec2 describe-vpc-endpoints
          --vpc-endpoint-ids <ENDPOINT_ID>
          --query 'VpcEndpoints[*].{State:State,PolicyDocument:PolicyDocument}'

          # Update endpoint policy to allow required actions
          aws ec2 modify-vpc-endpoint
          --vpc-endpoint-id <ENDPOINT_ID>
          --policy-document '{
            "Version": "2012-10-17",
            "Statement": [{
              "Effect": "Allow",
              "Principal": "*",
              "Action": "<SERVICE_ACTIONS>",
              "Resource": "*"
            }]
          }'
        rollback_command: >
          aws ec2 modify-vpc-endpoint
          --vpc-endpoint-id <ENDPOINT_ID>
          --reset-policy
        risk: "medium"
        requires_approval: true
        estimated_impact: "Policy change is immediate. Verify Principal scope before broadening."

      - order: 2
        name: "Create missing VPC Endpoint for target AWS service"
        description: >
          If no endpoint exists and traffic is routed through NAT Gateway that is also
          failing, create a VPC Interface Endpoint for the target service.
        type: "aws_cli"
        command: >
          aws ec2 create-vpc-endpoint
          --vpc-id <VPC_ID>
          --service-name com.amazonaws.<REGION>.<SERVICE>
          --vpc-endpoint-type Interface
          --subnet-ids <SUBNET_IDS>
          --security-group-ids <SG_IDS>
          --private-dns-enabled
        rollback_command: >
          aws ec2 delete-vpc-endpoints --vpc-endpoint-ids <ENDPOINT_ID>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Interface Endpoint: ~$0.01/hour per AZ + $0.01/GB.
          --private-dns-enabled overrides public DNS for the service within the VPC.

# ---------------------------------------------------------------------------
# VPC FLOW LOGS QUERY
# ---------------------------------------------------------------------------
flow_logs_queries:
  reject_pattern: |
    fields @timestamp, srcAddr, dstAddr, srcPort, dstPort, protocol, action, logStatus, interfaceId
    | filter action = "REJECT"
    | filter dstPort = <TARGET_PORT> OR srcPort = <TARGET_PORT>
    | stats count() as rejectCount by srcAddr, dstAddr, dstPort, interfaceId
    | sort rejectCount desc
    | limit 50

  reject_by_interface: |
    fields @timestamp, srcAddr, dstAddr, srcPort, dstPort, protocol, action
    | filter action = "REJECT"
    | filter interfaceId = "<ENI_ID>"
    | sort @timestamp desc
    | limit 100

  connection_attempts: |
    fields @timestamp, srcAddr, dstAddr, dstPort, packets, bytes, action
    | filter dstAddr = "<TARGET_IP>"
    | filter dstPort = <TARGET_PORT>
    | sort @timestamp desc
    | limit 100

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Layer-by-layer diagnosis must be completed before remediation"
      check: >
        Do not modify Security Groups, NACLs, or Route Tables without first completing
        the full layer-by-layer diagnosis tree. Modifying the wrong layer wastes time
        and may introduce security vulnerabilities.
      block: true

    - description: "VPC Reachability Analyzer must be run to confirm root cause for ambiguous cases"
      check: >
        If the diagnosis decision tree does not conclusively identify the root cause
        after steps 1-5, run aws ec2 create-network-insights-path and
        aws ec2 start-network-insights-analysis before making any changes.
      block: false

    - description: "NACL rule numbers must be verified – lower numbers take precedence"
      check: >
        Before adding a NACL rule, list all existing rules and confirm the new rule
        number is lower than any conflicting DENY rule. NACL rules are evaluated in
        ascending rule number order and the first match wins.
      block: true

    - description: "Route Table changes affect all resources in associated subnets"
      check: >
        Before adding or modifying routes, list all subnets associated with the
        route table and inform all teams with resources in those subnets.
        A misconfigured route can cause broader connectivity loss.
      block: true

  post_conditions:
    - description: "VPC Flow Logs must show ACCEPT (not REJECT) for target traffic after remediation"
      check: >
        Re-run the REJECT query on VPC Flow Logs 5 minutes after remediation.
        Expect zero REJECT records for the previously failing source/destination pair.
      auto_rollback: false

    - description: "VPC Reachability Analyzer analysis must show NetworkPathFound = true"
      check: >
        Re-run the Reachability Analyzer analysis on the same path after remediation
        to confirm the network path is now reachable end-to-end.
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "VPC Reachability Analyzer shows NetworkPathFound = true"
      method: "aws ec2 describe-network-insights-analyses"
      expected: "NetworkPathFound = true for source-to-destination path"
      cli: >
        aws ec2 start-network-insights-analysis
        --network-insights-path-id <PATH_ID>
        --query 'NetworkInsightsAnalysis.NetworkInsightsAnalysisId'

        aws ec2 describe-network-insights-analyses
        --network-insights-analysis-ids <ANALYSIS_ID>
        --query 'NetworkInsightsAnalyses[*].{Reachable:NetworkPathFound,Status:Status}'

    - name: "VPC Flow Logs show no REJECT for target traffic"
      method: "CloudWatch Logs Insights query on VPC Flow Logs"
      expected: "Zero REJECT records for previously failing IP/port in 5-minute window"
      log_query: |
        fields @timestamp, srcAddr, dstAddr, dstPort, action
        | filter action = "REJECT"
        | filter dstAddr = "<TARGET_IP>" AND dstPort = <TARGET_PORT>
        | stats count() as rejectCount by bin(5m)

    - name: "Application-level connectivity restored"
      method: "Application health check or synthetic monitoring"
      expected: "Health check returns HTTP 200 or TCP connection established successfully"

    - name: "DNS resolution succeeds for target hostname"
      method: "SSM run-command nslookup"
      expected: "nslookup returns correct IP address for target hostname"
      cli: >
        aws ssm send-command
        --instance-ids <EC2_INSTANCE_ID>
        --document-name AWS-RunShellScript
        --parameters 'commands=["nslookup <TARGET_HOSTNAME> 169.254.169.253"]'

  stability_window: 300
  success_criteria: >
    All of the following for 5 consecutive minutes:
    (1) VPC Reachability Analyzer shows NetworkPathFound = true,
    (2) Zero REJECT records in VPC Flow Logs for target traffic,
    (3) Application health checks passing,
    (4) No new connectivity alerts firing.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 600
  notify:
    - oncall
    - platform-team
    - network-team
