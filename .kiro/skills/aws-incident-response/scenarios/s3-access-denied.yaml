schema: "decision-knowledge-record/v1"

metadata:
  id: "s3-access-denied"
  name: "S3 Access Denied"
  description: >
    S3 operations fail with HTTP 403 AccessDenied. Covers five root causes:
    IAM policy missing required S3 permissions, Bucket Policy explicit deny,
    Cross-Account access configuration gap, KMS key decryption permission missing,
    and Block Public Access settings preventing intended access.
    Each root cause has targeted CLI diagnosis commands and specific remediation actions.
  category: "storage"
  service: "s3"
  severity: "medium"
  tags:
    - s3
    - access-denied
    - iam
    - bucket-policy
    - kms
    - cross-account
    - block-public-access
  source_refs:
    - title: "Troubleshoot S3 Access Denied"
      url: "https://docs.aws.amazon.com/AmazonS3/latest/userguide/troubleshoot-403-errors.html"
      type: "troubleshooting_guide"
    - title: "S3 Block Public Access"
      url: "https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-control-block-public-access.html"
      type: "official_doc"
    - title: "S3 Bucket Policy"
      url: "https://docs.aws.amazon.com/AmazonS3/latest/userguide/bucket-policies.html"
      type: "official_doc"
    - title: "Troubleshoot S3 403 with IAM Policy Simulator (re:Post)"
      url: "https://repost.aws/knowledge-center/s3-troubleshoot-403"
      type: "repost_kc"
    - title: "S3 Cross-Account Access"
      url: "https://docs.aws.amazon.com/AmazonS3/latest/userguide/example-bucket-policies.html"
      type: "official_doc"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  type: "log_pattern"
  description: "Application logs or CloudTrail contain S3 AccessDenied errors"
  condition: "@message like 'AccessDenied' AND @message like 's3'"
  log_query: |
    fields @timestamp, @message, @logStream
    | filter @message like "AccessDenied" and @message like "s3"
    | sort @timestamp desc
    | limit 100

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "HTTP 403 Forbidden returned on S3 GetObject, PutObject, or DeleteObject"
    detection_method: "Application logs or CloudTrail errorCode = AccessDenied"
    log_query: |
      fields @timestamp, userIdentity.arn, requestParameters.bucketName, errorCode, errorMessage
      | filter errorCode = "AccessDenied"
      | sort @timestamp desc
      | limit 50

  - id: "SYM-02"
    description: "CloudTrail records AccessDenied for S3 API calls"
    detection_method: "CloudTrail – filter errorCode AccessDenied for S3 events"
    cli: >
      aws cloudtrail lookup-events
      --lookup-attributes AttributeKey=EventName,AttributeValue=GetObject
      --query 'Events[?ErrorCode==`AccessDenied`].[EventTime,Username,Resources]'

  - id: "SYM-03"
    description: "KMS decrypt operation fails alongside S3 access attempt"
    detection_method: "CloudTrail – errorCode AccessDenied for kms:Decrypt"

  - id: "SYM-04"
    description: "Public access attempt blocked by Block Public Access settings"
    detection_method: "HTTP 403 on publicly referenced S3 URL"

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  decision_tree:
    - step: 1
      question: "Is the caller in the same AWS account as the bucket owner?"
      check:
        cli: >
          aws s3api get-bucket-acl
          --bucket <BUCKET_NAME>
          --query 'Owner.ID'
      branches:
        - condition: "Caller account ID matches bucket owner account ID"
          result: "Same-account access – check IAM policy and Bucket Policy"
          next_step: 2
        - condition: "Caller account ID differs from bucket owner"
          result: "Cross-account access – check S3-CROSS-ACCOUNT"
          next_step: 5

    - step: 2
      question: "Does the IAM policy grant the required S3 action on the bucket/key ARN?"
      check:
        cli: >
          aws iam simulate-principal-policy
          --policy-source-arn <CALLER_ARN>
          --action-names s3:GetObject s3:PutObject
          --resource-arns arn:aws:s3:::<BUCKET_NAME>/<KEY>
          --query 'EvaluationResults[*].{Action:EvalActionName,Decision:EvalDecision}'
      branches:
        - condition: "EvalDecision = implicitDeny for required action"
          result: "S3-IAM – IAM policy missing required permission"
          next_step: 0
        - condition: "EvalDecision = explicitDeny"
          result: "S3-BUCKET-POLICY – Explicit deny present, check bucket policy"
          next_step: 3
        - condition: "EvalDecision = allowed"
          result: "IAM grants access – check Bucket Policy and BPA"
          next_step: 3

    - step: 3
      question: "Does the Bucket Policy contain an explicit Deny statement matching the caller?"
      check:
        cli: >
          aws s3api get-bucket-policy
          --bucket <BUCKET_NAME>
          --query 'Policy'
      branches:
        - condition: "Policy contains Effect:Deny matching caller principal or condition"
          result: "S3-BUCKET-POLICY – explicit deny overrides IAM allow"
          next_step: 0
        - condition: "No policy or policy allows the action"
          result: "Check Block Public Access and KMS"
          next_step: 4

    - step: 4
      question: "Is the object encrypted with a KMS key, and does the caller have kms:Decrypt?"
      check:
        cli: >
          aws s3api head-object
          --bucket <BUCKET_NAME>
          --key <OBJECT_KEY>
          --query 'ServerSideEncryption'
      branches:
        - condition: "ServerSideEncryption = aws:kms"
          result: "S3-KMS – check caller's kms:Decrypt permission on the KMS key"
          next_step: 0
        - condition: "No KMS encryption or SSE-S3"
          result: "Check S3-BPA – Block Public Access settings"
          next_step: 6

    - step: 5
      question: "Does the Bucket Policy explicitly allow the cross-account principal?"
      check:
        cli: >
          aws s3api get-bucket-policy
          --bucket <BUCKET_NAME>
          --query 'Policy'
      branches:
        - condition: "Policy does not include the external account or role ARN"
          result: "S3-CROSS-ACCOUNT – bucket policy must grant access to external principal"
          next_step: 0
        - condition: "Policy grants access but caller still denied"
          result: "S3-KMS or S3-BPA – check encryption and block public access settings"
          next_step: 4

    - step: 6
      question: "Is Block Public Access enabled, and is this a public access pattern?"
      check:
        cli: >
          aws s3api get-public-access-block
          --bucket <BUCKET_NAME>
      branches:
        - condition: "BlockPublicAcls or BlockPublicPolicy = true and caller uses ACL/public policy"
          result: "S3-BPA – Block Public Access prevents public ACL or policy"
          next_step: 0
        - condition: "BPA not relevant to this access pattern"
          result: "Escalate – check SCPs and session policies"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "S3-IAM"
    name: "IAM policy missing required S3 action permission"
    description: >
      The caller's IAM identity (user, role, or assumed role) does not have an Allow
      statement for the required S3 action (GetObject, PutObject, DeleteObject, etc.)
      on the target bucket or key prefix. IAM implicit deny results in AccessDenied.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"

  - code: "S3-BUCKET-POLICY"
    name: "Bucket Policy contains explicit Deny overriding IAM Allow"
    description: >
      The bucket policy has an explicit Deny statement that matches the caller's
      principal, action, or a condition (e.g., missing MFA, wrong VPC endpoint,
      wrong source IP). Explicit denies in bucket policies always override IAM allows.
    probability: "high"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"

  - code: "S3-CROSS-ACCOUNT"
    name: "Cross-account access not granted in both IAM policy and Bucket Policy"
    description: >
      For cross-account S3 access, both the caller's IAM policy (in the caller account)
      AND the bucket policy (in the bucket owner account) must grant the access.
      Missing either one results in AccessDenied.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"

  - code: "S3-KMS"
    name: "Caller lacks kms:Decrypt or kms:GenerateDataKey on the bucket's KMS key"
    description: >
      Objects encrypted with SSE-KMS require the caller to have kms:Decrypt permission
      on the specific KMS key used for encryption. Missing this permission causes
      AccessDenied even when S3 permissions are correct. For PutObject, kms:GenerateDataKey
      is also required.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-02"
      - "SYM-03"

  - code: "S3-BPA"
    name: "Block Public Access settings blocking ACL or policy-based public access"
    description: >
      The bucket or account-level Block Public Access configuration prevents public
      ACLs or public bucket policies from granting access. Enabled by default on new
      buckets. If public access was intentionally configured but BPA is active, all
      public access attempts result in AccessDenied.
    probability: "low"
    related_symptoms:
      - "SYM-01"
      - "SYM-04"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "S3-IAM"
    actions:
      - order: 1
        name: "Add required S3 permissions to the IAM policy"
        description: >
          Attach an inline or managed IAM policy granting the required S3 actions
          on the target bucket ARN. Scope to the minimum required actions and
          resource ARN (bucket + key prefix, not wildcard *).
        type: "aws_cli"
        command: >
          aws iam put-role-policy
          --role-name <ROLE_NAME>
          --policy-name S3AccessPolicy
          --policy-document '{
            "Version":"2012-10-17",
            "Statement":[{
              "Effect":"Allow",
              "Action":["s3:GetObject","s3:PutObject","s3:ListBucket"],
              "Resource":[
                "arn:aws:s3:::<BUCKET_NAME>",
                "arn:aws:s3:::<BUCKET_NAME>/*"
              ]
            }]
          }'
        rollback_command: >
          aws iam delete-role-policy
          --role-name <ROLE_NAME>
          --policy-name S3AccessPolicy
        risk: "low"
        requires_approval: false
        estimated_impact: "Grants S3 access to the specified role. No cost impact."

  - root_cause_code: "S3-BUCKET-POLICY"
    actions:
      - order: 1
        name: "Identify and remove or narrow the explicit Deny statement"
        description: >
          Retrieve the current bucket policy, identify the Deny statement matching
          the caller, and either remove it or add a condition to narrow its scope.
          Never remove a Deny that is protecting security controls (e.g., enforce-TLS,
          enforce-MFA) without explicit approval.
        type: "aws_cli"
        command: >
          aws s3api get-bucket-policy --bucket <BUCKET_NAME> --query Policy --output text > /tmp/policy.json
          # Edit /tmp/policy.json to remove or modify the Deny statement, then:
          aws s3api put-bucket-policy --bucket <BUCKET_NAME> --policy file:///tmp/policy.json
        rollback_command: >
          aws s3api put-bucket-policy
          --bucket <BUCKET_NAME>
          --policy file:///tmp/policy-backup.json
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Modifying bucket policy immediately affects all access to the bucket.
          Back up existing policy before modification.

  - root_cause_code: "S3-CROSS-ACCOUNT"
    actions:
      - order: 1
        name: "Add cross-account principal to Bucket Policy"
        description: >
          Update the bucket policy to explicitly allow the external account's IAM
          role or principal. The external caller's IAM policy must also allow S3
          actions on this bucket ARN (both sides required for cross-account).
        type: "aws_cli"
        command: >
          aws s3api put-bucket-policy
          --bucket <BUCKET_NAME>
          --policy '{
            "Version":"2012-10-17",
            "Statement":[{
              "Effect":"Allow",
              "Principal":{"AWS":"arn:aws:iam::<EXTERNAL_ACCOUNT_ID>:role/<ROLE_NAME>"},
              "Action":["s3:GetObject","s3:PutObject"],
              "Resource":"arn:aws:s3:::<BUCKET_NAME>/*"
            }]
          }'
        rollback_command: >
          aws s3api delete-bucket-policy
          --bucket <BUCKET_NAME>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Grants access to an external AWS account. Confirm the external account ID
          and role ARN before applying.

  - root_cause_code: "S3-KMS"
    actions:
      - order: 1
        name: "Grant kms:Decrypt (and kms:GenerateDataKey for write) to caller"
        description: >
          Update the KMS key policy to allow the caller's IAM role to perform
          kms:Decrypt for reads and kms:GenerateDataKey for writes on the S3 bucket's
          encryption key.
        type: "aws_cli"
        command: >
          aws kms get-key-policy --key-id <KMS_KEY_ID> --policy-name default --output text > /tmp/kms-policy.json
          # Add caller ARN to key policy Allow statement, then:
          aws kms put-key-policy
          --key-id <KMS_KEY_ID>
          --policy-name default
          --policy file:///tmp/kms-policy.json
        rollback_command: >
          aws kms put-key-policy
          --key-id <KMS_KEY_ID>
          --policy-name default
          --policy file:///tmp/kms-policy-backup.json
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Grants cryptographic access to the KMS key. Scope to minimum required actions.
          KMS API calls charged at $0.03 per 10,000 requests.

  - root_cause_code: "S3-BPA"
    actions:
      - order: 1
        name: "Disable Block Public Access only if public access is intentionally required"
        description: >
          If the bucket legitimately requires public access (e.g., static website hosting),
          disable the specific BPA setting that blocks the required access pattern.
          This action has HIGH risk and requires explicit approval. Consider using
          CloudFront OAC/OAI instead of direct public S3 access.
        type: "aws_cli"
        command: >
          aws s3api put-public-access-block
          --bucket <BUCKET_NAME>
          --public-access-block-configuration
          BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=false,RestrictPublicBuckets=false
        rollback_command: >
          aws s3api put-public-access-block
          --bucket <BUCKET_NAME>
          --public-access-block-configuration
          BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
        risk: "high"
        requires_approval: true
        estimated_impact: >
          Disabling Block Public Access exposes the bucket to public access based on
          bucket policy or ACL. Ensure bucket policy is restrictive before disabling BPA.

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Back up existing bucket policy before modification"
      check: >
        Run: aws s3api get-bucket-policy --bucket <BUCKET_NAME>
        Save output to a file before any put-bucket-policy call.
      block: true

    - description: "Back up existing KMS key policy before modification"
      check: >
        Run: aws kms get-key-policy --key-id <KMS_KEY_ID> --policy-name default
        Save output before any put-key-policy call.
      block: true

    - description: "Block Public Access disable requires explicit security team approval"
      check: >
        Disabling BPA must be explicitly approved by security team.
        Prefer CloudFront OAC/OAI over direct public S3 access for static content.
      block: true

    - description: "Cross-account bucket policy must specify exact principal ARN, not wildcard"
      check: >
        Principal field must be a specific IAM role ARN (arn:aws:iam::<ACCOUNT>:role/<ROLE>).
        Never use Principal: '*' without a restrictive Condition block.
      block: true

  post_conditions:
    - description: "IAM policy simulator must show 'allowed' after remediation"
      check: >
        Re-run: aws iam simulate-principal-policy with the updated policy.
        EvalDecision must return 'allowed' for all required S3 actions.
      auto_rollback: false

    - description: "No new AccessDenied errors in CloudTrail for 5 minutes post-fix"
      check: >
        CloudTrail lookup-events for errorCode=AccessDenied on the bucket
        must return zero new events within a 5-minute window after remediation.
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "IAM policy simulation allows required actions"
      method: "IAM Policy Simulator"
      expected: "EvalDecision = allowed for all required S3 actions"
      cli: >
        aws iam simulate-principal-policy
        --policy-source-arn <CALLER_ARN>
        --action-names s3:GetObject s3:PutObject
        --resource-arns arn:aws:s3:::<BUCKET_NAME>/*
        --query 'EvaluationResults[*].{Action:EvalActionName,Decision:EvalDecision}'

    - name: "Direct S3 operation succeeds"
      method: "AWS CLI S3 test operation"
      expected: "Operation completes without AccessDenied error"
      cli: >
        aws s3 cp s3://<BUCKET_NAME>/<TEST_KEY> /tmp/test-verify.txt

    - name: "No new AccessDenied in CloudTrail"
      method: "CloudTrail lookup-events"
      expected: "Zero AccessDenied events for the caller ARN on this bucket within 5 minutes"
      cli: >
        aws cloudtrail lookup-events
        --lookup-attributes AttributeKey=EventName,AttributeValue=GetObject
        --start-time $(date -u -d '5 minutes ago' +%FT%TZ)
        --query 'Events[?ErrorCode==`AccessDenied`]'

  stability_window: 300
  success_criteria: >
    All of the following for 5 consecutive minutes:
    (1) IAM policy simulator returns 'allowed' for required actions,
    (2) Direct S3 operations succeed without AccessDenied,
    (3) No new AccessDenied CloudTrail events for the affected caller.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 600
  notify:
    - oncall
    - security-team
