schema: "decision-knowledge-record/v1"

metadata:
  id: "ec2-unreachable"
  name: "EC2 Instance Unreachable"
  description: >
    EC2 instance fails Status Checks or becomes unreachable via SSH, RDP, or SSM.
    Covers three root causes: AWS infrastructure issues (system check failure),
    OS/application issues (instance check failure), and Security Group misconfiguration
    blocking connectivity. Includes Auto Recovery, SSM Session Manager access,
    reboot, and AMI-based replacement procedures.
  category: "compute"
  service: "ec2"
  severity: "high"
  tags:
    - ec2
    - unreachable
    - status-check
    - ssh
    - ssm
    - security-group
    - auto-recovery
  source_refs:
    - title: "Troubleshoot EC2 Instance Status Checks"
      url: "https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/monitoring-system-instance-status-check.html"
      type: "troubleshooting_guide"
    - title: "EC2 Auto Recovery"
      url: "https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/ec2-instance-recover.html"
      type: "official_doc"
    - title: "SSM Session Manager"
      url: "https://docs.aws.amazon.com/systems-manager/latest/userguide/session-manager.html"
      type: "official_doc"
    - title: "Troubleshoot EC2 Instance Connectivity (re:Post)"
      url: "https://repost.aws/knowledge-center/ec2-instance-failed-status-check"
      type: "repost_kc"

# ---------------------------------------------------------------------------
# TRIGGERS
# ---------------------------------------------------------------------------
triggers:
  type: "metric_threshold"
  description: "EC2 Status Check metrics indicate failure"
  condition: "StatusCheckFailed > 0 OR StatusCheckFailed_System > 0 OR StatusCheckFailed_Instance > 0"
  log_query: |
    fields @timestamp, @message
    | filter @message like "status check" OR @message like "unreachable"
    | sort @timestamp desc
    | limit 50

# ---------------------------------------------------------------------------
# SYMPTOMS
# ---------------------------------------------------------------------------
symptoms:
  - id: "SYM-01"
    description: "EC2 Status Check Failed – System (AWS infrastructure issue)"
    detection_method: "CloudWatch Metrics – StatusCheckFailed_System"
    metric: "AWS/EC2 | StatusCheckFailed_System | Maximum > 0"

  - id: "SYM-02"
    description: "EC2 Status Check Failed – Instance (OS/application issue)"
    detection_method: "CloudWatch Metrics – StatusCheckFailed_Instance"
    metric: "AWS/EC2 | StatusCheckFailed_Instance | Maximum > 0"

  - id: "SYM-03"
    description: "SSH or RDP connection times out or is refused"
    detection_method: "Manual connectivity test or monitoring agent heartbeat lost"

  - id: "SYM-04"
    description: "SSM Agent not responding – instance absent from Fleet Manager"
    detection_method: "SSM Fleet Manager console or describe-instance-information CLI"
    cli: >
      aws ssm describe-instance-information
      --filters "Key=InstanceIds,Values=<INSTANCE_ID>"
      --query 'InstanceInformationList[0].PingStatus'

  - id: "SYM-05"
    description: "Instance system log shows kernel panic, OOM kill, or filesystem errors"
    detection_method: "EC2 Console Get System Log or get-console-output CLI"
    cli: >
      aws ec2 get-console-output
      --instance-id <INSTANCE_ID>
      --output text

# ---------------------------------------------------------------------------
# DIAGNOSIS – DECISION TREE
# ---------------------------------------------------------------------------
diagnosis:
  decision_tree:
    - step: 1
      question: "Which Status Check is failing: System, Instance, or both?"
      check:
        cli: >
          aws ec2 describe-instance-status
          --instance-ids <INSTANCE_ID>
          --query 'InstanceStatuses[0].{SystemStatus:SystemStatus.Status,InstanceStatus:InstanceStatus.Status}'
      branches:
        - condition: "SystemStatus = failed"
          result: "EC2-SYSTEM-CHECK – AWS infrastructure issue"
          next_step: 2
        - condition: "InstanceStatus = failed"
          result: "EC2-INSTANCE-CHECK – OS/app issue"
          next_step: 3
        - condition: "Both passing but instance unreachable"
          result: "EC2-SG-BLOCK – connectivity/policy issue"
          next_step: 4

    - step: 2
      question: "Is EC2 Auto Recovery configured or is the instance on a supported type?"
      check:
        cli: >
          aws cloudwatch describe-alarms
          --alarm-name-prefix "awsec2-<INSTANCE_ID>"
          --query 'MetricAlarms[*].{AlarmName:AlarmName,ActionsEnabled:ActionsEnabled}'
      branches:
        - condition: "Auto Recovery alarm exists and ActionsEnabled=true"
          result: "Auto Recovery may already be triggered – check instance state"
          next_step: 0
        - condition: "No Auto Recovery alarm"
          result: "EC2-SYSTEM-CHECK – manual recovery required"
          next_step: 0

    - step: 3
      question: "Does the system log reveal a kernel panic, OOM kill, or filesystem error?"
      check:
        cli: >
          aws ec2 get-console-output
          --instance-id <INSTANCE_ID>
          --output text
      branches:
        - condition: "OOM kill or Out of memory in log"
          result: "EC2-INSTANCE-CHECK – OOM, increase instance size or reduce memory load"
          next_step: 0
        - condition: "Kernel panic or filesystem error in log"
          result: "EC2-INSTANCE-CHECK – OS corruption, restore from AMI"
          next_step: 0
        - condition: "No relevant log output"
          result: "EC2-INSTANCE-CHECK – try SSM connectivity check"
          next_step: 4

    - step: 4
      question: "Can SSM Session Manager connect to the instance?"
      check:
        cli: >
          aws ssm start-session
          --target <INSTANCE_ID>
      branches:
        - condition: "SSM session succeeds"
          result: "EC2-SG-BLOCK – SSH/RDP blocked by Security Group but SSM works"
          next_step: 5
        - condition: "SSM session fails (instance not registered)"
          result: "EC2-INSTANCE-CHECK – OS-level issue, try reboot or AMI restore"
          next_step: 0

    - step: 5
      question: "Does the Security Group allow the expected inbound port (22/3389/custom)?"
      check:
        cli: >
          aws ec2 describe-security-groups
          --group-ids <SG_ID>
          --query 'SecurityGroups[*].IpPermissions'
      branches:
        - condition: "Required port not in IpPermissions"
          result: "EC2-SG-BLOCK – add missing inbound rule"
          next_step: 0
        - condition: "Port exists but source CIDR does not match caller IP"
          result: "EC2-SG-BLOCK – update source CIDR or use SSM instead of SSH"
          next_step: 0

# ---------------------------------------------------------------------------
# ROOT CAUSES
# ---------------------------------------------------------------------------
root_causes:
  - code: "EC2-SYSTEM-CHECK"
    name: "AWS infrastructure-level failure causing system status check failure"
    description: >
      AWS hypervisor, network, or physical host issue causes the system status check
      to fail. The instance OS is unaware. Auto Recovery can migrate the instance
      to healthy hardware automatically when enabled.
    probability: "medium"
    related_symptoms:
      - "SYM-01"
      - "SYM-03"
      - "SYM-04"

  - code: "EC2-INSTANCE-CHECK"
    name: "OS or application issue causing instance status check failure"
    description: >
      The guest OS has encountered a kernel panic, OOM kill, filesystem corruption,
      networking misconfiguration, or the application has crashed. The AWS infrastructure
      is healthy but the instance cannot pass its own health check.
    probability: "high"
    related_symptoms:
      - "SYM-02"
      - "SYM-03"
      - "SYM-04"
      - "SYM-05"

  - code: "EC2-SG-BLOCK"
    name: "Security Group or NACL blocking inbound connectivity"
    description: >
      The instance is running and healthy but inbound connectivity on the required port
      (SSH/22, RDP/3389, or application port) is blocked by a Security Group or
      Network ACL rule. Status checks may pass while the instance appears unreachable.
    probability: "high"
    related_symptoms:
      - "SYM-03"

# ---------------------------------------------------------------------------
# REMEDIATION
# ---------------------------------------------------------------------------
remediation:
  - root_cause_code: "EC2-SYSTEM-CHECK"
    actions:
      - order: 1
        name: "Trigger EC2 Auto Recovery"
        description: >
          Send the recover action to migrate the instance to healthy hardware.
          Auto Recovery preserves the instance ID, private IP, Elastic IP, and EBS volumes.
          Only supported on instances with EBS root volumes and supported instance types.
        type: "aws_cli"
        command: >
          aws ec2 recover-instances
          --instance-ids <INSTANCE_ID>
        rollback_command: >
          echo "Auto Recovery is non-destructive; no rollback required. Monitor instance state."
        risk: "low"
        requires_approval: false
        estimated_impact: >
          Instance migrated to new host. Brief interruption during migration (~1-3 min).
          Instance ID, EIP, private IP, and attached EBS volumes preserved.

      - order: 2
        name: "Create CloudWatch Auto Recovery alarm if not present"
        description: >
          Create an alarm that automatically triggers EC2 recovery when StatusCheckFailed_System
          exceeds 0 for 2 consecutive evaluation periods (2 minutes total).
        type: "aws_cli"
        command: >
          aws cloudwatch put-metric-alarm
          --alarm-name "AutoRecover-<INSTANCE_ID>"
          --namespace AWS/EC2
          --metric-name StatusCheckFailed_System
          --dimensions Name=InstanceId,Value=<INSTANCE_ID>
          --statistic Maximum
          --period 60
          --evaluation-periods 2
          --threshold 0
          --comparison-operator GreaterThanThreshold
          --alarm-actions arn:aws:automate:<REGION>:ec2:recover
        rollback_command: >
          aws cloudwatch delete-alarms
          --alarm-names "AutoRecover-<INSTANCE_ID>"
        risk: "low"
        requires_approval: false
        estimated_impact: "CloudWatch alarm cost negligible. Enables automatic future recovery."

  - root_cause_code: "EC2-INSTANCE-CHECK"
    actions:
      - order: 1
        name: "Retrieve system log to identify root cause before acting"
        description: >
          Before rebooting or replacing the instance, capture the console output to
          preserve evidence of kernel panics, OOM events, or filesystem errors.
        type: "aws_cli"
        command: >
          aws ec2 get-console-output
          --instance-id <INSTANCE_ID>
          --output text > /tmp/ec2-console-<INSTANCE_ID>.txt
        rollback_command: >
          echo "Read-only operation. No rollback needed."
        risk: "low"
        requires_approval: false
        estimated_impact: "No impact. Forensic read-only operation."

      - order: 2
        name: "Connect via SSM Session Manager (no SSH required)"
        description: >
          If the OS is running but SSH is unavailable, use SSM Session Manager to
          access the instance without opening port 22. Requires SSM Agent and IAM
          instance profile with AmazonSSMManagedInstanceCore policy.
        type: "aws_cli"
        command: >
          aws ssm start-session
          --target <INSTANCE_ID>
        rollback_command: >
          echo "Session-only access. No state changed. Terminate session when done."
        risk: "low"
        requires_approval: false
        estimated_impact: "No AWS cost for SSM Session Manager basic usage."

      - order: 3
        name: "Reboot the instance"
        description: >
          Issue a reboot to recover from transient OS hangs or application crashes.
          The instance retains its configuration, data, and network identifiers.
          Only use after capturing system log evidence.
        type: "aws_cli"
        command: >
          aws ec2 reboot-instances
          --instance-ids <INSTANCE_ID>
        rollback_command: >
          echo "Reboot is idempotent. If instance does not recover, proceed to AMI restore."
        risk: "medium"
        requires_approval: true
        estimated_impact: "Service interruption of 1-3 minutes during reboot."

      - order: 4
        name: "Launch replacement instance from latest AMI snapshot"
        description: >
          If the instance cannot be recovered via reboot, launch a new instance from
          the most recent AMI backup. Requires AMI to exist. Attach original EBS volumes
          after stopping the failed instance if data is needed.
        type: "aws_cli"
        command: >
          aws ec2 run-instances
          --image-id <LATEST_AMI_ID>
          --instance-type <INSTANCE_TYPE>
          --subnet-id <SUBNET_ID>
          --security-group-ids <SG_IDS>
          --iam-instance-profile Name=<INSTANCE_PROFILE>
          --key-name <KEY_PAIR>
          --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=<NAME>-replacement}]'
        rollback_command: >
          aws ec2 terminate-instances
          --instance-ids <NEW_INSTANCE_ID>
        risk: "high"
        requires_approval: true
        estimated_impact: >
          New instance billed from launch. Original instance retains its EBS volumes
          until explicitly terminated. Update load balancer target groups and DNS records.

  - root_cause_code: "EC2-SG-BLOCK"
    actions:
      - order: 1
        name: "Add inbound Security Group rule for required port"
        description: >
          Add the missing inbound rule to allow SSH (22), RDP (3389), or the
          application port from the required source CIDR or Security Group.
          Prefer SSM Session Manager over opening SSH to the internet (0.0.0.0/0).
        type: "aws_cli"
        command: >
          aws ec2 authorize-security-group-ingress
          --group-id <SG_ID>
          --protocol tcp
          --port <PORT>
          --cidr <SOURCE_CIDR>
        rollback_command: >
          aws ec2 revoke-security-group-ingress
          --group-id <SG_ID>
          --protocol tcp
          --port <PORT>
          --cidr <SOURCE_CIDR>
        risk: "medium"
        requires_approval: true
        estimated_impact: >
          Opens inbound connectivity. Confirm source CIDR is restricted to known IPs.
          Avoid 0.0.0.0/0 for administrative ports.

# ---------------------------------------------------------------------------
# GUARDRAILS
# ---------------------------------------------------------------------------
guardrails:
  pre_conditions:
    - description: "Capture system log before any reboot or recovery action"
      check: >
        Run get-console-output and store result before issuing reboot or recover-instances.
        Console output may be empty after a reboot, destroying forensic evidence.
      block: true

    - description: "Verify AMI exists before launching replacement instance"
      check: >
        Run: aws ec2 describe-images --image-ids <LATEST_AMI_ID>
        Confirm AMI state is 'available' before proceeding with run-instances.
      block: true

    - description: "Confirm Security Group rule does not expose port to 0.0.0.0/0 for admin ports"
      check: >
        For ports 22 and 3389: source CIDR must not be 0.0.0.0/0 or ::/0.
        Use SSM Session Manager as the preferred alternative to SSH.
      block: true

    - description: "Reboot requires acknowledgment of service interruption"
      check: >
        Operator must confirm that a 1-3 minute service interruption is acceptable.
        Check if instance is behind a load balancer and can be drained first.
      block: false

  post_conditions:
    - description: "StatusCheckFailed metrics must return to 0 within 5 minutes of action"
      check: >
        AWS/EC2 StatusCheckFailed_System and StatusCheckFailed_Instance both = 0
        over a 5-minute observation window.
      auto_rollback: false

    - description: "SSM or SSH connectivity must be confirmed post-remediation"
      check: >
        Verify SSM ping status = 'Online' or SSH/RDP connection succeeds within
        5 minutes of instance entering 'running' state.
      auto_rollback: false

# ---------------------------------------------------------------------------
# VERIFICATION
# ---------------------------------------------------------------------------
verification:
  checks:
    - name: "Status checks passing"
      method: "CloudWatch Metrics – StatusCheckFailed"
      expected: "StatusCheckFailed = 0, StatusCheckFailed_System = 0, StatusCheckFailed_Instance = 0"
      cli: >
        aws ec2 describe-instance-status
        --instance-ids <INSTANCE_ID>
        --query 'InstanceStatuses[0].{System:SystemStatus.Status,Instance:InstanceStatus.Status}'

    - name: "SSM Agent online"
      method: "SSM Fleet Manager describe-instance-information"
      expected: "PingStatus = Online"
      cli: >
        aws ssm describe-instance-information
        --filters "Key=InstanceIds,Values=<INSTANCE_ID>"
        --query 'InstanceInformationList[0].PingStatus'

    - name: "Instance in running state"
      method: "EC2 describe-instances"
      expected: "State.Name = running"
      cli: >
        aws ec2 describe-instances
        --instance-ids <INSTANCE_ID>
        --query 'Reservations[0].Instances[0].State.Name'

    - name: "Application-level health check passing"
      method: "ALB target health or application endpoint check"
      expected: "Target health = healthy or HTTP 200 from application endpoint"

  stability_window: 300
  success_criteria: >
    All of the following for 5 consecutive minutes:
    (1) StatusCheckFailed = 0 for both System and Instance checks,
    (2) SSM Agent PingStatus = Online,
    (3) Application-level connectivity confirmed.

# ---------------------------------------------------------------------------
# ESCALATION
# ---------------------------------------------------------------------------
escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 600
  notify:
    - oncall
    - platform-team
