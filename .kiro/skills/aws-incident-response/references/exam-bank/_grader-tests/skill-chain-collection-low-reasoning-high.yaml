schema: grader-test-case/v1

# ═══════════════════════════════════════════════════════════════
# Grader Test Case: Low collection_fidelity, High reasoning_fidelity
# ═══════════════════════════════════════════════════════════════
# 목적: collection_fidelity(잘못된 질문)와 reasoning_fidelity(올바른 결론)가
#       독립적으로 채점되는지 검증.
#       체인이 sparse fixture에서 운 좋게 올바른 root_cause를 도출했으나
#       live 모드에서 요청했을 AWS CLI 명령어가 부정확한 케이스("got lucky").
# 참조 문제: exam-lambda-throttle-001 (Reserved Concurrency=0 설정 실수)
# 참조 DKR: lambda-throttle-concurrency-exhaustion (root_cause: THROTTLE-RESV-ZERO)
# 기대 결과:
#   collection_fidelity == 0  (intended_commands 비어 있음 — live 모드 명령어 미기록)
#   reasoning_fidelity  >= 3  (root_cause_code 정확히 일치, top-3 action 2개 이상 일치)
#   chain_coverage      >= 2  (observe + diagnose 아티팩트 있음)
#   artifact_completeness == 0 또는 1 (sources_read/intended_commands 누락으로 감점)
# ═══════════════════════════════════════════════════════════════

test_id: "skill-chain-collection-low-reasoning-high"
description: "체인이 올바른 결론을 도출했으나 live 모드 명령어를 기록하지 않음 — collection_fidelity LOW, reasoning_fidelity HIGH 분리 채점 검증 + FAIL_LOUD 정책 검증"
track: skill_chain_v2
agents_operating_mode: simulation

# ─── 입력: question (exam-question/v1 subset) ───
question:
  id: "exam-lambda-throttle-001"
  type: multiple_choice
  dkr_mapping:
    scenario_id: "lambda-throttle-concurrency-exhaustion"
    root_cause_codes: ["THROTTLE-RESV-ZERO"]
  correct_answers: ["B"]
  answer_count: 1
  grading:
    difficulty: easy
    scoring_dimensions:
      - dimension: diagnosis_accuracy
        weight: 0.50
      - dimension: action_appropriateness
        weight: 0.30
      - dimension: reasoning_quality
        weight: 0.20

# ─── 입력: skill-chain-submission ───
submission:
  run_id: "run-2026-04-05T17-00"
  question_id: "exam-lambda-throttle-001"
  scenario_id: "lambda-throttle-concurrency-exhaustion"
  track: skill_chain_v2
  agents_operating_mode: simulation
  artifact_bundle:
    observe_yaml: "sim-incidents/exam-lambda-throttle-001/observe.yaml"
    diagnosis_yaml: "sim-incidents/exam-lambda-throttle-001/diagnosis.yaml"
  agents_invoked: ["aws-diagnostician"]
  dkr_access_log: "sim-incidents/exam-lambda-throttle-001/_dkr_access_log.yaml"
  timestamp: "2026-04-05T17:05:00Z"

# ─── 입력: observe.yaml (sim-mode — intended_commands가 비어 있음) ───
# 이 케이스는 diagnostician이 fixture를 읽었지만 live 모드 명령어를 기록하지 않은 상황.
# sources_read는 있으나 intended_commands가 빈 배열 → FAIL_LOUD 정책 + collection_fidelity=0
observe_yaml:
  incident_id: "exam-lambda-throttle-001"
  timestamp: "2026-04-05T17:01:00Z"
  scenario_id: "lambda-throttle-concurrency-exhaustion"
  # R11 extension: sources_read는 있으나 intended_commands가 빈 배열
  sources_read:
    - "evidence/metrics.yaml"
    - "evidence/cli-outputs.yaml"
  intended_commands: []   # 빈 배열 — diagnostician이 live 명령어를 기록하지 않음
  alarms:
    - alarm_name: "Lambda-Throttles-High"
      state: "ALARM"
      reason: "Throttles > 0 for 5 consecutive minutes"
  metrics_snapshot:
    - metric_name: "Throttles"
      namespace: "AWS/Lambda"
      value: 47
      unit: "Count"
      period: "1min"
    - metric_name: "ConcurrentExecutions"
      namespace: "AWS/Lambda"
      value: 0
      unit: "Count"
      period: "1min"
  resource_state:
    function_name: "payment-processor"
    reserved_concurrent_executions: 0

# ─── 입력: diagnosis.yaml (올바른 root_cause — fixture에서 직접 추론 가능) ───
diagnosis_yaml:
  incident_id: "exam-lambda-throttle-001"
  timestamp: "2026-04-05T17:03:00Z"
  scenario_id: "lambda-throttle-concurrency-exhaustion"
  decision_tree_trace:
    - step: 1
      question: "Throttles가 특정 함수에만 발생하는가?"
      check_command: "metrics.yaml에서 Throttles 확인"
      result: "payment-processor만 Throttles=47"
      branch_taken: "함수 레벨 문제"
    - step: 2
      question: "ReservedConcurrentExecutions 값이 0인가?"
      check_command: "cli-outputs.yaml resource_state 확인"
      result: "reserved_concurrent_executions: 0"
      branch_taken: "THROTTLE-RESV-ZERO 확정"
  root_cause_code: "THROTTLE-RESV-ZERO"
  root_cause_name: "Reserved Concurrency가 0으로 설정되어 함수 실행 완전 차단"
  confidence: high
  evidence:
    - type: "metric"
      source: "evidence/metrics.yaml"
      detail: "Throttles=47, ConcurrentExecutions=0"
    - type: "cli_output"
      source: "evidence/cli-outputs.yaml"
      detail: "reserved_concurrent_executions: 0"
  recommended_actions:
    - order: 1
      name: "Reserved Concurrency 설정 삭제"
      type: "configuration"
      command: "aws lambda delete-function-concurrency --function-name payment-processor"
      risk: "LOW"
      rollback_command: "aws lambda put-function-concurrency --function-name payment-processor --reserved-concurrent-executions 0"
    - order: 2
      name: "Throttles 메트릭 모니터링"
      type: "verification"
      command: "aws cloudwatch get-metric-statistics --namespace AWS/Lambda --metric-name Throttles"
      risk: "LOW"
    - order: 3
      name: "Reserved Concurrency 적정값 재설정 검토"
      type: "follow_up"
      command: "aws lambda put-function-concurrency --function-name payment-processor --reserved-concurrent-executions <appropriate_value>"
      risk: "LOW"
  risk_level: "LOW"

# ─── DKR ground truth (채점 기준) ───
dkr_ground_truth:
  scenario_id: "lambda-throttle-concurrency-exhaustion"
  correct_root_cause_code: "THROTTLE-RESV-ZERO"
  correct_root_cause_name: "Reserved Concurrency가 0으로 설정되어 함수 실행 완전 차단"
  expected_intended_commands:
    - "aws lambda get-function-concurrency --function-name payment-processor"
    - "aws cloudwatch get-metric-statistics --namespace AWS/Lambda --metric-name Throttles"
    - "aws cloudwatch get-metric-statistics --namespace AWS/Lambda --metric-name ConcurrentExecutions"
  correct_recommended_actions:
    - "Reserved Concurrency 설정 삭제 (delete-function-concurrency)"
    - "Throttles 메트릭 모니터링 확인"
    - "Reserved Concurrency 적정값 재설정 검토"

# ─── 기대 결과: Grader Phase 2.5가 생성해야 할 skill-chain-result ───
expected:
  chain_dimensions:
    collection_fidelity:
      score: 0
      rationale: "intended_commands가 빈 배열 — rubric 기준 score=0. FAIL_LOUD 정책으로 missing_sim_fields_error 기록 (intended_commands empty)."
    reasoning_fidelity:
      min_score: 3
      rationale: "root_cause_code THROTTLE-RESV-ZERO 정확 일치. recommended_actions 3개 중 3개 모두 DKR과 일치 (순서 포함)."
    chain_coverage:
      min_score: 2
      rationale: "Phase 2A: observe.yaml + diagnosis.yaml 모두 유효."
    artifact_completeness:
      max_score: 1
      rationale: "intended_commands 필드는 있으나 빈 배열 — sim-mode 필수 필드 미충족으로 감점."
  agents_operating_mode: simulation
  grading_evidence:
    missing_sim_fields_error: "observe.yaml.intended_commands is empty in simulation mode. collection_fidelity cannot be scored; score set to 0 and run flagged. reasoning_fidelity scored independently from diagnosis.yaml."

# ─── 검증 기준 ───
validation:
  - "skill-chain-result.chain_dimensions.collection_fidelity == 0 (intended_commands 빈 배열)"
  - "skill-chain-result.chain_dimensions.reasoning_fidelity >= 3 (THROTTLE-RESV-ZERO 정확 일치)"
  - "두 차원이 독립적으로 채점됨 — collection=0이어도 reasoning은 최고점 가능"
  - "grading_evidence.missing_sim_fields_error가 null이 아닌 구체적 오류 메시지 포함 (FAIL_LOUD)"
  - "collection_fidelity 점수가 0이 아닌 null이 아님 — 명시적 오류 기록 후 0으로 설정"
  - "skill-chain-result.agents_operating_mode == simulation"
  - "run에 chain_failure: missing_sim_mode_fields 또는 이에 상응하는 경고 기록"
