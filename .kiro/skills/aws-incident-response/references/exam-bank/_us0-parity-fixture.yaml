id: _us0-parity-fixture
title: "Lambda Throttle Parity Test (US-0 reserved — not for exam use)"
category: compute
type: diagnostic
exam_use: parity_only  # signals harness to exclude from normal exam runs

scenario:
  title: "Lambda 함수 급격한 오류율 증가 — Throttling 의심"
  situation: |
    Lambda 함수 `api-handler`가 최근 배포 후 급격한 오류율 증가를 보이고 있습니다.
    CloudWatch 메트릭에서 Throttles 카운트가 급증하고 있으며,
    일부 요청은 429 ThrottlingException으로 실패하고 있습니다.
    동시 실행 제한에 도달했을 가능성이 있습니다.
  constraint: "실시간 프로덕션 트래픽 영향 중. 빠른 진단 필요."
  evidence:
    - type: metric
      source: "AWS/Lambda Throttles"
      value: "Throttles: 847건/분 (정상 0건/분 → 급증)"
    - type: metric
      source: "AWS/Lambda ConcurrentExecutions"
      value: "ConcurrentExecutions: 1000 (계정 기본 한도 도달)"
    - type: metric
      source: "AWS/Lambda Errors"
      value: "Errors: 412건/분, ErrorRate: 38%"
    - type: log
      source: "Lambda 로그 (CloudWatch Logs Insights)"
      value: |
        @message like 'ThrottlingException' — 847건 (최근 5분)
        @message like 'Rate exceeded' — 412건
        평균 Duration: 2,340ms (정상 범위 내)
    - type: alarm
      source: "CloudWatch Alarm: LambdaThrottleAlarm"
      value: "ALARM 상태. Threshold: Throttles > 100/min for 2 datapoints."
    - type: cli_output
      source: "aws lambda get-account-settings"
      value: |
        {
          "TotalCodeSize": 85000000,
          "TotalConcurrentExecutions": 1000,
          "UnreservedConcurrentExecutions": 0
        }

