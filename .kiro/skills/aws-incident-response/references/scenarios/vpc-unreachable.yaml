schema: decision-knowledge-record/v1

metadata:
  id: "vpc-unreachable"
  name: "VPC 네트워크 연결 불가"
  description: "VPC 내 리소스 간 또는 외부 연결이 Security Group/NACL/Route 오류로 차단"
  category: "network"
  service: "vpc"
  severity: "critical"
  tags: ["vpc", "sg", "nacl", "route", "nat", "dns"]
  source_refs:
    - title: "VPC Troubleshoot Connectivity (re:Post)"
      url: "https://repost.aws/knowledge-center/vpc-troubleshoot-network-connectivity"
      type: "repost_kc"
    - title: "Reachability Analyzer"
      url: "https://docs.aws.amazon.com/vpc/latest/reachability-analyzer/overview.html"
      type: "official_doc"
    - title: "VPC Flow Logs"
      url: "https://docs.aws.amazon.com/vpc/latest/userguide/flow-logs.html"
      type: "official_doc"

triggers:
  - type: "metric_threshold"
    description: "ALB UnHealthyHostCount 증가 또는 애플리케이션 타임아웃"
    condition: "AWS/ApplicationELB.UnHealthyHostCount.Maximum > 0"

symptoms:
  - id: "s1"
    description: "VPC Flow Logs에 REJECT 패턴 집중"
    detection_method: "CloudWatch Logs Insights"
    log_query: |
      fields @timestamp, srcAddr, dstAddr, dstPort, protocol, action
      | filter action = "REJECT" | stats count() by dstPort, protocol | sort count() desc
  - id: "s2"
    description: "특정 포트/프로토콜 연결 불가"
    detection_method: "애플리케이션 타임아웃 또는 커넥션 거부"
  - id: "s3"
    description: "NAT Gateway ErrorPortAllocation > 0"
    metric: "AWS/NATGateway | ErrorPortAllocation | Sum"

diagnosis:
  decision_tree:
    - step: 1
      question: "Reachability Analyzer 결과는?"
      check:
        cli: |
          aws ec2 create-network-insights-path --source <SRC> --destination <DST> --destination-port <PORT> --protocol TCP
          aws ec2 start-network-insights-analysis --network-insights-path-id <PATH_ID>
      branches:
        - condition: "Not Reachable — explanation: Security Group"
          result: "VPC-SG"
          next_step: 0
        - condition: "Not Reachable — explanation: NACL"
          result: "VPC-NACL"
          next_step: 0
        - condition: "Not Reachable — explanation: Route Table"
          result: "VPC-ROUTE"
          next_step: 0
        - condition: "Reachable but still failing"
          result: "VPC-NAT-OR-DNS"
          next_step: 2
    - step: 2
      question: "NAT Gateway 포트 고갈인가?"
      check:
        metric: "AWS/NATGateway | ErrorPortAllocation | Sum"
      branches:
        - condition: "ErrorPortAllocation > 0"
          result: "VPC-NAT"
          next_step: 0
        - condition: "NAT 정상, DNS (UDP 53) REJECT"
          result: "VPC-DNS"
          next_step: 0

root_causes:
  - code: "VPC-SG"
    name: "Security Group 차단"
    description: "필요한 인바운드/아웃바운드 포트가 SG에 허용되지 않음"
    probability: "high"
    related_symptoms: ["s1", "s2"]
  - code: "VPC-NACL"
    name: "Network ACL 차단"
    description: "서브넷 NACL이 트래픽을 명시적 거부"
    probability: "medium"
    related_symptoms: ["s1"]
  - code: "VPC-ROUTE"
    name: "Route Table 경로 누락"
    description: "필요한 라우트 (NAT, IGW, VPC Peering, TGW) 미설정"
    probability: "medium"
    related_symptoms: ["s2"]
  - code: "VPC-NAT"
    name: "NAT Gateway 포트 고갈"
    description: "동시 연결 수가 NAT Gateway 한계 초과"
    probability: "low"
    related_symptoms: ["s3"]
  - code: "VPC-DNS"
    name: "DNS 해석 불가"
    description: "VPC DNS 설정 또는 Route 53 Resolver 문제"
    probability: "low"
    related_symptoms: ["s2"]

remediation:
  - root_cause_code: "VPC-SG"
    actions:
      - order: 1
        name: "Security Group 인바운드 규칙 추가"
        type: "aws_cli"
        command: |
          aws ec2 authorize-security-group-ingress --group-id <SG_ID> \
            --protocol tcp --port <PORT> --cidr <CIDR>
        rollback_command: |
          aws ec2 revoke-security-group-ingress --group-id <SG_ID> \
            --protocol tcp --port <PORT> --cidr <CIDR>
        risk: "medium"
        requires_approval: true

  - root_cause_code: "VPC-NACL"
    actions:
      - order: 1
        name: "NACL 규칙 수정"
        type: "aws_cli"
        command: |
          aws ec2 replace-network-acl-entry --network-acl-id <NACL_ID> \
            --rule-number <NUM> --protocol tcp --port-range From=<PORT>,To=<PORT> \
            --rule-action allow --cidr-block <CIDR>
        rollback_command: |
          aws ec2 replace-network-acl-entry --network-acl-id <NACL_ID> \
            --rule-number <NUM> --rule-action deny
        risk: "medium"
        requires_approval: true

  - root_cause_code: "VPC-ROUTE"
    actions:
      - order: 1
        name: "Route Table 라우트 추가"
        type: "aws_cli"
        command: |
          aws ec2 create-route --route-table-id <RT_ID> \
            --destination-cidr-block <CIDR> --nat-gateway-id <NAT_GW_ID>
        rollback_command: |
          aws ec2 delete-route --route-table-id <RT_ID> --destination-cidr-block <CIDR>
        risk: "medium"
        requires_approval: true

  - root_cause_code: "VPC-NAT"
    actions:
      - order: 1
        name: "NAT Gateway 분산 (AZ별 추가)"
        type: "aws_cli"
        command: "aws ec2 create-nat-gateway --subnet-id <SUBNET> --allocation-id <EIP>"
        risk: "high"
        requires_approval: true
        estimated_impact: "NAT Gateway 시간당 비용 ($0.045/시간)"

guardrails:
  pre_conditions:
    - description: "SG 변경 시 0.0.0.0/0 허용 금지"
      check: "cidr != '0.0.0.0/0'"
      block: true
  post_conditions:
    - description: "Flow Logs REJECT 패턴 소멸"
      check: "REJECT count = 0 for 5 minutes"
      auto_rollback: false

verification:
  checks:
    - name: "연결 복원"
      expected: "애플리케이션 타임아웃 해소, Reachability Analyzer = Reachable"
    - name: "Flow Logs 정상"
      expected: "REJECT 패턴 소멸"
  stability_window: 300
  success_criteria: "Reachability Analyzer = Reachable, REJECT = 0"

escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 600
  notify: ["oncall", "network"]
