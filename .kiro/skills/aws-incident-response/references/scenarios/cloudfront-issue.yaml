schema: decision-knowledge-record/v1

metadata:
  id: "cloudfront-issue"
  name: "CloudFront 캐시/지연/에러"
  description: "CloudFront 배포에서 5xx 에러, 캐시 적중률 저하, 원본 지연 문제"
  category: "network"
  service: "cloudfront"
  severity: "medium"
  tags: ["cloudfront", "cache", "cdn", "latency", "origin"]
  source_refs:
    - title: "CloudFront Troubleshoot Latency (re:Post)"
      url: "https://repost.aws/knowledge-center/cloudfront-troubleshoot-latency"
      type: "repost_kc"
    - title: "CloudFront Logging"
      url: "https://repost.aws/knowledge-center/cloudfront-logging-requests"
      type: "repost_kc"

triggers:
  - type: "metric_threshold"
    description: "CloudFront 5xxErrorRate > 1% 또는 CacheHitRate 급감"
    condition: "AWS/CloudFront.5xxErrorRate.Average > 0.01"

symptoms:
  - id: "s1"
    description: "5xxErrorRate 증가"
    metric: "AWS/CloudFront | 5xxErrorRate | Average"
  - id: "s2"
    description: "CacheHitRate 급감"
    metric: "AWS/CloudFront | CacheHitRate | Average"
  - id: "s3"
    description: "OriginLatency 증가"
    metric: "AWS/CloudFront | OriginLatency | p95"

diagnosis:
  decision_tree:
    - step: 1
      question: "원본(Origin) 서버가 문제인가?"
      check:
        metric: "AWS/CloudFront | OriginLatency | p95"
      branches:
        - condition: "OriginLatency 높음 + 5xx"
          result: "CF-ORIGIN"
          next_step: 0
        - condition: "OriginLatency 정상 + 5xx"
          result: "CF-EDGE"
          next_step: 2
    - step: 2
      question: "WAF가 차단하고 있는가?"
      check:
        cli: "WAF 로그에서 차단 패턴 확인"
      branches:
        - condition: "WAF 차단 패턴 존재"
          result: "CF-WAF"
          next_step: 0
        - condition: "WAF 정상"
          result: "CF-CERT"
          next_step: 0

root_causes:
  - code: "CF-ORIGIN"
    name: "원본 서버 문제"
    description: "ALB/S3/Lambda 원본 서버 응답 불가 또는 지연"
    probability: "high"
  - code: "CF-CACHE-STALE"
    name: "오래된 캐시 제공"
    description: "Cache-Control 헤더 또는 TTL 설정 불량으로 캐시 갱신 안 됨"
    probability: "medium"
  - code: "CF-WAF"
    name: "WAF 규칙 차단"
    description: "WAF Web ACL 규칙이 정상 트래픽 차단"
    probability: "medium"
  - code: "CF-CERT"
    name: "TLS 인증서 문제"
    description: "원본 또는 에지 인증서 만료/불일치"
    probability: "low"

remediation:
  - root_cause_code: "CF-ORIGIN"
    actions:
      - order: 1
        name: "원본 서버 상태 조사"
        type: "aws_cli"
        command: |
          # ALB 타겟 그룹 헬스 확인
          aws elbv2 describe-target-health --target-group-arn <TG_ARN> \
            --query 'TargetHealthDescriptions[*].[Target.Id,TargetHealth.State,TargetHealth.Reason]'
          # CloudFront 원본 오류 로그 확인
          aws logs filter-log-events \
            --log-group-name /aws/cloudfront/<DIST_ID> \
            --filter-pattern '"5xx" OR "503" OR "502"' \
            --start-time $(date -u -d '30 minutes ago' +%s000) \
            --query 'events[*].[timestamp,message]'
        rollback_command: |
          echo "조회 전용 작업 — 롤백 불필요"
        risk: "low"
        requires_approval: false
        estimated_impact:
          cost: "없음 (읽기 전용)"
          duration: "2~5분"
          blast_radius: "없음"
      - order: 2
        name: "캐시 무효화 (오래된 캐시 제거)"
        type: "aws_cli"
        command: |
          aws cloudfront create-invalidation --distribution-id <DIST_ID> \
            --paths "/*"
        rollback_command: |
          echo "캐시 무효화는 되돌릴 수 없음 — 원본이 올바른 콘텐츠를 반환하면 자동 재캐싱됨"
        risk: "low"
        requires_approval: false
        estimated_impact:
          cost: "첫 1,000건/월 무료, 이후 $0.005/경로 (/* = 1건으로 산정)"
          duration: "무효화 전파 최대 5분"
          blast_radius: "전체 캐시 제거로 원본 트래픽 일시 급증 — 원본 용량 확인 필요"

  - root_cause_code: "CF-WAF"
    actions:
      - order: 1
        name: "WAF 규칙 검토 및 차단 규칙 임시 비활성화"
        type: "aws_cli"
        command: |
          # WAF Web ACL 조회
          aws wafv2 get-web-acl --id <ACL_ID> --name <ACL_NAME> --scope CLOUDFRONT --region us-east-1 \
            --query 'WebACL.Rules[*].[Name,Action,Priority]'
          # 문제 규칙을 Count 모드로 전환 (차단 → 카운트)
          aws wafv2 update-web-acl --id <ACL_ID> --name <ACL_NAME> --scope CLOUDFRONT \
            --region us-east-1 --lock-token <LOCK_TOKEN> \
            --default-action Allow={} \
            --rules file:///tmp/waf-rules-count-mode.json \
            --visibility-config SampledRequestsEnabled=true,CloudWatchMetricsEnabled=true,MetricName=<ACL_NAME>
        rollback_command: |
          aws wafv2 update-web-acl --id <ACL_ID> --name <ACL_NAME> --scope CLOUDFRONT \
            --region us-east-1 --lock-token <LOCK_TOKEN> \
            --rules file:///tmp/waf-rules-original.json \
            --default-action Allow={} \
            --visibility-config SampledRequestsEnabled=true,CloudWatchMetricsEnabled=true,MetricName=<ACL_NAME>
        risk: "high"
        requires_approval: true
        estimated_impact:
          cost: "없음 (WAF 규칙 변경 자체 비용 없음)"
          duration: "적용 즉시"
          blast_radius: "차단 규칙 비활성화 시 악성 트래픽 허용 가능 — Count 모드로 전환하여 리스크 최소화"

guardrails:
  pre_conditions:
    - description: "CloudFront 배포 ID 및 원본 서버(ALB/S3/Lambda) 상태 사전 확인"
      check: "aws cloudfront get-distribution --id <DIST_ID> --query 'Distribution.[Status,DomainName]'"
      block: false
    - description: "WAF Web ACL 현재 설정 백업 (규칙 수정 전 원본 보존)"
      check: "aws wafv2 get-web-acl --id <ACL_ID> --name <ACL_NAME> --scope CLOUDFRONT --region us-east-1 > /tmp/waf-rules-original.json"
      block: true
  post_conditions:
    - description: "5xxErrorRate < 0.1%"
      check: "AWS/CloudFront.5xxErrorRate < 0.001 for 5 minutes"
      auto_rollback: false

verification:
  checks:
    - name: "에러율 정상"
      method: "CloudWatch Metrics"
      expected: "5xxErrorRate < 0.1%"
      metric:
        namespace: "AWS/CloudFront"
        metric_name: "5xxErrorRate"
        statistic: "Average"
        threshold: "< 0.001"
    - name: "캐시 적중률 정상"
      method: "CloudWatch Metrics"
      expected: "CacheHitRate > 기준선 (일반적으로 > 80%)"
      metric:
        namespace: "AWS/CloudFront"
        metric_name: "CacheHitRate"
        statistic: "Average"
        threshold: "> 0.8"
    - name: "원본 지연 정상"
      method: "CloudWatch Metrics"
      expected: "OriginLatency p95 < 1000ms"
      metric:
        namespace: "AWS/CloudFront"
        metric_name: "OriginLatency"
        statistic: "p95"
        threshold: "< 1000"
    - name: "ALB 타겟 헬스 정상"
      method: "AWS CLI"
      expected: "모든 타겟 healthy"
      cli: "aws elbv2 describe-target-health --target-group-arn <TG_ARN> --query 'TargetHealthDescriptions[*].[Target.Id,TargetHealth.State]'"
  stability_window: 300
  success_criteria: "5xxErrorRate < 0.1%, CacheHitRate 정상 범위"

escalation:
  auto_remediate: false
  approval_required: true
  escalation_timeout: 600
  notify: ["oncall"]
