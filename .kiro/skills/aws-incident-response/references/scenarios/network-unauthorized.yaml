schema: decision-knowledge-record/v1

metadata:
  id: "network-unauthorized"
  name: "비인가 네트워크 변경"
  description: "비인가 주체에 의한 Security Group/NACL/Route Table 변경 감지"
  category: "security"
  service: "multi"
  severity: "high"
  tags: ["network", "security", "sg", "nacl", "route", "cloudtrail"]
  source_refs:
    - title: "Security Group Rules"
      url: "https://docs.aws.amazon.com/vpc/latest/userguide/vpc-security-groups.html"
      type: "official_doc"
    - title: "CloudTrail Network Events"
      url: "https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-event-reference.html"
      type: "official_doc"

triggers:
  - type: "event_bridge"
    description: "CloudTrail 비인가 네트워크 변경 이벤트"
    condition: "CloudTrail: AuthorizeSecurityGroupIngress, AuthorizeSecurityGroupEgress, CreateRoute, ReplaceNetworkAclEntry by unauthorized principal"

symptoms:
  - id: "s1"
    description: "비인가 SG/NACL/Route 변경"
    detection_method: "CloudTrail 이벤트"
    log_query: |
      fields @timestamp, eventName, userIdentity.arn, requestParameters
      | filter eventName in ["AuthorizeSecurityGroupIngress", "CreateRoute", "ReplaceNetworkAclEntry"]
      | sort @timestamp desc | limit 50

diagnosis:
  decision_tree:
    - step: 1
      question: "변경한 주체가 승인된 IAM 역할/사용자인가?"
      check:
        cli: "CloudTrail에서 userIdentity.arn 확인 → 알려진 관리자 목록과 비교"
      branches:
        - condition: "알려진 관리자가 아님"
          result: "NET-UNAUTHORIZED"
          next_step: 0
        - condition: "알려진 관리자"
          result: "NET-AUTHORIZED"
          next_step: 0

root_causes:
  - code: "NET-UNAUTHORIZED"
    name: "비인가 네트워크 변경"
    description: "승인되지 않은 주체에 의한 네트워크 설정 변경"
    probability: "high"

remediation:
  - root_cause_code: "NET-UNAUTHORIZED"
    actions:
      - order: 1
        name: "변경사항 즉시 되돌리기"
        type: "aws_cli"
        command: |
          # SG Ingress 규칙 제거
          aws ec2 revoke-security-group-ingress \
            --group-id <SG_ID> --protocol tcp --port <PORT> --cidr <CIDR>
          # NACL 항목 제거 (필요 시)
          aws ec2 delete-network-acl-entry \
            --network-acl-id <NACL_ID> --rule-number <RULE_NO> --ingress
          # 비인가 Route Table 경로 제거 (필요 시)
          aws ec2 delete-route --route-table-id <RTB_ID> --destination-cidr-block <CIDR>
        rollback_command: |
          aws ec2 authorize-security-group-ingress \
            --group-id <SG_ID> --protocol tcp --port <PORT> --cidr <CIDR>
        risk: "medium"
        requires_approval: true
        estimated_impact:
          cost: "없음"
          duration: "즉시 적용 (수초 내)"
          blast_radius: "해당 SG/NACL에 의존하는 서비스 트래픽 영향 가능 — 되돌리기 전 원래 규칙 확인 필수"
      - order: 2
        name: "변경한 주체 권한 조사"
        type: "aws_cli"
        command: |
          # 해당 주체의 최근 CloudTrail 활동 조회
          aws cloudtrail lookup-events \
            --lookup-attributes AttributeKey=Username,AttributeValue=<PRINCIPAL_NAME> \
            --start-time $(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ) \
            --query 'Events[*].[EventTime,EventName,CloudTrailEvent]'
          # GuardDuty 발견 항목 확인
          aws guardduty list-findings \
            --detector-id <DETECTOR_ID> \
            --finding-criteria '{"Criterion":{"resource.accessKeyDetails.userName":{"Eq":["<PRINCIPAL_NAME>"]}}}'
        rollback_command: |
          echo "조회 전용 작업 — 롤백 불필요"
        risk: "low"
        requires_approval: false
        estimated_impact:
          cost: "없음 (읽기 전용 조회)"
          duration: "5~10분"
          blast_radius: "없음"
      - order: 3
        name: "SCP/IAM 정책으로 향후 무단 네트워크 변경 방지"
        type: "aws_cli"
        command: |
          # IAM 정책: 특정 역할 외 SG 변경 거부
          aws iam create-policy \
            --policy-name DenyUnauthorizedNetworkChanges \
            --policy-document '{
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Deny",
                "Action": [
                  "ec2:AuthorizeSecurityGroupIngress",
                  "ec2:AuthorizeSecurityGroupEgress",
                  "ec2:RevokeSecurityGroupIngress",
                  "ec2:CreateRoute",
                  "ec2:ReplaceNetworkAclEntry"
                ],
                "Resource": "*",
                "Condition": {
                  "StringNotLike": {
                    "aws:PrincipalArn": "arn:aws:iam::<ACCOUNT_ID>:role/NetworkAdmin*"
                  }
                }
              }]
            }'
        rollback_command: |
          aws iam delete-policy --policy-arn arn:aws:iam::<ACCOUNT_ID>:policy/DenyUnauthorizedNetworkChanges
        risk: "medium"
        requires_approval: true
        estimated_impact:
          cost: "없음"
          duration: "정책 적용 즉시"
          blast_radius: "NetworkAdmin 역할 외 모든 주체의 네트워크 변경 차단 — 운영팀 역할 확인 후 적용"

guardrails:
  pre_conditions:
    - description: "CloudTrail에서 비인가 변경 이벤트의 원래 규칙 상태 수집 (되돌리기 전 기준값 확보)"
      check: "aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=AuthorizeSecurityGroupIngress --start-time <INCIDENT_TIME> --query 'Events[*].CloudTrailEvent'"
      block: true
    - description: "되돌릴 SG/NACL 규칙이 실제 비인가 변경인지 승인된 관리자 목록과 교차 확인"
      check: "CloudTrail userIdentity.arn 이 승인된 관리자 역할(NetworkAdmin, InfraAdmin)에 해당하지 않음을 확인"
      block: true
  post_conditions:
    - description: "원래 설정 복원 확인"
      check: "변경 전 설정과 현재 설정 비교"
      auto_rollback: false

verification:
  checks:
    - name: "네트워크 설정 복원"
      method: "AWS CLI"
      expected: "비인가 변경사항 되돌림 완료 — SG 규칙 원래 상태 일치"
      cli: "aws ec2 describe-security-groups --group-ids <SG_ID> --query 'SecurityGroups[*].IpPermissions'"
    - name: "비인가 주체 활동 중지"
      method: "AWS CLI"
      expected: "해당 주체의 네트워크 변경 이벤트 소멸"
      cli: "aws cloudtrail lookup-events --lookup-attributes AttributeKey=Username,AttributeValue=<PRINCIPAL_NAME> --start-time $(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%SZ) --query 'Events[?contains(EventName,`SecurityGroup`) || contains(EventName,`Route`) || contains(EventName,`NetworkAcl`)]'"
    - name: "GuardDuty 발견 항목 해결"
      method: "AWS CLI"
      expected: "Finding 상태 ARCHIVED 또는 신규 발생 없음"
      cli: "aws guardduty list-findings --detector-id <DETECTOR_ID> --finding-criteria '{\"Criterion\":{\"updatedAt\":{\"GreaterThan\":\"<INCIDENT_EPOCH_MS>\"},\"service.archived\":{\"Eq\":[\"false\"]}}}' --query 'FindingIds'"
  stability_window: 300
  success_criteria: "비인가 변경 되돌림, 향후 방지 조치 적용"

escalation:
  auto_remediate: true
  approval_required: false
  escalation_timeout: 120
  notify: ["oncall", "security"]
