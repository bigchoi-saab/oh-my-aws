# Global Guardrails — 모든 시나리오에 적용되는 공통 안전 정책
# 각 DKR 파일의 guardrails 섹션은 이 글로벌 정책에 추가되는 시나리오별 특화 가드레일

schema: global-guardrails/v1

# ============================================================
# PRE-ACTION: 모든 조치 실행 전 반드시 확인
# ============================================================
pre_action:
  # --- BLOCK (조건 불충족 시 실행 차단) ---
  block:
    - id: pre-01
      name: "증거 존재 확인"
      description: "조치를 정당화하는 메트릭/로그/쿼리 결과가 존재하는가?"
      check: "관련 CW Metric 또는 CW Logs 쿼리 결과가 임계값 초과"
      applies_to: "ALL"

    - id: pre-02
      name: "롤백 명령 준비"
      description: "실행할 조치의 롤백 명령어가 준비되어 있는가?"
      check: "remediation.actions[*].rollback_command 존재 및 검증"
      applies_to: "ALL remediation actions"

    - id: pre-03
      name: "동시 변경 금지"
      description: "현재 다른 조치가 진행 중이 아닌가?"
      check: "진행 중인 다른 조치가 없음을 확인"
      applies_to: "ALL remediation actions"

    - id: pre-04
      name: "비용 영향 표시"
      description: "비용 변화가 발생하는 조치인 경우 사용자에게 비용 영향을 표시했는가?"
      check: "estimated_impact 필드에 비용 정보 포함 및 사용자 확인"
      applies_to: "Provisioned Concurrency, 인스턴스 크기 변경, 용량 증설 등"

    - id: pre-05
      name: "프로덕션 환경 확인"
      description: "프로덕션 리소스에 대한 변경인 경우 추가 승인을 받았는가?"
      check: "환경 태그 또는 리소스 이름으로 프로덕션 여부 확인"
      applies_to: "프로덕션 리소스 변경 시"

  # --- WARN (경고만, 실행은 가능) ---
  warn:
    - id: pre-w01
      name: "영향 범위 확인"
      description: "해당 변경이 다른 리소스에 영향을 주는가?"
      check: "관련 리소스 의존성 확인"
      applies_to: "VPC, SG, NACL, Route Table 변경 시"

    - id: pre-w02
      name: "AWS Health 이벤트 확인"
      description: "현재 AWS 플랫폼 장애가 진행 중인가?"
      check: "aws health describe-events --filter eventStatusCodes=open"
      applies_to: "ALL"

    - id: pre-w03
      name: "최근 배포 이력 확인"
      description: "최근 1시간 내 배포가 있었는가?"
      check: "CloudTrail + 배포 히스토리 조회"
      applies_to: "장애 조사 시작 시"

# ============================================================
# POST-ACTION: 모든 조치 실행 후 반드시 확인
# ============================================================
post_action:
  # --- AUTO-ROLLBACK (악화 시 자동 복원) ---
  auto_rollback:
    - id: post-01
      name: "에러율 증가 감지"
      description: "조치 후 Errors 메트릭이 조치 전보다 증가했는가?"
      check: "이전 5분 vs 이후 5분 Errors 비교"
      action: "이전 설정으로 자동 복원"

    - id: post-02
      name: "주 메트릭 악화"
      description: "조치 대상 메트릭이 개선되지 않고 악화되었는가?"
      check: "DKR verification.checks 주 메트릭 재확인"
      action: "이전 설정으로 자동 복원"

  # --- MONITOR (모니터링만, 롤백은 수동) ---
  monitor:
    - id: post-m01
      name: "안정성 윈도우"
      description: "조치 후 5분간 메트릭 안정 확인"
      check: "모든 관련 메트릭이 안정 범위 내"
      window: 300  # 초

    - id: post-m02
      name: "부작용 감지"
      description: "조치와 무관한 다른 서비스에 영향이 없는가?"
      check: "관련 서비스 Errors, Latency 정상 범위"

# ============================================================
# RISK CLASSIFICATION: 자동화 수준 결정
# ============================================================
risk_levels:
  low:
    auto_execute: true
    notify: true
    approval_required: false
    examples:
      - "로그/메트릭 수집 쿼리"
      - "CloudWatch 대시보드 링크 생성"
      - "타임라인 기록"
      - "증거 수집 (스냅샷, 로그 다운로드)"
      - "AWS Health 상태 조회"
      - "CloudTrail 이벤트 조회"
      - "리소스 설정 읽기 (describe/get)"

  medium:
    auto_execute: false
    propose: true
    approval_required: true
    approval_timeout: 300  # 5분 내 미응답 시 에스컬레이션
    examples:
      - "Lambda 타임아웃/메모리 설정 변경"
      - "DynamoDB 용량 조정"
      - "CloudFront 캐시 무효화"
      - "ECS 태스크 카운트 조정"
      - "SQS Visibility Timeout 변경"
      - "ReportBatchItemFailures 활성화"
      - "Reserved Concurrency 조정 (0이 아닌 값)"

  high:
    auto_execute: false
    propose: true
    approval_required: true
    approval_timeout: 600  # 10분 내 미응답 시 에스컬레이션
    require_explicit_approval: true  # "예, 실행합니다" 명시적 확인 필요
    examples:
      - "배포 롤백"
      - "트래픽 우회 (Zonal Shift, Route 53)"
      - "IAM 자격증명 비활성화"
      - "Provisioned Concurrency 활성화 (비용 발생)"
      - "VPC Route Table / Security Group 변경"
      - "RDS 인스턴스 클래스 변경"
      - "계정 동시성 한도 증가 요청"

# ============================================================
# ABSOLUTE BLOCKS: 절대 자동 실행 금지
# ============================================================
absolute_blocks:
  - action: "리소스 삭제"
    reason: "비가역적 데이터 손실"
  - action: "프로덕션 Security Group 인바운드 규칙 추가"
    reason: "보안 영향 범위 과도"
  - action: "IAM Policy 임의 수정"
    reason: "보안 권한 상승 위험"
  - action: "RDS 인스턴스 클래스 변경 (프로덕션)"
    reason: "장시간 다운타임 가능"
  - action: "Route Table 기본 라우트 변경"
    reason: "Multi-AZ 전체 영향"
  - action: "NAT Gateway 교체"
    reason: "모든 프라이빗 서브넷 영향"
  - action: "S3 버킷 퍼블릭 액세스 허용"
    reason: "보안 노출"
