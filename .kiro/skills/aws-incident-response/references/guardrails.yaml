schema: guardrails/v1

# AWS Incident Response Agent - Approval Gate System
# 3-tier system: LOW (auto-execute) / MEDIUM (user approval) / HIGH (explicit approval required)

approval_gates:
  LOW:
    description: "자동 실행 + 결과 알림"
    auto_execute: true
    examples:
      - "CloudWatch Logs 쿼리 실행"
      - "CloudWatch Metrics 조회"
      - "AWS Health 상태 확인"
      - "CloudTrail 이벤트 조회"
      - "리소스 토폴로지 조회"

  MEDIUM:
    description: "제안 + 사용자 승인 후 실행"
    auto_execute: false
    examples:
      - "Lambda 타임아웃/메모리 설정 변경"
      - "DynamoDB 용량 조정"
      - "CloudFront 캐시 무효화"
      - "Reserved Concurrency 변경"
      - "Auto Scaling 그룹 조정"

  HIGH:
    description: "분석 결과 제시 + 명시적 승인 필요"
    auto_execute: false
    requires_explicit_approval: true
    examples:
      - "배포 롤백"
      - "트래픽 우회 (Zonal Shift, Route 53)"
      - "IAM 자격증명 비활성화"
      - "RDS 수동 페일오버"
      - "ECS 서비스 태스크 정의 롤백"

pre_action_checks:
  - name: "메트릭 근거 확인"
    description: "조치의 근거가 되는 메트릭/로그 증거가 수집되었는가?"
    block_if_false: true
  - name: "롤백 명령 준비"
    description: "조치 실패 시 롤백할 수 있는 명령어가 준비되었는가?"
    block_if_false: true
  - name: "비용 영향 표시"
    description: "비용 변경이 있다면 사용자에게 표시했는가?"
    block_if_false: false
  - name: "영향 범위 확인"
    description: "다른 리소스에 영향을 주는가?"
    block_if_false: false

post_action_checks:
  - name: "효과 검증"
    description: "5분간 메트릭 모니터링으로 개선 확인"
    auto_rollback_on_failure: false
  - name: "부작용 감지"
    description: "Errors가 조치 전보다 증가하지 않았는가?"
    auto_rollback_on_failure: true

kiro_mcp_mapping:
  autoApprove_tools:
    - "describe_*"
    - "list_*"
    - "get_*"
    - "search_*"
  manual_approval_tools:
    - "update_*"
    - "put_*"
    - "create_*"
  disabled_tools:
    - "delete_*"
    - "terminate_*"
